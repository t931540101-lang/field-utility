<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑曜石計畫 - 智能排班系統</title>
    <style>
        :root {
            --shiftar-gold: #b08d57;
            --shiftar-light: #fdfaf5;
            --work-color: #4A90E2; /* 工作藍 */
            --off-color: #E94E77;  /* 休假紅 */
            --private-color: #50E3C2; /* 私人綠 */
        }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #eee;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .app-container {
            width: 100%;
            max-width: 400px;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }
        header {
            background: var(--shiftar-gold);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .stats-card {
            background: var(--shiftar-light);
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #e0d0b0;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .input-group {
            padding: 15px;
            background: #fff;
            border-bottom: 5px solid #eee;
        }
        select, input, button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            background: var(--shiftar-gold);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        .list-container {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }
        .item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            color: white;
        }
        .btn-del {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            margin-left: auto;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>黑曜石計畫：智能班表管理</header>

    <div class="stats-card">
        <div><small>本月工時</small><div id="totalHours">0</div></div>
        <div><small>上班天數</small><div id="workDays">0</div></div>
    </div>

    <div class="input-group">
        <input type="date" id="date">
        <select id="type">
            <option value="work" data-color="var(--work-color)">早班 (07:00-19:00)</option>
            <option value="off" data-color="var(--off-color)">休假 (休息是為了變強)</option>
            <option value="private" data-color="var(--private-color)">私人計畫 (黑曜石進度)</option>
        </select>
        <button onclick="addEntry()">＋ 新增至班表</button>
    </div>

    <div class="list-container" id="list"></div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('obsidian_data')) || [];

    function addEntry() {
        const date = document.getElementById('date').value;
        const type = document.getElementById('type');
        const color = type.options[type.selectedIndex].getAttribute('data-color');
        
        if(!date) return alert('小黑哥，日期還沒選喔！');

        data.push({ date, type: type.options[type.selectedIndex].text, rawType: type.value, color });
        data.sort((a,b) => new Date(b.date) - new Date(a.date));
        save();
    }

    function save() {
        localStorage.setItem('obsidian_data', JSON.stringify(data));
        render();
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        let hours = 0;
        let days = 0;

        data.forEach((item, index) => {
            if(item.rawType === 'work') {
                hours += 12; // 07:00-19:00
                days += 1;
            }
            list.innerHTML += `
                <div class="item" style="background:${item.color}">
                    <div><strong>${item.date}</strong><br><small>${item.type}</small></div>
                    <button class="btn-del" onclick="del(${index})">刪除</button>
                </div>`;
        });
        document.getElementById('totalHours').innerText = hours + ' HR';
        document.getElementById('workDays').innerText = days + ' 天';
    }

    function del(i) {
        data.splice(i, 1);
        save();
    }

    render();
</script>

</body>
</html>
