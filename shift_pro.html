<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小黑哥專業排班表</title>
    <style>
        :root { --border: #e0e0e0; --sun: #d9534f; --sat: #428bca; }
        body { margin: 0; font-family: sans-serif; background: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        /* 標題與星期列 */
        .header { text-align: center; padding: 20px 0; font-weight: bold; font-size: 20px; }
        .week-bar { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #888; padding-bottom: 10px; }
        .week-bar div:first-child { color: var(--sun); }
        .week-bar div:last-child { color: var(--sat); }

        /* 月曆格核心佈局 */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid var(--border); flex-grow: 1; }
        .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 4px; display: flex; flex-direction: column; align-items: center; min-height: 90px; }
        .date { font-size: 16px; margin-bottom: 4px; color: #333; }
        
        /* 底部導航 */
        .nav { height: 60px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #fff; }
        .fab { width: 50px; height: 50px; background: #555; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-top: -30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header" id="yearMonth">2026年 6月</div>
<div class="week-bar">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
</div>
<div class="grid" id="calendar"></div>

<nav class="nav">
    <div>今日</div><div>輪班</div>
    <div class="fab">+</div>
    <div>薪水</div><div>其它</div>
</nav>

<script>
    const now = new Date(2026, 5, 1); // 設為 2026年 6月
    const year = now.getFullYear();
    const month = now.getMonth();
    
    document.getElementById('yearMonth').innerText = `${year}年 ${month + 1}月`;
    
    const grid = document.getElementById('calendar');
    const firstDay = new Date(year, month, 1).getDay(); // 該月1號星期幾
    const daysInMonth = new Date(year, month + 1, 0).getDate(); // 該月總天數

    // 填充空白
    for(let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement('div'));
    }

    // 填充日期
    for(let i = 1; i <= daysInMonth; i++) {
        let cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerHTML = `<div class="date">${i}</div>`;
        grid.appendChild(cell);
    }
</script>
</body>
</html>
