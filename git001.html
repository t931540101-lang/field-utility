<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑哥的測試基地</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f4; color: #333; }
        .container { max-width: 100%; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; margin-top: 10px; box-sizing: border-box; }
        button { background: #2ea44f; color: white; border: none; padding: 10px 20px; border-radius: 5px; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h3>黑曜石計畫：行動筆記</h3>
        <p>這是一個具備自動存檔功能的測試檔。</p>
        <textarea id="noteBox" placeholder="小黑哥的架構師筆記..."></textarea>
        <button onclick="saveData()">暫存到手機</button>
        <p id="msg" style="color: blue; font-size: 0.8em;"></p>
    </div>

    <script>
        // 讀取舊資料
        document.getElementById('noteBox').value = localStorage.getItem('myNote') || '';

        function saveData() {
            const val = document.getElementById('noteBox').value;
            localStorage.setItem('myNote', val);
            document.getElementById('msg').innerText = "已儲存至 Local Storage！";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Table</title>
</head>
<body>
    <h1>Simple Table Example</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>City</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John</td>
                <td>25</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>Jane</td>
                <td>30</td>
                <td>London</td>
            </tr>
            <tr>
                <td>Tom</td>
                <td>22</td>
                <td>Paris</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
