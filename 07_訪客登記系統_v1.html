<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣精銳科技 - 訪客進出登記系統</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent: #00ffd2;
            --success: #28a745;
            --danger: #dc3545;
            --border: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 380px; }
        
        /* 標題與標籤 */
        .header { margin: 10px 0 15px 0; text-align: center; }
        .header h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }
        .header p { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        
        /* 表單卡片 */
        .form-card {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
        .form-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        .form-group.fixed-w { flex: 0 0 80px; } /* 人數欄位縮小 */
        
        label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 4px; font-weight: bold; }
        .form-input {
            width: 100%;
            padding: 8px 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        
        .btn-submit {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            color: #121212;
            background: var(--accent);
            margin-top: 5px;
        }
        .btn-submit:active { opacity: 0.8; }

        /* 統計狀態 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }
        
        /* 歷史表格區（支援手機橫向滑動） */
        .table-title {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-container {
            width: 100%;
            overflow-x: auto; /* 關鍵：讓手機可以左右滑動看完整欄位 */
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            text-align: left;
            min-width: 600px; /* 確保在手機上不會擠成一團 */
        }
        th, td {
            padding: 10px 8px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th { background: #252525; color: var(--accent); font-weight: bold; }
        tr.inside { background: rgba(0, 255, 210, 0.03); }
        
        /* 離開按鈕 */
        .btn-out {
            background: rgba(40, 167, 69, 0.15);
            color: #4cd137;
            border: 1px solid var(--success);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }
        .text-muted { color: var(--text-sub); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>台灣精銳科技股份有限公司</h1>
        <p>訪客進出電子登記中樞 v1.0</p>
    </div>

    <div class="form-card">
        <div class="form-row">
            <div class="form-group">
                <label>訪客姓名</label>
                <input type="text" id="vName" class="form-input" placeholder="例: 張經理" autocomplete="off">
            </div>
            <div class="form-group fixed-w">
                <label>來賓人數</label>
                <input type="number" id="vCount" class="form-input" value="1" min="1">
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>公司 / 行號名稱</label>
                <input type="text" id="vCompany" class="form-input" placeholder="例: 合發工業" autocomplete="off">
            </div>
            <div class="form-group">
                <label>受訪人員</label>
                <input type="text" id="vTarget" class="form-input" placeholder="例: 製造部 小黑哥" autocomplete="off">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>事由</label>
                <input type="text" id="vReason" class="form-input" placeholder="例: 設備維修 / 面試" autocomplete="off">
            </div>
            <div class="form-group">
                <label>聯絡電話</label>
                <input type="text" id="vPhone" class="form-input" placeholder="例: 0912-345678" autocomplete="off">
            </div>
        </div>

        <button class="btn-submit" onclick="checkInVisitor()">🚀 登記進廠 (Check-In)</button>
    </div>

    <div class="status-bar">
        <span>廠內現有訪客：<strong id="insideCount" style="color:var(--accent)">0</strong> 批</span>
        <span style="color:var(--danger); cursor:pointer;" onclick="clearAllData()">🗑️ 清空今日紀錄</span>
    </div>

    <div class="table-title">
        <span>📋 今日進出流水線 (左右滑動檢視)</span>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>姓名 (人數)</th>
                    <th>公司 / 行號</th>
                    <th>受訪人員</th>
                    <th>事由</th>
                    <th>進廠時間</th>
                    <th>出廠時間</th>
                    <th>聯絡電話</th>
                    <th>動作</th>
                </tr>
            </thead>
            <tbody id="visitorTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let visitors = [];

    // 初始化：載入 Local Storage
    document.addEventListener('DOMContentLoaded', () => {
        const localData = localStorage.getItem('apex_visitors');
        if (localData) {
            visitors = JSON.parse(localData);
        }
        renderTable();
    });

    // 登記進廠
    function checkInVisitor() {
        const name = document.getElementById('vName').value.trim();
        const count = document.getElementById('vCount').value.trim();
        const company = document.getElementById('vCompany').value.trim();
        const target = document.getElementById('vTarget').value.trim();
        const reason = document.getElementById('vReason').value.trim();
        const phone = document.getElementById('vPhone').value.trim();

        if (!name || !company || !target) {
            alert('小黑哥，姓名、公司、受訪人員是必填的喔！');
            return;
        }

        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        const newVisitor = {
            id: Date.now(),
            date: dateStr,
            name: name,
            count: count || 1,
            company: company,
            target: target,
            reason: reason || "洽公",
            phone: phone || "無",
            timeIn: timeStr,
            timeOut: null
        };

        visitors.push(newVisitor);
        saveAndRefresh();

        // 清空表單
        document.getElementById('vName').value = '';
        document.getElementById('vCount').value = '1';
        document.getElementById('vCompany').value = '';
        document.getElementById('vTarget').value = '';
        document.getElementById('vReason').value = '';
        document.getElementById('vPhone').value = '';
    }

    // 登記出廠
    function checkOutVisitor(id) {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        
        const visitor = visitors.find(v => v.id === id);
        if (visitor) {
            visitor.timeOut = timeStr;
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('apex_visitors', JSON.stringify(visitors));
        renderTable();
    }

    // 渲染表格
    function renderTable() {
        const tbody = document.getElementById('visitorTableBody');
        const insideCountEl = document.getElementById('insideCount');
        
        let insideCount = 0;
        // 最新登記的排在最上面
        const displayData = [...visitors].reverse();

        if (displayData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#555;">目前尚無登記資料</td></tr>';
            insideCountEl.innerText = 0;
            return;
        }

        tbody.innerHTML = displayData.map(v => {
            const isInside = v.timeOut === null;
            if (isInside) insideCount++;

            return `
                <tr class="${isInside ? 'inside' : ''}">
                    <td><strong>${v.name}</strong> <span class="text-muted">(${v.count}人)</span></td>
                    <td>${v.company}</td>
                    <td>${v.target}</td>
                    <td><span class="text-muted">${v.reason}</span></td>
                    <td>${v.date} ${v.timeIn}</td>
                    <td>${v.timeOut ? v.timeOut : '<span style="color:#eccc68">廠內中</span>'}</td>
                    <td>${v.phone}</td>
                    <td>
                        ${isInside ? 
                            `<button class="btn-out" onclick="checkOutVisitor(${v.id})">確認離開 🚪</button>` : 
                            `<span style="color:var(--text-sub)">已安全出廠</span>`
                        }
                    </td>
                </tr>
            `;
        }).join('');

        insideCountEl.innerText = insideCount;
    }

    // 清空數據
    function clearAllData() {
        if (confirm('小黑哥，確定要清空手機內的訪客資料庫嗎？（清除後無法復原）')) {
            visitors = [];
            saveAndRefresh();
        }
    }
</script>

</body>
</html>
