<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K9 警衛輪班總管理系統</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg: #f0f2f5; --border: #ccc; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .month-ctrl { display: flex; align-items: center; gap: 20px; font-weight: 900; font-size: 1.4rem; color: #2c3e50; }
        .btn-nav { padding: 8px 18px; cursor: pointer; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; transition: 0.2s; }
        .btn-nav:hover { background: #e9ecef; }
        .lock-btn { padding: 10px 20px; border-radius: 30px; border: none; background: #607d8b; color: white; cursor: pointer; font-weight: bold; }
        .lock-btn.unlocked { background: #43a047; box-shadow: 0 0 12px rgba(67,160,71,0.4); }

        /* ── 匯出按鈕 ── */
        .export-btn { padding: 10px 22px; border-radius: 30px; border: none; background: #1565c0; color: white; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .export-btn:hover { background: #0d47a1; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(21,101,192,0.4); }
        .export-btn:disabled { background: #90a4ae; cursor: not-allowed; transform: none; box-shadow: none; }

        /* 匯出進度提示 */
        .export-toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 30px; font-weight: bold; font-size: 14px; z-index: 9999; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .export-toast.show { display: block; animation: toastIn 0.3s ease; }
        @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(20px); } to { opacity:1; transform: translateX(-50%) translateY(0); } }

        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        table { border-collapse: collapse; min-width: 1800px; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid var(--border); padding: 8px 0; text-align: center; font-size: 13px; }
        th { background: #fdfcf9; color: #555; height: 40px; }
        .sticky-left { position: sticky; left: 0; background: #fff !important; z-index: 5; border-right: 2px solid #999 !important; width: 50px; }
        .sticky-left-2 { position: sticky; left: 50px; background: #fff !important; z-index: 5; border-right: 2px solid #ccc !important; width: 80px; }
        input { width: 100%; border: none; text-align: center; font-size: 13px; background: transparent; pointer-events: none; font-weight: 700; outline: none; }
        .can-edit input { pointer-events: auto; background: #fffde7; }
        .val-日 { color: #0d47a1; background: #e3f2fd; }
        .val-夜 { color: #4a148c; background: #f3e5f5; }
        .val-休, .val-例, .val-❌ { color: #b71c1c; background: #ffebee; }
        .val-特 { color: #f57f17; background: #fffde7; }
        .weekend { color: #c62828; font-weight: bold; }
        .summary-col { background: #f8f9fa; font-weight: bold; min-width: 35px; }
    </style>
</head>
<body>

<div class="header-box">
    <div class="month-ctrl">
        <button class="btn-nav" onclick="changeMonth(-1)">❮</button>
        <span id="currentMonthDisplay">載入中...</span>
        <button class="btn-nav" onclick="changeMonth(1)">❯</button>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <button id="exportMonthBtn" class="export-btn" style="background:#2e7d32;" onclick="exportMonthToExcel()">
            📄 匯出當月 Excel
        </button>
        <button id="exportBtn" class="export-btn" onclick="exportAllToExcel()">
            📊 匯出全年 Excel
        </button>
        <button id="lockBtn" class="lock-btn" onclick="toggleLock()">🔒 唯讀模式</button>
    </div>
</div>

<div class="table-container">
    <table id="rosterTable">
        <thead>
            <tr id="dateHeader"></tr>
            <tr id="weekHeader"></tr>
        </thead>
        <tbody id="rosterBody"></tbody>
    </table>
</div>

<!-- 匯出進度提示 -->
<div class="export-toast" id="exportToast">⏳ 正在從雲端讀取排班資料...</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48",
        databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com",
        projectId: "factor-security-d1965",
        appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curYear = 2026;
    let curMonth = 2;
    let isEditing = false;

    const staffData = [
        {group: "總務", name: "盧家慶"}, {group: "總務", name: "何鴻隆"},
        {group: "總務", name: "蔡易倫"}, {group: "總務", name: "邱鴻鈞"},
        {group: "總務", name: "柳旭洲"}, {group: "總務", name: "魏榮志"},
        {group: "總務", name: ""}
    ];
    const weekNames = ["日", "一", "二", "三", "四", "五", "六"];

    // ════════════════════════════════════════
    //  📄 匯出當月 Excel
    // ════════════════════════════════════════
    async function exportMonthToExcel() {
        const btn = document.getElementById('exportMonthBtn');
        const toast = document.getElementById('exportToast');
        btn.disabled = true;
        btn.innerHTML = '⏳ 讀取中...';
        toast.className = 'export-toast show';
        toast.innerText = '⏳ 正在從雲端讀取排班資料...';

        try {
            const snapshot = await db.ref('guardSchedules').once('value');
            const allData = snapshot.val() || {};

            const wb = XLSX.utils.book_new();
            const ws = buildMonthSheet(allData, curYear, curMonth);
            const sheetName = `${curYear}-${String(curMonth+1).padStart(2,'0')}月`;
            XLSX.utils.book_append_sheet(wb, ws, sheetName);

            const fileName = `警衛排班表_${curYear}年${curMonth+1}月.xlsx`;
            XLSX.writeFile(wb, fileName);

            toast.innerText = `✅ 匯出完成！${fileName}`;
            setTimeout(() => { toast.className = 'export-toast'; }, 3000);
        } catch(err) {
            toast.innerText = `❌ 匯出失敗：${err.message}`;
            setTimeout(() => { toast.className = 'export-toast'; }, 4000);
        }

        btn.disabled = false;
        btn.innerHTML = '📄 匯出當月 Excel';
    }

        // ════════════════════════════════════════
    //  📊 一鍵匯出全年排班 Excel
    // ════════════════════════════════════════
    async function exportAllToExcel() {
        const btn = document.getElementById('exportBtn');
        const toast = document.getElementById('exportToast');
        btn.disabled = true;
        btn.innerHTML = '⏳ 讀取中...';
        toast.className = 'export-toast show';

        try {
            // 1. 從 Firebase 一次性讀取所有排班資料
            toast.innerText = '⏳ 正在從雲端讀取排班資料...';
            const snapshot = await db.ref('guardSchedules').once('value');
            const allData = snapshot.val() || {};

            // 2. 建立 Excel 工作簿
            const wb = XLSX.utils.book_new();

            // 3. 全年12個月各建一個工作表
            const exportYear = curYear;
            for (let m = 0; m < 12; m++) {
                toast.innerText = `📋 產生 ${exportYear}年${m+1}月 排班表...`;
                const ws = buildMonthSheet(allData, exportYear, m);
                const sheetName = `${exportYear}-${String(m+1).padStart(2,'0')}月`;
                XLSX.utils.book_append_sheet(wb, ws, sheetName);
            }

            // 4. 額外建一個「全年統計」工作表
            toast.innerText = '📊 產生全年統計表...';
            const summaryWs = buildSummarySheet(allData, exportYear);
            XLSX.utils.book_append_sheet(wb, summaryWs, `${exportYear}年全年統計`);

            // 5. 下載
            toast.innerText = '💾 準備下載...';
            const fileName = `警衛排班表_${exportYear}年_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.xlsx`;
            XLSX.writeFile(wb, fileName);

            toast.innerText = `✅ 匯出完成！${fileName}`;
            setTimeout(() => { toast.className = 'export-toast'; }, 3000);

        } catch(err) {
            toast.innerText = `❌ 匯出失敗：${err.message}`;
            setTimeout(() => { toast.className = 'export-toast'; }, 4000);
        }

        btn.disabled = false;
        btn.innerHTML = '📊 一鍵匯出全年排班 Excel';
    }

    // 建立單月工作表
    function buildMonthSheet(allData, year, month) {
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const rows = [];

        // 標題列1：日期
        const dateRow = ['組別', '姓名'];
        for (let d = 1; d <= daysInMonth; d++) dateRow.push(d);
        dateRow.push('日班', '夜班', '其他');
        rows.push(dateRow);

        // 標題列2：星期
        const weekRow = ['', ''];
        for (let d = 1; d <= daysInMonth; d++) {
            weekRow.push(weekNames[new Date(year, month, d).getDay()]);
        }
        weekRow.push('', '', '');
        rows.push(weekRow);

        // 每位人員的排班
        staffData.forEach(p => {
            if (!p.name) { rows.push([]); return; }
            const row = [p.group, p.name];
            let dc = 0, nc = 0, oc = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const key = `${year}_${month+1}_${p.name}_${d}`;
                const val = allData[key] || '';
                row.push(val);
                if (val.includes('日')) dc++;
                else if (val.includes('夜')) nc++;
                else if (val !== '') oc++;
            }
            row.push(dc, nc, oc);
            rows.push(row);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);

        // 欄寬設定
        const cols = [{ wch: 8 }, { wch: 10 }];
        for (let d = 0; d < daysInMonth; d++) cols.push({ wch: 5 });
        cols.push({ wch: 6 }, { wch: 6 }, { wch: 6 });
        ws['!cols'] = cols;

        return ws;
    }

    // 建立全年統計工作表
    function buildSummarySheet(allData, year) {
        const rows = [];
        const header = ['組別', '姓名'];
        for (let m = 1; m <= 12; m++) header.push(`${m}月日班`, `${m}月夜班`, `${m}月其他`);
        header.push('全年日班', '全年夜班', '全年其他', '全年總班數');
        rows.push(header);

        staffData.forEach(p => {
            if (!p.name) return;
            const row = [p.group, p.name];
            let totalD = 0, totalN = 0, totalO = 0;
            for (let m = 0; m < 12; m++) {
                const days = new Date(year, m + 1, 0).getDate();
                let dc = 0, nc = 0, oc = 0;
                for (let d = 1; d <= days; d++) {
                    const key = `${year}_${m+1}_${p.name}_${d}`;
                    const val = allData[key] || '';
                    if (val.includes('日')) dc++;
                    else if (val.includes('夜')) nc++;
                    else if (val !== '') oc++;
                }
                row.push(dc, nc, oc);
                totalD += dc; totalN += nc; totalO += oc;
            }
            row.push(totalD, totalN, totalO, totalD + totalN + totalO);
            rows.push(row);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const cols = [{ wch: 8 }, { wch: 10 }];
        for (let i = 0; i < 36; i++) cols.push({ wch: 7 });
        cols.push({ wch: 9 }, { wch: 9 }, { wch: 9 }, { wch: 10 });
        ws['!cols'] = cols;
        return ws;
    }

    // ════════════════════════════════════════
    //  既有功能（維持原版）
    // ════════════════════════════════════════
    function initTable() {
        const dHead = document.getElementById('dateHeader');
        const wHead = document.getElementById('weekHeader');
        const tbody = document.getElementById('rosterBody');
        dHead.innerHTML = `<th class="sticky-left">組別</th><th class="sticky-left-2">姓名</th>`;
        wHead.innerHTML = `<th class="sticky-left">-</th><th class="sticky-left-2">-</th>`;
        tbody.innerHTML = '';
        document.getElementById('currentMonthDisplay').innerText = `${curYear}年 ${curMonth + 1}月`;
        const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

        for (let d = 1; d <= daysInMonth; d++) {
            const dateTh = document.createElement('th');
            dateTh.innerText = d;
            dHead.appendChild(dateTh);
            const dayOfWeek = weekNames[new Date(curYear, curMonth, d).getDay()];
            const weekTh = document.createElement('th');
            weekTh.innerText = dayOfWeek;
            if(dayOfWeek === "日" || dayOfWeek === "六") weekTh.className = "weekend";
            wHead.appendChild(weekTh);
        }

        ["日", "夜", "休"].forEach(t => {
            const th = document.createElement('th'); th.className = "summary-col"; th.innerText = t;
            dHead.appendChild(th);
            wHead.appendChild(document.createElement('th'));
        });

        staffData.forEach(p => {
            const tr = document.createElement('tr');
            let rowHtml = `<td class="sticky-left">${p.group}</td><td class="sticky-left-2"><b>${p.name}</b></td>`;
            for (let d = 1; d <= daysInMonth; d++) {
                rowHtml += `<td><input id="${curYear}_${curMonth+1}_${p.name}_${d}" onchange="saveShift('${p.name}', ${d}, this.value)"></td>`;
            }
            rowHtml += `<td id="sd_${p.name}" class="summary-col">0</td><td id="sn_${p.name}" class="summary-col">0</td><td id="so_${p.name}" class="summary-col">0</td>`;
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
        });

        listenToData(daysInMonth);
    }

    function listenToData(days) {
        db.ref('guardSchedules').off();
        db.ref('guardSchedules').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            staffData.forEach(p => {
                let dc=0, nc=0, oc=0;
                for (let d = 1; d <= days; d++) {
                    const id = `${curYear}_${curMonth+1}_${p.name}_${d}`;
                    const val = data[id] || "";
                    const el = document.getElementById(id);
                    if(el) {
                        el.value = val;
                        el.parentElement.className = "";
                        if(val) el.parentElement.classList.add('val-' + val.substring(0,1));
                        if(val.includes("日")) dc++;
                        else if(val.includes("夜")) nc++;
                        else if(val!=="") oc++;
                    }
                }
                if(document.getElementById(`sd_${p.name}`)) {
                    document.getElementById(`sd_${p.name}`).innerText = dc;
                    document.getElementById(`sn_${p.name}`).innerText = nc;
                    document.getElementById(`so_${p.name}`).innerText = oc;
                }
            });
        });
    }

    function saveShift(name, day, val) {
        const id = `${curYear}_${curMonth+1}_${name}_${day}`;
        db.ref('guardSchedules/' + id).set(val);
    }

    function changeMonth(dir) {
        curMonth += dir;
        if (curMonth < 0) { curMonth = 11; curYear--; }
        else if (curMonth > 11) { curMonth = 0; curYear++; }
        initTable();
    }

    function toggleLock() {
        if(!isEditing && prompt("人事密碼：") === "8888") {
            isEditing = true; document.body.classList.add('can-edit');
            document.getElementById('lockBtn').innerText = "🔓 編輯中";
            document.getElementById('lockBtn').classList.add('unlocked');
        } else if(isEditing) {
            isEditing = false; document.body.classList.remove('can-edit');
            document.getElementById('lockBtn').innerText = "🔒 唯讀模式";
            document.getElementById('lockBtn').classList.remove('unlocked');
        }
    }

    initTable();
</script>
</body>
</html>
