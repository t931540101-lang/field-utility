<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>黑曜石：排班與薪資助理</title>
    <style>
        :root {
            --primary-bg: #fdfcf9;
            --main-color: #606060;
            --accent-color: #e56399;
            --card-bg: #ffffff;
        }
        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--primary-bg);
            color: #333;
            margin: 0;
            padding-bottom: 30px;
        }
        header {
            background-color: var(--main-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .container {
            padding: 15px;
            max-width: 480px;
            margin: auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 15px;
        }
        h3 { margin-top: 0; color: var(--main-color); font-size: 1.1rem; }
        label { font-size: 0.9rem; display: block; margin-bottom: 5px; }
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            font-weight: bold;
            margin-top: 5px;
        }
        .salary-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: #d81b60;
        }
        .shift-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .shift-date { font-weight: bold; }
        .shift-type { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>黑曜石排班助理</header>

<div class="container">
    <div class="card">
        <h3>時薪設定</h3>
        <input type="number" id="hourlyRate" placeholder="請輸入時薪 (例如: 200)" onchange="calculateSalary()">
        <div class="salary-info">本月預估薪資: $<span id="totalSalary">0</span></div>
    </div>

    <div class="card">
        <h3>新增班次</h3>
        <label>選擇日期</label>
        <input type="date" id="shiftDate">
        <label>選擇班別 (預設 12 小時)</label>
        <select id="shiftType">
            <option value="早班" data-hours="12">早班 (12hr)</option>
            <option value="晚班" data-hours="12">晚班 (12hr)</option>
            <option value="休假" data-hours="0">休假</option>
        </select>
        <button onclick="addShift()">記錄班次</button>
    </div>

    <div class="card">
        <h3>本月班表紀錄</h3>
        <div id="shiftList">
            </div>
        <button style="background: #999; margin-top: 15px;" onclick="clearAll()">清空所有紀錄</button>
    </div>
</div>

<script>
    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        const savedRate = localStorage.getItem('ob_rate');
        if(savedRate) document.getElementById('hourlyRate').value = savedRate;
        renderShifts();
    });

    function addShift() {
        const date = document.getElementById('shiftDate').value;
        const select = document.getElementById('shiftType');
        const type = select.value;
        const hours = select.options[select.selectedIndex].dataset.hours;

        if(!date) return alert('請選擇日期');

        let shifts = JSON.parse(localStorage.getItem('ob_shifts')) || [];
        shifts.push({ date, type, hours: parseInt(hours) });
        localStorage.setItem('ob_shifts', JSON.stringify(shifts));
        
        renderShifts();
    }

    function renderShifts() {
        const listContainer = document.getElementById('shiftList');
        let shifts = JSON.parse(localStorage.getItem('ob_shifts')) || [];
        
        // 排序：日期由新到舊
        shifts.sort((a, b) => new Date(b.date) - new Date(a.date));

        listContainer.innerHTML = shifts.length ? '' : '<p style="color:#999; text-align:center;">尚無紀錄</p>';
        
        shifts.forEach(s => {
            listContainer.innerHTML += `
                <div class="shift-item">
                    <span class="shift-date">${s.date}</span>
                    <span class="shift-type">${s.type} (${s.hours}hr)</span>
                </div>
            `;
        });

        calculateSalary();
    }

    function calculateSalary() {
        const rate = document.getElementById('hourlyRate').value || 0;
        localStorage.setItem('ob_rate', rate);
        
        let shifts = JSON.parse(localStorage.getItem('ob_shifts')) || [];
        const totalHours = shifts.reduce((sum, s) => sum + s.hours, 0);
        
        document.getElementById('totalSalary').innerText = (totalHours * rate).toLocaleString();
    }

    function clearAll() {
        if(confirm('確定要刪除所有排班紀錄嗎？')) {
            localStorage.removeItem('ob_shifts');
            renderShifts();
        }
    }
</script>

</body>
</html>
