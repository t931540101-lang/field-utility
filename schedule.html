<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑曜石計畫 - 智慧排班系統</title>
    <style>
        :root {
            --primary: #333;
            --holiday-bg: #ffe4e1;
            --holiday-text: #d9534f;
            --work-bg: #e6f7ff;
            --work-text: #1890ff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            background: #f5f5f5;
            color: var(--primary);
        }
        .container {
            max-width: 100%;
            background: #fff;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 0;
        }
        /* 手機版窄螢幕優化：建立可橫向滾動的區域 */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-bottom: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 600px; /* 確保在手機上可滾動而不擠壓 */
        }
        th, td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 8px 4px;
        }
        th {
            background: #f9f9f9;
        }
        .holiday {
            background-color: var(--holiday-bg);
            color: var(--holiday-text);
        }
        select {
            width: 100%;
            padding: 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }
        button:active {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>115年 05月份 值勤排班表 (手機版)</h2>
    
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>姓名 (班別)</th>
                    <th>5/1 (五)</th>
                    <th>5/2 (六)</th>
                    <th class="holiday">5/3 (日)</th>
                    <th>5/4 (一)</th>
                    <th>5/5 (二)</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                <!-- 這裡用簡化版 5 天做示範，結構適用於 31 天 -->
                <tr>
                    <td>盧家慶 (日班)</td>
                    <td><select data-user="盧家慶" data-date="1"><option value="V">V</option><option value="休">休</option></select></td>
                    <td><select data-user="盧家慶" data-date="2"><option value="V">V</option><option value="休">休</option></select></td>
                    <td class="holiday"><select data-user="盧家慶" data-date="3"><option value="休">休</option><option value="V">V</option></select></td>
                    <td><select data-user="盧家慶" data-date="4"><option value="V">V</option><option value="休">休</option></select></td>
                    <td><select data-user="盧家慶" data-date="5"><option value="V">V</option><option value="休">休</option></select></td>
                </tr>
                <tr>
                    <td>蔡易倫 (晚班)</td>
                    <td><select data-user="蔡易倫" data-date="1"><option value="休">休</option><option value="V">V</option></select></td>
                    <td><select data-user="蔡易倫" data-date="2"><option value="休">休</option><option value="V">V</option></select></td>
                    <td class="holiday"><select data-user="蔡易倫" data-date="3"><option value="V">V</option><option value="休">休</option></select></td>
                    <td><select data-user="蔡易倫" data-date="4"><option value="休">休</option><option value="V">V</option></select></td>
                    <td><select data-user="蔡易倫" data-date="5"><option value="休">休</option><option value="V">V</option></select></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="btn-group">
        <button onclick="saveSchedule()">儲存排班 (Local Storage)</button>
        <button onclick="loadSchedule()" style="background:#28a745;">載入暫存</button>
    </div>
</div>

<script>
    // 儲存資料到 Local Storage
    function saveSchedule() {
        const selects = document.querySelectorAll('#schedule-body select');
        const data = [];
        
        selects.forEach(select => {
            data.push({
                user: select.getAttribute('data-user'),
                date: select.getAttribute('data-date'),
                value: select.value
            });
        });
        
        localStorage.setItem('black_project_schedule', JSON.stringify(data));
        alert('柔提醒您：排班資料已成功儲存至本機！');
    }

    // 從 Local Storage 載入資料
    function loadSchedule() {
        const savedData = localStorage.getItem('black_project_schedule');
        if (!savedData) {
            alert('沒有找到暫存資料。');
            return;
        }
        
        const data = JSON.parse(savedData);
        data.forEach(item => {
            const select = document.querySelector(`#schedule-body select[data-user="${item.user}"][data-date="${item.date}"]`);
            if (select) {
                select.value = item.value;
            }
        });
        alert('柔已幫您恢復上次的排班進度！');
    }

    // 頁面載入時自動讀取
    window.onload = loadSchedule;
</script>

</body>
</html>
