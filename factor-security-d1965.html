<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>シフター ShiftAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4a6ea9;
        }
        body { 
            margin:0; padding:0; font-family: 'Noto Sans TC', -apple-system, sans-serif; 
            background:#f8f9fa; color:#333; 
        }
        #header {
            background: var(--primary); color: white; padding: 14px 16px; 
            font-size: 19px; font-weight: 500; text-align: center;
            position: sticky; top: 0; z-index: 100;
        }
        #quick-bar {
            background: white; padding: 12px 8px; display: flex; flex-wrap: wrap; gap: 8px;
            border-bottom: 1px solid #ddd; box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .quick-btn {
            flex: 1; min-width: 70px; padding: 12px 8px; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 500; color: white; cursor: pointer;
            text-align: center;
        }
        #calendar { max-width: 100%; margin: 10px auto; }
        .fc-toolbar-title { font-size: 18px !important; }
        #salary-bar {
            background: white; padding: 16px 20px; margin: 8px 12px; border-radius: 16px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08); font-size: 16px;
        }
        .salary-row { display: flex; justify-content: space-between; margin: 8px 0; }
        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            z-index: 200; align-items: flex-end;
        }
        .modal-content {
            background: white; width: 100%; border-radius: 20px 20px 0 0;
            padding: 20px; max-height: 85vh; overflow-y: auto;
        }
        button { padding: 12px 20px; border-radius: 12px; font-size: 16px; }
        .dark-mode { background: #121212; color: #eee; }
        .dark-mode #header { background: #2c3e6e; }
    </style>
</head>
<body>
    <div id="header">シフター - 輪班給料計算</div>

    <!-- 快捷班別按鈕 -->
    <div id="quick-bar">
        <button class="quick-btn" style="background:#5cb85c" onclick="quickAdd('早番', 8, '#5cb85c')">早番</button>
        <button class="quick-btn" style="background:#f0ad4e" onclick="quickAdd('遅番', 8, '#f0ad4e')">遅番</button>
        <button class="quick-btn" style="background:#337ab7" onclick="quickAdd('日勤', 8, '#337ab7')">日勤</button>
        <button class="quick-btn" style="background:#d9534f" onclick="quickAdd('夜勤', 10, '#d9534f')">夜勤</button>
        <button class="quick-btn" style="background:#777" onclick="quickAdd('休み', 0, '#777')">休み</button>
        <button class="quick-btn" style="background:#8a6bb8" onclick="showCustomModal()">自訂</button>
    </div>

    <div id="calendar"></div>

    <!-- 薪資資訊 -->
    <div id="salary-bar">
        <div class="salary-row"><strong>今日已賺</strong> <span id="today-earn">¥0</span></div>
        <div class="salary-row"><strong>本月預估</strong> <span id="month-earn">¥0</span></div>
        <div class="salary-row"><strong>本月工時</strong> <span id="month-hours">0</span> 小時</div>
    </div>

    <!-- 自訂班別 Modal -->
    <div id="customModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:16px">自訂班別</h3>
            <input id="cName" placeholder="班別名稱" style="width:100%; padding:12px; margin-bottom:12px; border:1px solid #ddd; border-radius:8px;">
            <div style="display:flex; gap:12px; margin-bottom:12px;">
                <input id="cHours" type="number" placeholder="小時" value="8" style="flex:1; padding:12px; border:1px solid #ddd; border-radius:8px;">
                <input id="cColor" type="color" value="#4a6ea9" style="width:60px; height:48px; border:none;">
            </div>
            <button onclick="addCustom()" style="background:#4a6ea9; color:white; width:100%;">加入並套用</button>
            <button onclick="hideModal()" style="background:#eee; width:100%; margin-top:8px;">取消</button>
        </div>
    </div>

    <script>
        let calendar;
        let events = JSON.parse(localStorage.getItem('shiftar_events') || '[]');
        let hourlyRate = 176;   // 預設時薪（台灣常見，可自行修改）

        function saveEvents() {
            localStorage.setItem('shiftar_events', JSON.stringify(events));
            updateSalary();
        }

        function quickAdd(title, hours, color) {
            const selected = calendar.getOption('selectedDates') || [];
            if (selected.length === 0) {
                alert('請先在月曆點選日期（可多選）');
                return;
            }
            selected.forEach(dateStr => {
                events.push({
                    id: 'evt_' + Date.now() + Math.random().toString(36).substr(2),
                    title: title,
                    start: dateStr,
                    allDay: true,
                    extendedProps: { hours: hours, color: color }
                });
            });
            calendar.refetchEvents();
            saveEvents();
        }

        function showCustomModal() {
            document.getElementById('customModal').style.display = 'flex';
        }

        function hideModal() {
            document.getElementById('customModal').style.display = 'none';
        }

        function addCustom() {
            const name = document.getElementById('cName').value.trim() || '自訂班';
            const hours = parseFloat(document.getElementById('cHours').value) || 8;
            const color = document.getElementById('cColor').value;

            hideModal();

            const selected = calendar.getOption('selectedDates') || [];
            if (selected.length === 0) {
                alert('請先點選日期');
                return;
            }
            selected.forEach(dateStr => {
                events.push({
                    id: 'evt_' + Date.now() + Math.random().toString(36).substr(2),
                    title: name,
                    start: dateStr,
                    allDay: true,
                    extendedProps: { hours: hours, color: color }
                });
            });
            calendar.refetchEvents();
            saveEvents();
        }

        function updateSalary() {
            const now = new Date();
            const thisMonth = now.getMonth();
            let todayEarn = 0;
            let monthEarn = 0;
            let monthHours = 0;

            events.forEach(ev => {
                const d = new Date(ev.start);
                if (d.getMonth() !== thisMonth) return;
                const h = ev.extendedProps?.hours || 0;
                const pay = h * hourlyRate;
                monthHours += h;
                monthEarn += pay;
                if (d.toDateString() === now.toDateString()) todayEarn = pay;
            });

            document.getElementById('today-earn').textContent = '¥' + Math.round(todayEarn).toLocaleString('zh-TW');
            document.getElementById('month-earn').textContent = '¥' + Math.round(monthEarn).toLocaleString('zh-TW');
            document.getElementById('month-hours').textContent = monthHours.toFixed(1);
        }

        // 初始化 FullCalendar
        document.addEventListener('DOMContentLoaded', function() {
            const calEl = document.createElement('div');
            document.getElementById('calendar').appendChild(calEl);

            calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth',
                locale: 'zh-tw',
                selectable: true,
                selectMirror: true,
                events: events,
                select: function(info) {
                    // 多選後可直接用上方快捷按鈕
                },
                eventClick: function(info) {
                    if (confirm(`刪除「${info.event.title}」？`)) {
                        events = events.filter(e => e.id !== info.event.id);
                        calendar.refetchEvents();
                        saveEvents();
                    }
                },
                eventDidMount: function(info) {
                    const color = info.event.extendedProps.color;
                    if (color) {
                        info.el.style.backgroundColor = color;
                        info.el.style.borderColor = color;
                        info.el.style.color = '#fff';
                    }
                },
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: ''
                }
            });

            calendar.render();
            updateSalary();

            // 每 3 秒更新一次薪資
            setInterval(updateSalary, 3000);
        });

        // 讓 iPhone 感覺更像 App
        window.addEventListener('load', () => {
            if (window.navigator.standalone) {
                console.log('Running as installed PWA');
            }
        });
    </script>
</body>
</html>
