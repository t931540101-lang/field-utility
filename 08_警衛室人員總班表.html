import os

# 定義新的 HTML 內容
html_content = """
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K9 警衛輪班總管理系統 - 公司格式版</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #d32f2f; --bg: #f4f7f6; --border: #ddd; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        
        .header-box { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .month-ctrl { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.2rem; }
        .btn-nav { padding: 6px 15px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 5px; }
        
        .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        table { border-collapse: collapse; min-width: 1600px; width: 100%; }
        th, td { border: 1px solid var(--border); padding: 6px 2px; text-align: center; font-size: 12px; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 2; }
        
        .sticky-left { position: sticky; left: 0; background: #fff !important; z-index: 10; border-right: 2px solid #bbb !important; width: 50px; }
        .sticky-left-2 { position: sticky; left: 50px; background: #fff !important; z-index: 10; border-right: 2px solid #bbb !important; width: 80px; }
        
        input { width: 90%; border: none; text-align: center; font-weight: bold; background: transparent; pointer-events: none; }
        .can-edit input { pointer-events: auto; background: #fff9c4; border-radius: 3px; }
        
        /* 班表代號配色 */
        .val-D1, .val-D2, .val-D3 { color: #0d47a1; background: #e3f2fd; } /* 日班系列 */
        .val-E1, .val-E2, .val-E3 { color: #4a148c; background: #f3e5f5; } /* 夜E班系列 */
        .val-C1, .val-C2, .val-C3 { color: #1b5e20; background: #e8f5e9; } /* 夜B班系列 */
        .val-休, .val-X { color: #d32f2f; background: #ffebee; }
        
        .is-holiday { background: #fff5f5; color: #e53935; } /* 假日欄位顏色 */
        
        .lock-btn { padding: 8px 16px; border-radius: 20px; border: none; background: #607d8b; color: #fff; cursor: pointer; }
        .lock-btn.unlocked { background: #43a047; }
        .export-btn { padding: 8px 16px; border-radius: 20px; border: none; background: #1565c0; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="header-box">
    <div class="month-ctrl">
        <button class="btn-nav" onclick="changeMonth(-1)">❮</button>
        <span id="currentMonthDisplay">載入中...</span>
        <button class="btn-nav" onclick="changeMonth(1)">❯</button>
    </div>
    <div style="display:flex; gap:8px;">
        <button id="lockBtn" class="lock-btn" onclick="toggleLock()">🔒 唯讀模式</button>
        <button class="export-btn" onclick="exportMonthToExcel()">📄 匯出符合公司格式</button>
    </div>
</div>

<div class="table-container">
    <table id="rosterTable">
        <thead>
            <tr id="dateHeader"></tr>
            <tr id="weekHeader"></tr>
        </thead>
        <tbody id="rosterBody"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48",
        databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com",
        projectId: "factor-security-d1965",
        appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let curYear = 2026;
    let curMonth = 4; // 預設 5 月 (0-indexed)
    let isEditing = false;

    // 根據截圖定義的班別對應邏輯 (這部分是核心修改)
    // 假設：星期日為例假日(1)，星期六為休息日(2)，其餘為平日
    function getShiftCode(baseVal, dayOfWeek) {
        if (!baseVal) return "";
        let suffix = "";
        if (dayOfWeek === 0) suffix = "1"; // 例假日
        else if (dayOfWeek === 6) suffix = "2"; // 休息日
        else suffix = ""; // 平日
        
        if (baseVal.includes("日")) return "D" + (suffix || "");
        if (baseVal.includes("夜E")) return "E" + (suffix || "");
        if (baseVal.includes("夜B")) return "C" + (suffix || "");
        return baseVal;
    }

    const staffData = [
        {group: "總務", name: "盧家慶"}, {group: "總務", name: "何鴻隆"},
        {group: "總務", name: "蔡易倫"}, {group: "總務", name: "邱鴻鈞"},
        {group: "總務", name: "柳旭洲"}, {group: "總務", name: "魏榮志"}
    ];

    const weekNames = ["日", "一", "二", "三", "四", "五", "六"];

    function initTable() {
        const dHead = document.getElementById('dateHeader');
        const wHead = document.getElementById('weekHeader');
        const tbody = document.getElementById('rosterBody');
        dHead.innerHTML = `<th class="sticky-left">組別</th><th class="sticky-left-2">姓名</th>`;
        wHead.innerHTML = `<th class="sticky-left">-</th><th class="sticky-left-2">-</th>`;
        tbody.innerHTML = '';
        
        document.getElementById('currentMonthDisplay').innerText = `${curYear}年 ${curMonth + 1}月`;
        const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

        for (let d = 1; d <= daysInMonth; d++) {
            const dateTh = document.createElement('th');
            dateTh.innerText = d;
            dHead.appendChild(dateTh);
            
            const dayOfWeek = new Date(curYear, curMonth, d).getDay();
            const weekTh = document.createElement('th');
            weekTh.innerText = weekNames[dayOfWeek];
            if(dayOfWeek === 0 || dayOfWeek === 6) weekTh.className = "is-holiday";
            wHead.appendChild(weekTh);
        }

        staffData.forEach(p => {
            const tr = document.createElement('tr');
            let rowHtml = `<td class="sticky-left">${p.group}</td><td class="sticky-left-2"><b>${p.name}</b></td>`;
            for (let d = 1; d <= daysInMonth; d++) {
                rowHtml += `<td><input id="${curYear}_${curMonth+1}_${p.name}_${d}" onchange="saveShift('${p.name}', ${d}, this.value)"></td>`;
            }
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
        });

        listenToData(daysInMonth);
    }

    function listenToData(days) {
        db.ref('guardSchedules').off();
        db.ref('guardSchedules').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            staffData.forEach(p => {
                for (let d = 1; d <= days; d++) {
                    const id = `${curYear}_${curMonth+1}_${p.name}_${d}`;
                    const val = data[id] || "";
                    const el = document.getElementById(id);
                    if(el) {
                        el.value = val;
                        el.parentElement.className = val ? 'val-' + val.replace(/[0-9]/g, '') : '';
                    }
                }
            });
        });
    }

    function saveShift(name, day, val) {
        const id = `${curYear}_${curMonth+1}_${name}_${day}`;
        db.ref('guardSchedules/' + id).set(val);
    }

    function changeMonth(dir) {
        curMonth += dir;
        if (curMonth < 0) { curMonth = 11; curYear--; }
        else if (curMonth > 11) { curMonth = 0; curYear++; }
        initTable();
    }

    function toggleLock() {
        if(!isEditing && prompt("人事管理密碼：") === "8888") {
            isEditing = true;
            document.body.classList.add('can-edit');
            document.getElementById('lockBtn').innerText = "🔓 編輯模式";
            document.getElementById('lockBtn').classList.add('unlocked');
        } else if(isEditing) {
            isEditing = false;
            document.body.classList.remove('can-edit');
            document.getElementById('lockBtn').innerText = "🔒 唯讀模式";
            document.getElementById('lockBtn').classList.remove('unlocked');
        }
    }

    async function exportMonthToExcel() {
        const snapshot = await db.ref('guardSchedules').once('value');
        const allData = snapshot.val() || {};
        const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
        
        const rows = [];
        // 建立標題列
        const header = ['組別', '姓名'];
        for(let d=1; d<=daysInMonth; d++) header.push(d);
        rows.push(header);

        staffData.forEach(p => {
            const row = [p.group, p.name];
            for(let d=1; d<=daysInMonth; d++) {
                const dayOfWeek = new Date(curYear, curMonth, d).getDay();
                const key = `${curYear}_${curMonth+1}_${p.name}_${d}`;
                let val = allData[key] || "";
                // 自動轉換為截圖中的代號
                row.push(getShiftCode(val, dayOfWeek));
            }
            rows.push(row);
        });

        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "月排班表");
        XLSX.writeFile(wb, `公司格式排班表_${curYear}_${curMonth+1}.xlsx`);
    }

    initTable();
</script>
</body>
</html>
"""

# 將更新後的代碼寫入檔案
with open("roster_v2.html", "w", encoding="utf-8") as f:
    f.write(html_content)
