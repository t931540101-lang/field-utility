<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排班日曆 - 選班互動版</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --border-color: #f0f0f0;
            --sunday-color: #d9534f;
            --saturday-color: #428bca;
            --primary-teal: #2d8a8a; /* 仿圖中的深青色 */
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; background: var(--bg-color); font-family: sans-serif; overflow: hidden; }

        /* Header & Weekdays */
        header { padding: 15px 0 5px; text-align: center; border-bottom: 1px solid var(--border-color); }
        .month-num { font-size: 32px; font-weight: bold; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; padding: 10px 0; font-size: 13px; border-bottom: 1px solid var(--border-color); }
        .weekdays div:first-child { color: var(--sunday-color); }
        .weekdays div:last-child { color: var(--saturday-color); }

        /* Calendar Grid */
        .calendar-grid { flex: 1; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 1fr; width: 100%; }
        .day-cell { border-right: 0.5px solid var(--border-color); border-bottom: 0.5px solid var(--border-color); display: flex; flex-direction: column; align-items: center; padding-top: 5px; cursor: pointer; }
        .day-cell:active { background-color: #f9f9f9; }
        .day-cell.selected { outline: 3px solid var(--primary-teal); outline-offset: -3px; z-index: 5; }
        .date-num { font-size: 20px; }

        /* Shift Labels */
        .shift-label { font-size: 11px; width: 85%; padding: 4px 0; border-radius: 6px; text-align: center; margin-top: 2px; }
        .shift-rest { background-color: #ffd9d9; }
        .shift-b { background-color: #d1e9ff; }
        .shift-special { background-color: #ffebd1; }
        .shift-affair { background-color: #fff9c4; }

        /* Bottom Sheet (選班選單) */
        #shiftSheet {
            position: fixed; bottom: -100%; left: 0; width: 100%; background: white;
            transition: bottom 0.3s ease; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            border-radius: 20px 20px 0 0; display: flex; flex-direction: column;
        }
        #shiftSheet.active { bottom: 0; }
        .sheet-header { background: var(--primary-teal); color: white; padding: 12px; text-align: center; font-size: 14px; border-radius: 20px 20px 0 0; }
        
        .shift-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 20px; background: #fdfdfd; }
        .opt-btn { border: 1px solid #ddd; border-radius: 12px; padding: 15px; display: flex; flex-direction: column; align-items: center; cursor: pointer; background: white; }
        .opt-btn .title { font-weight: bold; margin-bottom: 4px; }
        .opt-btn .sub { font-size: 10px; color: #999; }

        .sheet-footer { display: flex; justify-content: space-around; padding: 15px; border-top: 1px solid #eee; }
        .close-btn { color: var(--primary-teal); font-weight: bold; cursor: pointer; }

        /* Overlay */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 90; }
        #overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <div class="month-num">4</div>
        <div style="font-size: 14px; font-weight: 600;">4月 2026</div>
    </header>

    <div class="weekdays">
        <div>週日</div><div>週一</div><div>週二</div><div>週三</div><div>週四</div><div>週五</div><div>週六</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>

    <div id="overlay"></div>
    <div id="shiftSheet">
        <div class="sheet-header">點擊你想要輸入資訊的輪班</div>
        <div class="shift-options">
            <div class="opt-btn" onclick="setShift('休假', 'shift-rest')">
                <span class="title" style="color:#d9534f">休假</span>
                <span class="sub">台灣精銳</span>
            </div>
            <div class="opt-btn" onclick="setShift('事假', 'shift-affair')">
                <span class="title" style="color:#fbc02d">事假</span>
                <span class="sub">07:00 - 19:00</span>
            </div>
            <div class="opt-btn" onclick="setShift('日B班', 'shift-b')">
                <span class="title" style="color:#428bca">日B班</span>
                <span class="sub">07:00 - 19:00</span>
            </div>
            <div class="opt-btn" onclick="setShift('例假', 'shift-rest')">
                <span class="title" style="color:#d9534f">例假</span>
                <span class="sub">台灣精銳</span>
            </div>
        </div>
        <div class="sheet-footer">
            <div class="close-btn" onclick="closeSheet()">✖ 關閉</div>
            <div class="close-btn" onclick="closeSheet()">⚙️ 設定</div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('calendarGrid');
        const sheet = document.getElementById('shiftSheet');
        const overlay = document.getElementById('overlay');
        let selectedCell = null;

        // 生成 4 月份日期 (2026/4/1 是週三)
        const firstDay = 3; 
        const daysInMonth = 30;

        for (let i = 0; i < firstDay + daysInMonth; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            if (i >= firstDay) {
                const date = i - firstDay + 1;
                cell.innerHTML = `<div class="date-num">${date}</div><div class="label-container"></div>`;
                cell.onclick = () => openSheet(cell);
                // 週末顏色
                if (i % 7 === 0) cell.style.color = 'var(--sunday-color)';
                if (i % 7 === 6) cell.style.color = 'var(--saturday-color)';
            }
            grid.appendChild(cell);
        }

        function openSheet(cell) {
            if (selectedCell) selectedCell.classList.remove('selected');
            selectedCell = cell;
            selectedCell.classList.add('selected');
            sheet.classList.add('active');
            overlay.classList.add('active');
        }

        function closeSheet() {
            sheet.classList.remove('active');
            overlay.classList.remove('active');
            if (selectedCell) selectedCell.classList.remove('selected');
        }

        function setShift(name, type) {
            const container = selectedCell.querySelector('.label-container');
            container.innerHTML = `<div class="shift-label ${type}">${name}</div>`;
            closeSheet();
        }

        overlay.onclick = closeSheet;
    </script>
</body>
</html>
