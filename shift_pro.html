<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑哥專業排班表</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fff; }
        .header { text-align: center; padding: 15px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #eee; }
        .week-bar { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 12px; color: #666; padding: 10px 0; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #eee; }
        .cell { min-height: 80px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 5px; position: relative; }
        .date { font-size: 14px; margin-bottom: 5px; }
        .tag { font-size: 9px; padding: 2px 5px; border-radius: 10px; text-align: center; margin-top: 2px; }
        .tag-b { background: #d1eaff; color: #3a5a8a; }
        .tag-rest { background: #ffebee; color: #d32f2f; }
        /* 底部導航欄與 FAB 保持你要求的專業佈局 */
    </style>
</head>
<body>

<div class="header" id="monthDisplay">2026年 6月</div>
<div class="week-bar">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
</div>
<div class="grid" id="calendarGrid"></div>

<script>
    const year = 2026, month = 5; // JS 月份 0-11，所以 5 是 6月
    const grid = document.getElementById('calendarGrid');
    
    // 計算當月天數與起始星期
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    function render() {
        grid.innerHTML = '';
        // 補上月初前的空白
        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        
        // 渲染日期
        for(let i=1; i<=daysInMonth; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<div class="date">${i}</div>`;
            // 這裡未來會接資料庫
            grid.appendChild(cell);
        }
    }
    render();
</script>
</body>
</html>
