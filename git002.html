<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>警衛勤務排班表</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000;
            text-align: center;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
        .shift-day {
            background-color: #e0f7fa;
        }
        .shift-night {
            background-color: #ffe082;
        }
    </style>
</head>
<body>
    <h1>警衛勤務排班表</h1>
    <table>
        <thead>
            <tr>
                <th>日期</th>
                <th>星期</th>
                <th>早班 (08:00 - 16:00)</th>
                <th>中班 (16:00 - 00:00)</th>
                <th>晚班 (00:00 - 08:00)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>2026-03-07</td>
                <td>星期六</td>
                <td class="shift-day">張武</td>
                <td class="shift-day">陳明</td>
                <td class="shift-night">李華</td>
            </tr>
            <tr>
                <td>2026-03-08</td>
                <td>星期日</td>
                <td class="shift-day">黃蓮</td>
                <td class="shift-day">林志</td>
                <td class="shift-night">周凱</td>
            </tr>
            <tr>
                <td>2026-03-09</td>
                <td>星期一</td>
                <td class="shift-day">李楠</td>
                <td class="shift-day">吳昇</td>
                <td class="shift-night">鄭磊</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
