<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黑曜石排班監控系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #e8e2d0; margin: 0; overflow-x: hidden; }
        .grid-cell { min-height: 75px; border-right: 1px solid #c2b99a; border-bottom: 1px solid #c2b99a; transition: all 0.2s; }
        .val-text { font-weight: 900; font-size: 13px; text-align: center; }
        .color-off { color: #c0392b; }
        .color-special { color: #d4af37; }
        .color-day-shift { color: #2563eb; }
        .color-night-shift { color: #4b5563; }
        .scroll-container { padding-bottom: 220px; overflow-y: auto; }
        .bottom-panel { position: fixed; bottom: 0; width: 100%; max-width: 512px; background: rgba(255,255,255,0.98); padding: 10px; border-top: 2px solid #2e5a44; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // Firebase 初始化
        const firebaseConfig = {
            apiKey: "AIzaSyDCYlcxrefMoj7KljbiKX-BFNz7xL8ayR4",
            authDomain: "m-police-core-4756b.firebaseapp.com",
            databaseURL: "https://m-police-core-4756b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "m-police-core-4756b",
            storageBucket: "m-police-core-4756b.firebasestorage.app",
            messagingSenderId: "285011163382",
            appId: "1:285011163382:web:efc7a8c7fbc86f4768d4d7"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function App() {
            const [data, setData] = useState({});
            const [shiftText, setShiftText] = useState("日B");
            const [curYear] = useState(new Date().getFullYear());
            const [curMonth, setCurMonth] = useState(new Date().getMonth());
            const shiftHoursMap = { "日B": 12, "夜B": 12, "夜E": 12, "國定": 12 };

            // 實時監聽雲端資料
            useEffect(() => {
                const ref = db.ref('myNewSchedule');
                ref.on('value', (snapshot) => {
                    setData(snapshot.val() || {});
                });
                return () => ref.off();
            }, []);

            const handleCellClick = (day) => {
                const cellId = `${curYear}_${curMonth + 1}_${day}`;
                db.ref('myNewSchedule/' + cellId).set(shiftText);
            };

            const getNoteStyle = (note) => {
                if (note.includes("休假") || note.includes("例假")) return "color-off";
                if (note.includes("特休")) return "color-special";
                if (note.includes("日")) return "color-day-shift";
                if (note.includes("夜")) return "color-night-shift";
                return "text-gray-700";
            };

            const currentPrefix = `${curYear}_${curMonth + 1}_`;
            const monthKeys = Object.keys(data).filter(key => key.startsWith(currentPrefix));
            const workDays = monthKeys.filter(k => data[k].includes("日") || data[k].includes("夜")).length;
            const offDays = monthKeys.filter(k => data[k].includes("休") || data[k].includes("例") || data[k].includes("特")).length;
            const totalHours = monthKeys.reduce((acc, k) => acc + (shiftHoursMap[data[k]] || 0), 0);
            
            const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
            const firstDay = new Date(curYear, curMonth, 1).getDay();

            return (
                <div className="max-w-[512px] mx-auto min-h-screen bg-[#e8e2d0] shadow-2xl scroll-container">
                    <div className="bg-black text-white p-3 sticky top-0 z-40">
                        <div className="flex justify-between items-center text-lg font-black">{curYear}年 {curMonth + 1}月</div>
                    </div>
                    <div className="grid grid-cols-7 border-t border-[#c2b99a]">
                        {["日","一","二","三","四","五","六"].map(w => (
                            <div key={w} className="text-center py-2 bg-[#f0e9d2] font-bold text-xs text-gray-600">{w}</div>
                        ))}
                        {Array.from({ length: firstDay }).map((_, i) => <div key={i} className="grid-cell"></div>)}
                        {Array.from({ length: daysInMonth }).map((_, i) => {
                            const day = i + 1;
                            const note = data[`${curYear}_${curMonth + 1}_${day}`] || "";
                            return (
                                <div key={day} onClick={() => handleCellClick(day)} className="grid-cell p-1 flex flex-col cursor-pointer active:bg-amber-100">
                                    <div className="text-xs text-gray-400 font-bold">{day}</div>
                                    <div className={`mt-auto val-text ${getNoteStyle(note)}`}>{note}</div>
                                </div>
                            );
                        })}
                    </div>
                    <div className="bottom-panel">
                        <div className="grid grid-cols-3 gap-1 mb-2 px-1 text-[11px] font-black text-gray-700 bg-white p-2 rounded border border-gray-200">
                            <div className="text-center text-blue-600"><div>上班</div><div>{workDays} 天</div></div>
                            <div className="text-center text-orange-600 border-x border-gray-200"><div>工時</div><div>{totalHours} 時</div></div>
                            <div className="text-center text-red-600"><div>休息</div><div>{offDays} 天</div></div>
                        </div>
                        <div className="grid grid-cols-4 gap-1.5">
                            {["日B", "夜B", "夜E", "休假", "例假", "特休", "國定", "清空"].map(s => (
                                <button key={s} onClick={()=>s==='清空'?setShiftText(''):setShiftText(s)} 
                                    className="bg-white border border-gray-300 py-1.5 rounded-lg text-[11px] font-black text-gray-700 active:bg-[#2e5a44] active:text-white shadow-sm">
                                    {s}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
