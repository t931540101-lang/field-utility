<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣精銳科技 - 車輛物品進出登記表</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent: #ff9f43; /* 專屬物流橘 */
            --success: #28a745;
            --danger: #dc3545;
            --border: #333333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 380px; }
        
        .header { margin: 8px 0 12px 0; text-align: center; }
        .header h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: 1px; }
        .header p { font-size: 0.75rem; color: var(--text-sub); margin-top: 4px; }
        
        .form-card {
            background: var(--card-bg);
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-group { flex: 1; display: flex; flex-direction: column; }
        
        label { font-size: 0.75rem; color: var(--text-sub); margin-bottom: 4px; font-weight: bold; }
        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        
        /* 依據現場習慣，車號大字突出 */
        .plate-input {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--accent);
            text-align: center;
        }
        
        .btn-submit {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            color: #121212;
            background: var(--accent);
            margin-top: 5px;
        }
        .btn-submit:active { opacity: 0.8; }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }
        
        .table-title {
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-bottom: 6px;
        }
        .table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            text-align: left;
            min-width: 580px; /* 寬度優化，在手機上更好左右滑動 */
        }
        th, td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        th { background: #252525; color: var(--accent); font-weight: bold; }
        tr.inside { background: rgba(255, 159, 67, 0.05); }
        
        .btn-out {
            background: rgba(40, 167, 69, 0.15);
            color: #4cd137;
            border: 1px solid var(--success);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }
        .text-muted { color: var(--text-sub); }
        .badge-plate {
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 4px;
            color: #ffffff;
            border: 1px solid #555;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>台灣精銳科技股份有限公司</h1>
        <p>🚚 車輛.物品進出登記管理中樞 v2.0</p>
    </div>

    <div class="form-card" style="padding: 10px; margin-bottom: 10px; background: #161616;">
        <div class="form-group">
            <label style="color: var(--accent);">✍️ 當班值勤守衛 (設定一次即可)</label>
            <input type="text" id="gGuard" class="form-input" placeholder="請輸入守衛姓名 (例: 陳大明)" value="守衛" style="padding: 6px 10px; font-size: 0.85rem;">
        </div>
    </div>

    <div class="form-card">
        <div class="form-group" style="margin-bottom: 10px;">
            <label>公司行號</label>
            <input type="text" id="tCompany" class="form-input" placeholder="例: 長沙 / 洪福 / KTJ" autocomplete="off">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>司機姓名</label>
                <input type="text" id="tDriver" class="form-input" placeholder="例: 吳家沐" autocomplete="off">
            </div>
            <div class="form-group">
                <label>車號</label>
                <input type="text" id="tPlate" class="form-input plate-input" placeholder="例: KEC-1212" autocomplete="off">
            </div>
        </div>

        <button class="btn-submit" onclick="checkInTruck()">🚚 簽收進廠 (進貨時間)</button>
    </div>

    <div class="status-bar">
        <span>廠內作業車輛：<strong id="insideCount" style="color:var(--accent)">0</strong> 輛</span>
        <span style="color:var(--danger); cursor:pointer;" onclick="clearAllData()">🗑️ 清空本日表格</span>
    </div>

    <div class="table-title">
        <span>📋 今日車輛進出流水線 (左右滑動檢視)</span>
    </div>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>月/日</th>
                    <th>公司行號</th>
                    <th>姓名</th>
                    <th>車號</th>
                    <th>進貨時間</th>
                    <th>出貨時間</th>
                    <th>守衛</th>
                    <th>管理動作</th>
                </tr>
            </thead>
            <tbody id="truckTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let trucks = [];

    // 初始化：載入 Local Storage
    document.addEventListener('DOMContentLoaded', () => {
        const localData = localStorage.getItem('apex_trucks_v2');
        if (localData) {
            trucks = JSON.parse(localData);
        }
        renderTable();
    });

    // 登記車輛進廠
    function checkInTruck() {
        const company = document.getElementById('tCompany').value.trim();
        const driver = document.getElementById('tDriver').value.trim();
        const plate = document.getElementById('tPlate').value.trim();
        const guard = document.getElementById('gGuard').value.trim();

        if (!company || !plate) {
            alert('小黑哥，公司行號和車號是必填的喔！');
            return;
        }

        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()}`;
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        const newTruck = {
            id: Date.now(),
            date: dateStr,
            company: company,
            driver: driver || "—",
            plate: plate.toUpperCase(),
            timeIn: timeStr,
            timeOut: null,
            guard: guard || "—"
        };

        trucks.push(newTruck);
        saveAndRefresh();

        // 清空輸入框（保留守衛姓名方便下一筆登記）
        document.getElementById('tCompany').value = '';
        document.getElementById('tDriver').value = '';
        document.getElementById('tPlate').value = '';
    }

    // 車輛出廠
    function checkOutTruck(id) {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        
        const truck = trucks.find(t => t.id === id);
        if (truck) {
            truck.timeOut = timeStr;
            saveAndRefresh();
        }
    }

    function saveAndRefresh() {
        localStorage.setItem('apex_trucks_v2', JSON.stringify(trucks));
        renderTable();
    }

    // 渲染車輛表格
    function renderTable() {
        const tbody = document.getElementById('truckTableBody');
        const insideCountEl = document.getElementById('insideCount');
        
        let insideCount = 0;
        const displayData = [...trucks].reverse();

        if (displayData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#555;">目前尚無車輛物品進出紀錄</td></tr>';
            insideCountEl.innerText = 0;
            return;
        }

        tbody.innerHTML = displayData.map(t => {
            const isInside = t.timeOut === null;
            if (isInside) insideCount++;

            return `
                <tr class="${isInside ? 'inside' : ''}">
                    <td>${t.date}</td>
                    <td><strong>${t.company}</strong></td>
                    <td>${t.driver}</td>
                    <td><span class="badge-plate">${t.plate}</span></td>
                    <td style="color: var(--accent); font-weight: bold;">${t.timeIn}</td>
                    <td style="font-weight: bold;">${t.timeOut ? t.timeOut : '<span style="color:#ff9f43; font-weight:normal;">廠區作業中</span>'}</td>
                    <td><span class="text-muted">${t.guard}</span></td>
                    <td>
                        ${isInside ? 
                            `<button class="btn-out" onclick="checkOutTruck(${t.id})">放行出廠 🚪</button>` : 
                            `<span style="color:#888;">已離廠</span>`
                        }
                    </td>
                </tr>
            `;
        }).join('');

        insideCountEl.innerText = insideCount;
    }

    // 清空數據
    function clearAllData() {
        if (confirm('小黑哥，確定要清空今天的車輛進出紀錄嗎？')) {
            trucks = [];
            saveAndRefresh();
        }
    }
</script>

</body>
</html>
