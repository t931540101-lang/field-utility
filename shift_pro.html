<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小黑哥排班表 Pro</title>
    <style>
        :root { --border: #f0f0f0; }
        body { margin: 0; font-family: sans-serif; background: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); flex-grow: 1; border-top: 1px solid var(--border); }
        .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 2px; display: flex; flex-direction: column; align-items: center; }
        
        /* 圓潤彈窗樣式 */
        #modal { display: none; position: fixed; bottom: 0; width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .shift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; background: #f8f9fa; border-radius: 10px; text-align: center; font-size: 14px; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="changeMonth(-1)">＜</button>
    <div id="monthDisplay">2026年 6月</div>
    <button onclick="changeMonth(1)">＞</button>
</div>

<div class="grid" id="calendar"></div>

<div id="modal" onclick="this.style.display='none'">
    <div class="shift-grid" id="shiftOptions" onclick="event.stopPropagation()"></div>
</div>

<script>
    let date = new Date(2026, 5, 1);
    
    function render() {
        const year = date.getFullYear();
        const month = date.getMonth();
        document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
        
        const grid = document.getElementById('calendar');
        grid.innerHTML = '';
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        for(let i=1; i<=daysInMonth; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerHTML = `<div class="date">${i}</div>`;
            cell.onclick = () => document.getElementById('modal').style.display = 'block';
            grid.appendChild(cell);
        }
    }

    function changeMonth(delta) {
        date.setMonth(date.getMonth() + delta);
        render();
    }

    // 初始化選單
    const shifts = ["日B", "夜B", "夜E", "休假", "例假", "特休", "國定假日", "換班"];
    const options = document.getElementById('shiftOptions');
    shifts.forEach(s => {
        let div = document.createElement('div');
        div.className = 'btn';
        div.innerText = s;
        div.onclick = () => { alert('選了' + s); document.getElementById('modal').style.display='none'; };
        options.appendChild(div);
    });

    render();
</script>
</body>
</html>
