<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黑曜石排班-離線版</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #e8e2d0; margin: 0; }
        .grid-cell { min-height: 75px; border-right: 1px solid #c2b99a; border-bottom: 1px solid #c2b99a; }
        .val-text { font-weight: 900; font-size: 13px; text-align: center; }
        .bottom-panel { position: fixed; bottom: 0; width: 100%; max-width: 512px; background: rgba(255,255,255,0.98); padding: 10px; border-top: 2px solid #2e5a44; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState(() => {
                const saved = localStorage.getItem('localSchedule');
                return saved ? JSON.parse(saved) : {};
            });
            const [userName, setUserName] = useState(localStorage.getItem('guardName') || "小黑哥");
            const [curYear] = useState(new Date().getFullYear());
            const [curMonth, setCurMonth] = useState(new Date().getMonth());
            const [shiftText, setShiftText] = useState("日B");

            useEffect(() => {
                localStorage.setItem('localSchedule', JSON.stringify(data));
            }, [data]);

            const handleCellClick = (day) => {
                const cellId = `${curYear}_${curMonth + 1}_${day}`;
                setData(prev => ({ ...prev, [cellId]: shiftText }));
            };

            const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
            const firstDay = new Date(curYear, curMonth, 1).getDay();

            return (
                <div className="max-w-lg mx-auto pb-40 min-h-screen bg-[#e8e2d0]">
                    <div className="bg-black text-white p-3 text-center font-black">
                        {userName} - {curYear}年{curMonth + 1}月 (離線存檔)
                    </div>
                    <div className="grid grid-cols-7 border-t border-[#c2b99a]">
                        {["日","一","二","三","四","五","六"].map(w => (
                            <div key={w} className="text-center py-2 bg-[#f0e9d2] font-bold text-xs">{w}</div>
                        ))}
                        {Array.from({ length: firstDay }).map((_, i) => <div key={i} className="grid-cell"></div>)}
                        {Array.from({ length: daysInMonth }).map((_, i) => {
                            const day = i + 1;
                            const note = data[`${curYear}_${curMonth + 1}_${day}`] || "";
                            return (
                                <div key={day} onClick={() => handleCellClick(day)} className="grid-cell p-1 flex flex-col cursor-pointer active:bg-yellow-100">
                                    <div className="text-xs text-gray-500 font-bold">{day}</div>
                                    <div className="mt-auto val-text text-[#2e5a44]">{note}</div>
                                </div>
                            );
                        })}
                    </div>
                    <div className="bottom-panel">
                        <input className="w-full p-2 mb-2 border rounded text-center font-bold" value={shiftText} onChange={(e)=>setShiftText(e.target.value)} />
                        <div className="grid grid-cols-4 gap-2">
                            {["日B", "夜B", "夜E", "休假", "例假", "特休", "國定", "清空"].map(s => (
                                <button key={s} onClick={()=>s==='清空'?setShiftText(''):setShiftText(s)} className="bg-white border py-2 rounded text-xs font-bold active:bg-[#2e5a44] active:text-white">
                                    {s}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
