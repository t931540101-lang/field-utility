<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小黑哥排班系統 - Pro</title>
    <style>
        :root { --main-bg: #f8f9fa; --accent: #2d8a8a; --text-main: #333; }
        body { margin: 0; background: var(--main-bg); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        header { background: #fff; padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); flex: 1; gap: 1px; background: #ddd; }
        .cell { background: #fff; padding: 8px 2px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .date { font-size: 14px; margin-bottom: 4px; }
        .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; width: 85%; }
        .tag-b { background: #e1f5fe; color: #0277bd; }
        .tag-rest { background: #ffebee; color: #c62828; }
        .nav { height: 60px; background: #fff; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ddd; }
        .fab { width: 45px; height: 45px; background: var(--accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<header>2026年 6月</header>
<div class="grid" id="calendar"></div>
<nav class="nav">
    <div>今日</div>
    <div class="fab">+</div>
    <div>其它</div>
</nav>

<script>
    const calendar = document.getElementById('calendar');
    const days = 30;
    // 模擬數據：你可以看到專業版標籤的結構更緊湊
    const data = { 2: {name: '日B班', type: 'tag-b'}, 3: {name: '休假', type: 'tag-rest'} };

    for(let i=1; i<=days; i++) {
        let div = document.createElement('div');
        div.className = 'cell';
        let label = data[i] ? `<div class="tag ${data[i].type}">${data[i].name}</div>` : '';
        div.innerHTML = `<div class="date">${i}</div>${label}`;
        calendar.appendChild(div);
    }
</script>
</body>
</html>
