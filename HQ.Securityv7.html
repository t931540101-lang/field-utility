<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-SECURITY HQ V8.2 | COMMAND CENTER</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --cyan: #00f2ff; --warn: #ff4d4f; --bg: #050505; --gold: #f1c40f; --green: #2ecc71; }
        body { background: var(--bg); color: white; font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: -1; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .hq-header { background: #000; padding: 15px; text-align: center; border-bottom: 2px solid var(--cyan); }
        .hq-logo { width: 100px; height: auto; filter: drop-shadow(0 0 8px var(--cyan)); }
        .status-bar { display: flex; justify-content: center; gap: 8px; padding: 10px; background: #111; border-bottom: 1px solid #333; flex-wrap: wrap; }
        .status-box { background: #000; border: 1px solid #222; padding: 5px 8px; border-radius: 4px; font-size: 10px; text-align: center; min-width: 70px; flex: 1; }
        .status-val { display: block; font-size: 14px; font-weight: bold; color: var(--cyan); }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }
        nav { display: flex; background: #111; overflow-x: auto; sticky: top; z-index: 100; }
        .tab { flex: 1; padding: 12px 5px; text-align: center; cursor: pointer; color: #666; font-size: 13px; font-weight: bold; white-space: nowrap; border-bottom: 2px solid transparent; }
        .tab.active { color: var(--cyan); background: #1a1a1a; border-bottom: 2px solid var(--cyan); }
        .content { padding: 15px; display: none; box-sizing: border-box; }
        .content.active { display: block; }
        .dashboard-grid { display: flex; flex-direction: column; gap: 15px; }
        .monitor-card { background: #111; border: 1px solid #333; border-radius: 8px; padding: 12px; height: 400px; display: flex; flex-direction: column; }
        .card-header { border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 8px; font-weight: bold; color: var(--cyan); display: flex; justify-content: space-between; font-size: 14px; }
        .scroll-list { flex: 1; overflow-y: auto; font-size: 12px; }
        .input-group { background: #111; border: 1px dashed var(--cyan); padding: 12px; border-radius: 8px; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; margin-bottom: 8px; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 14px; transition: 0.3s; }
        .btn-cyan { background: var(--cyan); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-size: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { background: #1a1a1a; color: var(--cyan); padding: 8px; text-align: left; position: sticky; top: 0; }
        td { padding: 10px 8px; border-bottom: 1px solid #222; word-break: break-all; }
        .entry { padding: 8px; border-bottom: 1px solid #222; margin-bottom: 5px; border-radius: 4px; }
        .time { color: var(--cyan); font-size: 10px; }
        .visitor-active { border-left: 4px solid var(--green); background: rgba(46, 204, 113, 0.05); }
        .handover-item { border-left: 4px solid var(--gold); background: rgba(241, 196, 15, 0.05); }
    </style>
</head>
<body>
    <div class="hq-header">
        <div style="color:var(--cyan); font-weight:900; letter-spacing:2px; font-size: 18px;">M-SECURITY HQ V8.2</div>
        <div style="font-size: 10px; color: #666;">BLACK OBSIDIAN PROJECT</div>
    </div>

    <div class="status-bar">
        <div class="status-box">NETWORK <span class="status-val blink" style="color:var(--green)">ONLINE</span></div>
        <div class="status-box">訪客 <span id="count-visitor" class="status-val" style="color:var(--green)">0</span></div>
        <div class="status-box">VIP <span id="count-vip" class="status-val" style="color:var(--gold)">0</span></div>
        <div class="status-box">授權 <span id="count-guards" class="status-val">0</span></div>
    </div>

    <nav>
        <div class="tab active" onclick="switchTab('dashboard', this)">監控</div>
        <div class="tab" onclick="switchTab('manage', this)">部署</div>
        <div class="tab" onclick="switchTab('auth', this)">授權</div>
        <div class="tab" onclick="switchTab('logs', this)">日誌</div>
    </nav>

    <div id="dashboard" class="content active">
        <div class="dashboard-grid">
            <div class="monitor-card">
                <div class="card-header">📋 即時訪客登記 <span style="font-size:10px; color:var(--green)">LIVE</span></div>
                <div id="visitor-monitor" class="scroll-list">讀取中...</div>
            </div>
            <div class="monitor-card">
                <div class="card-header">📢 勤務交接日誌 <span style="font-size:10px; color:var(--gold)">UPDATE</span></div>
                <div id="handover-monitor" class="scroll-list">讀取中...</div>
            </div>
        </div>
    </div>

    <div id="manage" class="content">
        <div class="input-group">
            <input type="text" id="eID" placeholder="工號 / 編號 (選填)">
            <input type="text" id="eName" placeholder="* 姓名">
            <input type="text" id="ePlate" placeholder="車牌">
            <input type="text" id="eReason" placeholder="單位 / 備註">
            <div style="display:flex; gap:8px;">
                <button class="btn btn-cyan" onclick="saveData('employee_list')">部署員工</button>
                <button class="btn btn-cyan" style="background:var(--gold)" onclick="saveData('vip_list')">部署 VIP</button>
            </div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-outline" onclick="importCSV('employee_list')">📥 批量導入員工</button>
                <button class="btn btn-outline" style="border-color:var(--gold); color:var(--gold)" onclick="importCSV('vip_list')">📥 批量導入 VIP</button>
            </div>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>類型</th><th>姓名/車牌</th><th>備註</th><th>操作</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="auth" class="content">
        <div class="input-group">
            <input type="text" id="gName" placeholder="弟兄姓名">
            <input type="text" id="gPwd" placeholder="設定密碼">
            <button class="btn btn-cyan" onclick="addGuard()">核發通行權限</button>
        </div>
        <table>
            <thead><tr><th>人員</th><th>密碼</th><th>操作</th></tr></thead>
            <tbody id="authTableBody"></tbody>
        </table>
    </div>

    <div id="logs" class="content">
        <div id="logFeed" class="scroll-list" style="height: 70vh;">等待數據傳輸...</div>
    </div>

<script>
    // --- 初始化 Firebase ---
    const firebaseConfig = { 
        apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48", 
        databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com", 
        projectId: "factor-security-d1965", 
        appId: "1:864846943143:web:4cfa18cd20d2f712225c82" 
    };
    firebase.initializeApp(firebaseConfig); 
    const db = firebase.database();

    // --- 分頁切換 ---
    function switchTab(id, el) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // --- 核心監控實時監聽 ---
    function startHQMonitor() {
        // 監聽訪客
        db.ref('visitor_logs').on('value', snap => {
            const list = document.getElementById('visitor-monitor'); 
            let count = 0; list.innerHTML = '';
            snap.forEach(c => { 
                const d = c.val(); 
                if(!d.leaveTime) { 
                    count++; 
                    list.innerHTML += `<div class="entry visitor-active"><span class="time">${d.timeIn}</span><br><b>${d.name}</b> (${d.count}人)<br><small>${d.company} - ${d.reason}</small></div>`; 
                } 
            });
            document.getElementById('count-visitor').innerText = count;
            if(count === 0) list.innerHTML = "目前場內無訪客";
        });

        // 監聽交接日誌
        db.ref('reactLogs').limitToLast(10).on('value', snap => {
            const list = document.getElementById('handover-monitor'); list.innerHTML = '';
            snap.forEach(c => { 
                const d = c.val(); 
                list.innerHTML = `<div class="entry handover-item"><span class="time">${d.time}</span><br><b>${d.user || '值勤員'}</b>: ${d.note}</div>` + list.innerHTML; 
            });
        });

        // 監聽查詢日誌
        db.ref('search_logs').limitToLast(30).on('value', snap => {
            const feed = document.getElementById('logFeed'); feed.innerHTML = '';
            snap.forEach(c => { 
                const d = c.val(); 
                feed.innerHTML = `<div class="entry"><span class="time">[${d.time}]</span> <b>${d.user}</b> 查詢了 <b>${d.query}</b></div>` + feed.innerHTML; 
            });
        });

        // 監聽計數
        db.ref('vip_list').on('value', s => { document.getElementById('count-vip').innerText = s.numChildren(); });
        db.ref('guard_accounts').on('value', s => { document.getElementById('count-guards').innerText = s.numChildren(); });
    }

    // --- CSV 批量匯入 (黑曜石核心優化) ---
    function importCSV(type) {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = '.csv';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsText(file, 'UTF-8');
            reader.onload = async (readerEvent) => {
                const content = readerEvent.target.result;
                const rows = content.split('\n');
                let successCount = 0;
                for(let i=0; i<rows.length; i++) {
                    if(i === 0 || rows[i].trim() === "") continue;
                    const cols = rows[i].split(',').map(s => s.trim());
                    if(cols[1]) { // 必須有姓名
                        await db.ref(type + '/' + (cols[0] || Date.now() + i)).set({
                            id: cols[0] || "AUTO", name: cols[1], plate: (cols[2]||"").toUpperCase(), reason: cols[3] || ""
                        });
                        successCount++;
                    }
                }
                alert(`✅ 批量部署完成：已匯入 ${successCount} 筆數據`);
                loadTable();
                localStorage.setItem('HQ_Last_Import', new Date().toLocaleString());
            };
        };
        input.click();
    }

    // --- 基本部署功能 ---
    function saveData(p) {
        const n = document.getElementById('eName').value; if(!n) return alert("姓名為必填項目");
        const id = document.getElementById('eID').value || Date.now().toString();
        const data = { 
            name: n, id, 
            plate: document.getElementById('ePlate').value.toUpperCase(), 
            reason: document.getElementById('eReason').value 
        };
        db.ref(p+'/'+id).set(data).then(()=>{ 
            alert("部署成功"); 
            document.querySelectorAll('#manage input').forEach(i => i.value = '');
            loadTable(); 
        });
    }

    function loadTable() {
        const tb = document.getElementById('tableBody'); tb.innerHTML = '讀取中...';
        const render = (p, t, c) => db.ref(p).once('value', s => {
            if(!s.exists()) return;
            s.forEach(i => {
                const d = i.val();
                tb.innerHTML += `<tr><td style="color:${c}">${t}</td><td><b>${d.name}</b><br>${d.plate||''}</td><td>${d.reason||''}</td><td><button onclick="delItem('${p}','${i.key}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px; font-size:10px;">刪除</button></td></tr>`;
            });
        });
        tb.innerHTML = ''; render('employee_list','員工','var(--cyan)'); render('vip_list','VIP','var(--gold)');
    }

    function delItem(p, i) { if(confirm("確定撤銷此項部署？")) db.ref(p+'/'+i).remove().then(()=>loadTable()); }

    // --- 授權管理 ---
    function addGuard() {
        const n = document.getElementById('gName').value; const p = document.getElementById('gPwd').value;
        if(!n || !p) return alert("資訊不完整");
        db.ref('guard_accounts/' + n).set({ password: p, addedAt: new Date().toLocaleString() }).then(() => {
            alert("授權成功"); document.getElementById('gName').value = ''; document.getElementById('gPwd').value = '';
        });
    }

    function loadAuth() {
        const tb = document.getElementById('authTableBody');
        db.ref('guard_accounts').on('value', snap => {
            tb.innerHTML = '';
            snap.forEach(c => {
                tb.innerHTML += `<tr><td><b>${c.key}</b></td><td style="color:var(--gold)">${c.val().password}</td><td><button onclick="delGuard('${c.key}')" style="background:red; color:white; border:none; padding:5px; border-radius:4px; font-size:10px;">撤銷</button></td></tr>`;
            });
        });
    }
    function delGuard(n) { if(confirm(`確定撤銷 ${n} 的權限？`)) db.ref('guard_accounts/' + n).remove(); }

    // --- 啟動 ---
    window.onload = () => {
        startHQMonitor();
        loadTable();
        loadAuth();
        console.log("M-SECURITY HQ SYSTEM ONLINE | Win10 22H2 i5-9400F READY");
    };
</script>
</body>
</html>
