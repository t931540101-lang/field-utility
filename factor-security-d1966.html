<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑曜石排班助理 - 手機版</title>
    <style>
        :root {
            --primary-color: #b08d57; /* 仿 Shiftar 金棕色 */
            --bg-color: #f8f9fa;
            --text-color: #333;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* 手機窄螢幕容器 */
        .mobile-container {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid #eee;
        }

        .shift-input-area {
            padding: 20px;
            border-bottom: 2px solid var(--bg-color);
        }

        input, select, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active {
            opacity: 0.8;
        }

        .shift-list {
            flex-grow: 1;
            padding: 15px;
        }

        .shift-item {
            background: #fff;
            border-left: 5px solid var(--primary-color);
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-btn {
            width: auto;
            background: #ff5252;
            padding: 5px 10px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="mobile-container">
    <header>黑曜石計畫：排班助手</header>
    
    <div class="calendar-header">
        <span id="currentDate">2026年3月</span>
        <span>小黑哥 專屬</span>
    </div>

    <div class="shift-input-area">
        <input type="date" id="dateInput">
        <select id="typeInput">
            <option value="早班 (07:00-19:00)">早班 (07:00-19:00)</option>
            <option value="休假">休假</option>
            <option value="其他">其他</option>
        </select>
        <button onclick="saveShift()">新增排班資料</button>
    </div>

    <div class="shift-list" id="shiftList">
        </div>
</div>

<script>
    // 載入資料
    document.addEventListener('DOMContentLoaded', () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('dateInput').value = today;
        displayShifts();
    });

    // 存檔到 Local Storage
    function saveShift() {
        const date = document.getElementById('dateInput').value;
        const type = document.getElementById('typeInput').value;

        if (!date) return alert('請選擇日期');

        const shiftData = { date, type };
        let shifts = JSON.parse(localStorage.getItem('obsidian_shifts')) || [];
        
        // 檢查是否重複，重複則更新
        shifts = shifts.filter(s => s.date !== date);
        shifts.push(shiftData);
        shifts.sort((a, b) => new Date(a.date) - new Date(b.date));

        localStorage.setItem('obsidian_shifts', JSON.stringify(shifts));
        displayShifts();
    }

    // 顯示存檔內容
    function displayShifts() {
        const list = document.getElementById('shiftList');
        const shifts = JSON.parse(localStorage.getItem('obsidian_shifts')) || [];
        
        list.innerHTML = '<h3>近期班表</h3>';
        
        shifts.forEach((s, index) => {
            const item = document.createElement('div');
            item.className = 'shift-item';
            item.innerHTML = `
                <div>
                    <strong>${s.date}</strong><br>
                    <span>${s.type}</span>
                </div>
                <button class="delete-btn" onclick="deleteShift(${index})">刪除</button>
            `;
            list.appendChild(item);
        });
    }

    // 刪除功能
    function deleteShift(index) {
        let shifts = JSON.parse(localStorage.getItem('obsidian_shifts')) || [];
        shifts.splice(index, 1);
        localStorage.setItem('obsidian_shifts', JSON.stringify(shifts));
        displayShifts();
    }
</script>

</body>
</html>
