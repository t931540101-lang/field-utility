<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排班日曆骨架</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --border-color: #e0e0e0;
            --sunday-color: #e57373;
            --saturday-color: #64b5f6;
            --text-main: #333;
            --label-blue: #bbdefb;
            --label-red: #ffcdd2;
            --label-orange: #ffe0b2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .month-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
        }

        /* Weekday Bar */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            padding: 10px 0;
            font-size: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .weekdays div:first-child { color: var(--sunday-color); }
        .weekdays div:last-child { color: var(--saturday-color); }

        /* Calendar Grid */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            width: 100%;
        }

        .day-cell {
            min-height: 100px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .date-num {
            font-size: 18px;
            margin-bottom: 5px;
        }

        /* 不同的班別標籤樣式 */
        .shift-label {
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 10px;
            width: 80%;
            text-align: center;
        }
        .shift-rest { background-color: var(--label-red); }
        .shift-b { background-color: var(--label-blue); }
        .shift-special { background-color: var(--label-orange); }

        /* Bottom Nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            background: #f9f9f9;
            border-top: 1px solid var(--border-color);
        }

        .nav-item {
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .add-btn {
            font-size: 30px;
            background: #666;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -25px;
        }
    </style>
</head>
<body>

    <header>
        <div class="icon">⎋</div>
        <div class="month-title">3 <br><span style="font-size: 14px;">3月 2026</span></div>
        <div class="icon"></div>
    </header>

    <div class="weekdays">
        <div>週日</div><div>週一</div><div>週二</div><div>週三</div><div>週四</div><div>週五</div><div>週六</div>
    </div>

    <div class="calendar-grid">
        <div class="day-cell" style="color: var(--sunday-color);">
            <div class="date-num">1</div>
            <div class="shift-label shift-rest">例假</div>
        </div>
        <div class="day-cell">
            <div class="date-num">2</div>
            <div class="shift-label shift-b">日B班</div>
        </div>
        <div class="day-cell">
            <div class="date-num">3</div>
            <div class="shift-label shift-b">日B班</div>
        </div>
        <div class="day-cell">
            <div class="date-num">4</div>
            <div class="shift-label shift-rest">休假</div>
        </div>
        <div class="day-cell">
            <div class="date-num">5</div>
            <div class="shift-label shift-b">日B班</div>
        </div>
        <div class="day-cell">
            <div class="date-num">6</div>
            <div class="shift-label shift-b">日B班</div>
        </div>
        <div class="day-cell" style="color: var(--saturday-color);">
            <div class="date-num">7</div>
            <div class="shift-label shift-b">日B班</div>
        </div>
        </div>

    <nav class="bottom-nav">
        <div class="nav-item">ℹ️<br>資訊</div>
        <div class="nav-item">📅<br>今日</div>
        <div class="add-btn">+</div>
        <div class="nav-item">💰<br>薪水</div>
        <div class="nav-item">...<br>其它</div>
    </nav>

</body>
</html>
