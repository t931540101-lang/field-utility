<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小黑哥排班表 Pro</title>
    <style>
        :root { --border: #f0f0f0; --sun: #d9534f; --sat: #428bca; }
        body { margin: 0; font-family: sans-serif; background: #fff; height: 100vh; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; font-weight: bold; }
        .week-bar { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: #888; padding: 5px 0; border-top: 1px solid var(--border); }
        .week-bar div:first-child { color: var(--sun); }
        .week-bar div:last-child { color: var(--sat); }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); flex-grow: 1; border-top: 1px solid var(--border); }
        .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 2px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .date { font-size: 14px; margin-bottom: 4px; color: #333; }
        .tag { font-size: 9px; padding: 2px 4px; border-radius: 4px; width: 85%; text-align: center; font-weight: bold; }
        
        #modal { display: none; position: fixed; bottom: 0; width: 100%; background: #fff; border-radius: 20px 20px 0 0; padding: 20px; box-sizing: border-box; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .shift-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 12px; background: #f8f9fa; border-radius: 10px; text-align: center; font-size: 14px; border: 1px solid #eee; }
        .btn-clear { color: #d32f2f; background: #ffebee; border-color: #ffcdd2; }
    </style>
</head>
<body>

<div class="header">
    <button onclick="changeMonth(-1)">＜</button>
    <div id="monthDisplay"></div>
    <button onclick="changeMonth(1)">＞</button>
</div>

<div class="week-bar">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
</div>

<div class="grid" id="calendar"></div>

<div id="modal" onclick="this.style.display='none'">
    <div class="shift-grid" id="shiftOptions" onclick="event.stopPropagation()"></div>
</div>

<script>
    let date = new Date();
    // 顏色配置調整：休假/例假紅色，特休黃色
    const shiftTypes = {
        "日B": { bg: "#e3f2fd", color: "#1976d2" }, 
        "夜B": { bg: "#f3e5f5", color: "#7b1fa2" }, 
        "夜E": { bg: "#ede7f6", color: "#512da8" }, 
        "休假": { bg: "#ffebee", color: "#d32f2f" }, 
        "例假": { bg: "#ffebee", color: "#d32f2f" }, 
        "特休": { bg: "#fff9c4", color: "#fbc02d" }, 
        "國定假日": { bg: "#ffebee", color: "#c62828" }, 
        "換班": { bg: "#f0f4c3", color: "#827717" }
    };

    let selectedDay = null;

    function render() {
        const year = date.getFullYear();
        const month = date.getMonth();
        document.getElementById('monthDisplay').innerText = `${year}年 ${month + 1}月`;
        
        const savedData = JSON.parse(localStorage.getItem(`shifts_${year}_${month}`) || '{}');
        const grid = document.getElementById('calendar');
        grid.innerHTML = '';
        
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));
        for(let i=1; i<=daysInMonth; i++) {
            let cell = document.createElement('div');
            cell.className = 'cell';
            let shiftName = savedData[i] || "";
            let style = shiftTypes[shiftName] || {bg: 'transparent', color: 'transparent'};
            cell.innerHTML = `<div class="date">${i}</div>
                              <div class="tag" style="background:${style.bg}; color:${style.color}">${shiftName}</div>`;
            cell.onclick = () => { selectedDay = i; document.getElementById('modal').style.display = 'block'; };
            grid.appendChild(cell);
        }
    }

    function saveShift(shift) {
        const year = date.getFullYear();
        const month = date.getMonth();
        let data = JSON.parse(localStorage.getItem(`shifts_${year}_${month}`) || '{}');
        if (shift === null) delete data[selectedDay];
        else data[selectedDay] = shift;
        localStorage.setItem(`shifts_${year}_${month}`, JSON.stringify(data));
        document.getElementById('modal').style.display = 'none';
        render();
    }

    function changeMonth(delta) {
        date.setMonth(date.getMonth() + delta);
        render();
    }

    const options = document.getElementById('shiftOptions');
    Object.keys(shiftTypes).forEach(s => {
        let div = document.createElement('div');
        div.className = 'btn';
        div.innerText = s;
        div.onclick = () => saveShift(s);
        options.appendChild(div);
    });
    let clearBtn = document.createElement('div');
    clearBtn.className = 'btn btn-clear';
    clearBtn.innerText = '清空';
    clearBtn.onclick = () => saveShift(null);
    options.appendChild(clearBtn);

    render();
</script>
</body>
</html>
