<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班務通 ShiftHQ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8;
    --white: #ffffff;
    --border: #e8eaee;
    --text: #1a1c22;
    --text2: #6b7080;
    --text3: #b0b5c0;
    --sunday: #e05050;
    --saturday: #4a7eda;
    --today-bg: #2a6be8;
    --accent: #e8a020;
    --tag-blue: #cce0f8;
    --tag-blue-text: #2a6be8;
    --tag-pink: #fce4e4;
    --tag-pink-text: #d04040;
    --tag-orange: #fde8c0;
    --tag-orange-text: #c07010;
    --tag-green: #d4f0e0;
    --tag-green-text: #1a9050;
    --tag-purple: #e8d8f8;
    --tag-purple-text: #6030b0;
    --tag-gray: #e8eaee;
    --tag-gray-text: #7080a0;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans TC',-apple-system,sans-serif; max-width:430px; margin:0 auto; overflow-x:hidden; }

/* TOP BAR */
.topbar { background:var(–white); display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; position:sticky; top:0; z-index:100; border-bottom:1px solid var(–border); }
.topbar-share { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; color:var(–text2); }
.topbar-month { font-size:36px; font-weight:300; color:var(–text); line-height:1; }
.topbar-right { text-align:right; cursor:pointer; }
.topbar-year,.topbar-ym { font-size:13px; color:var(–text2); }
.month-nav { background:var(–white); display:flex; align-items:center; justify-content:space-between; padding:6px 12px; border-bottom:1px solid var(–border); }
.month-nav-label { font-size:15px; font-weight:500; }
.month-nav-btn { background:none; border:none; font-size:20px; color:var(–text2); cursor:pointer; padding:4px 10px; border-radius:8px; }
.month-nav-btn:active { background:var(–border); }

/* DOW */
.dow-row { display:grid; grid-template-columns:repeat(7,1fr); background:var(–white); border-bottom:1px solid var(–border); padding:6px 0 4px; }
.dow-cell { text-align:center; font-size:12px; font-weight:500; color:var(–text2); }
.dow-cell:first-child { color:var(–sunday); }
.dow-cell:last-child  { color:var(–saturday); }

/* CALENDAR */
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); background:var(–border); gap:1px; }
.cal-cell { background:var(–white); min-height:72px; padding:6px 3px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; transition:background .1s; }
.cal-cell:active { background:#f0f2f8; }
.cal-cell.other-month { background:#fafbfc; }
.cal-cell.other-month .cal-day-num { color:var(–text3); }
.cal-cell.other-month .shift-tag { opacity:.5; }
.cal-day-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:400; color:var(–text); flex-shrink:0; }
.cal-cell.sunday .cal-day-num  { color:var(–sunday); }
.cal-cell.saturday .cal-day-num { color:var(–saturday); }
.cal-cell.today .cal-day-num   { background:var(–today-bg); color:#fff; font-weight:700; }

/* SHIFT TAG */
.shift-tag { width:100%; border-radius:20px; padding:2px 0; text-align:center; font-size:10px; font-weight:500; line-height:1.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tag-blue   { background:var(–tag-blue);   color:var(–tag-blue-text); }
.tag-pink   { background:var(–tag-pink);   color:var(–tag-pink-text); }
.tag-orange { background:var(–tag-orange); color:var(–tag-orange-text); }
.tag-green  { background:var(–tag-green);  color:var(–tag-green-text); }
.tag-purple { background:var(–tag-purple); color:var(–tag-purple-text); }
.tag-gray   { background:var(–tag-gray);   color:var(–tag-gray-text); }

/* STATS BAR */
.stats-bar { background:var(–white); display:flex; border-top:1px solid var(–border); border-bottom:1px solid var(–border); }
.stat-item { flex:1; padding:12px 0; text-align:center; border-right:1px solid var(–border); }
.stat-item:last-child { border-right:none; }
.stat-val { font-size:18px; font-weight:600; color:var(–text); }
.stat-lbl { font-size:11px; color:var(–text3); margin-top:2px; }

/* NAVBAR */
.navbar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(–white); border-top:1px solid var(–border); display:flex; padding:8px 0 max(8px,env(safe-area-inset-bottom)); z-index:100; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:4px 0; }
.nav-icon  { font-size:22px; line-height:1.2; }
.nav-label { font-size:10px; color:var(–text3); }
.nav-item.active .nav-label { color:var(–today-bg); }
.nav-fab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; }
.nav-fab-btn { width:48px; height:48px; background:var(–text); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:26px; color:#fff; margin-top:-10px; box-shadow:0 4px 16px rgba(0,0,0,.2); transition:transform .15s; }
.nav-fab-btn:active { transform:scale(.9); }

/* PAGES */
.page { display:none; padding-bottom:80px; }
.page.active { display:block; }

/* WAGE */
.wage-header { background:var(–white); padding:20px; border-bottom:1px solid var(–border); text-align:center; }
.wage-month-label { font-size:13px; color:var(–text2); margin-bottom:6px; }
.wage-amount { font-size:42px; font-weight:300; }
.wage-unit   { font-size:16px; color:var(–text2); }
.wage-rate-row { background:var(–white); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(–border); margin-top:10px; }
.wage-rate-label { font-size:14px; color:var(–text2); }
.wage-rate-input { background:var(–bg); border:1px solid var(–border); border-radius:8px; padding:6px 12px; font-size:16px; font-family:inherit; width:100px; text-align:right; color:var(–text); outline:none; }
.wage-list { background:var(–white); margin-top:10px; }
.wage-list-header { padding:10px 20px 6px; font-size:12px; color:var(–text3); font-weight:500; border-bottom:1px solid var(–border); }
.wage-row { display:flex; align-items:center; padding:14px 20px; border-bottom:1px solid var(–border); gap:12px; }
.wage-row:last-child { border-bottom:none; }
.wage-row-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.wage-row-info { flex:1; }
.wage-row-date { font-size:13px; color:var(–text2); }
.wage-row-name { font-size:15px; font-weight:500; }
.wage-row-right { text-align:right; }
.wage-row-hours { font-size:12px; color:var(–text3); }
.wage-row-pay   { font-size:15px; font-weight:600; color:var(–today-bg); }
.wage-total-row { background:var(–bg); padding:16px 20px; display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
.wage-total-label { font-size:14px; color:var(–text2); }
.wage-total-value { font-size:22px; font-weight:700; color:var(–today-bg); }

/* MODAL */
.modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:200; display:none; align-items:flex-end; }
.modal-backdrop.open { display:flex; }
.modal { background:var(–white); border-radius:20px 20px 0 0; width:100%; max-height:90dvh; overflow-y:auto; padding:0 0 max(20px,env(safe-area-inset-bottom)); animation:slideUp .22s ease; }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle-row { display:flex; justify-content:center; padding:12px 0 4px; }
.modal-handle { width:36px; height:4px; background:var(–border); border-radius:2px; }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:8px 20px 16px; border-bottom:1px solid var(–border); }
.modal-title { font-size:17px; font-weight:600; }
.modal-close  { font-size:22px; color:var(–text3); cursor:pointer; padding:4px; background:none; border:none; }
.modal-body   { padding:16px 20px; }
.form-group   { margin-bottom:14px; }
.form-label   { font-size:12px; color:var(–text2); margin-bottom:6px; display:block; font-weight:500; }
.form-input,.form-select { width:100%; background:var(–bg); border:1.5px solid var(–border); border-radius:10px; color:var(–text); padding:11px 14px; font-size:16px; font-family:inherit; outline:none; transition:border-color .2s; -webkit-appearance:none; }
.form-input:focus,.form-select:focus { border-color:var(–today-bg); }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.color-picker { display:flex; gap:10px; flex-wrap:wrap; padding:4px 0; }
.color-opt { width:38px; height:38px; border-radius:50%; cursor:pointer; border:3px solid transparent; display:flex; align-items:center; justify-content:center; font-size:16px; transition:all .15s; }
.color-opt.selected { border-color:var(–text); }
.btn { width:100%; padding:14px; border-radius:12px; font-size:16px; font-family:inherit; font-weight:600; border:none; cursor:pointer; transition:all .15s; margin-top:6px; }
.btn:active { transform:scale(.97); }
.btn-primary { background:var(–today-bg); color:#fff; }
.btn-danger  { background:#fff; color:var(–sunday); border:1.5px solid #eee; }
.btn-ghost   { background:var(–bg); color:var(–text2); }
.quick-types { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
.quick-type-btn { border-radius:20px; padding:6px 14px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; }

/* LIST */
.list-section { background:var(–white); margin:10px 0 0; }
.list-header  { padding:12px 20px 8px; font-size:12px; color:var(–text3); font-weight:500; border-bottom:1px solid var(–border); }
.list-item    { display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid var(–border); cursor:pointer; }
.list-item:last-child { border-bottom:none; }
.list-item:active { background:var(–bg); }
.list-item-icon  { font-size:22px; }
.list-item-label { flex:1; }
.list-item-name  { font-size:15px; font-weight:500; }
.list-item-sub   { font-size:12px; color:var(–text3); margin-top:2px; }
.list-item-arrow { color:var(–text3); font-size:16px; }

/* TODAY */
.today-card { background:var(–white); margin:12px 16px 0; border-radius:16px; padding:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
.today-date-label { font-size:13px; color:var(–text2); margin-bottom:8px; }
.today-shift-name { font-size:28px; font-weight:600; margin-bottom:4px; }
.today-shift-time { font-size:15px; color:var(–text2); }

/* TOAST */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:rgba(30,32,40,.88); color:#fff; border-radius:20px; padding:10px 22px; font-size:14px; font-weight:500; z-index:500; white-space:nowrap; opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
</style>

</head>
<body>

<!-- TOP (月曆專用) -->

<div id="calTopbar">
  <div class="topbar">
    <div class="topbar-share" onclick="exportText()">⎋</div>
    <div class="topbar-month" id="topbarMonthNum">3</div>
    <div class="topbar-right">
      <div class="topbar-year" id="topbarYear">2026</div>
      <div class="topbar-ym"   id="topbarYM">3月</div>
    </div>
  </div>
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-nav-label" id="monthNavLabel">2026年3月</div>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="dow-row">
    <div class="dow-cell">週日</div><div class="dow-cell">週一</div>
    <div class="dow-cell">週二</div><div class="dow-cell">週三</div>
    <div class="dow-cell">週四</div><div class="dow-cell">週五</div>
    <div class="dow-cell">週六</div>
  </div>
</div>

<!-- PAGES -->

<div class="page active" id="page-cal">
  <div class="cal-grid" id="calGrid"></div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="page" id="page-today">
  <div style="padding:16px 0 0">
    <div class="today-card" id="todayCard"></div>
  </div>
  <div class="list-section" style="margin-top:16px">
    <div class="list-header">本週班次</div>
    <div id="weekList"></div>
  </div>
</div>

<div class="page" id="page-wage">
  <div class="wage-header">
    <div class="wage-month-label" id="wagePeriodLabel">預估薪資</div>
    <div><span class="wage-amount" id="wageTotal">0</span><span class="wage-unit"> 元</span></div>
  </div>
  <div class="wage-rate-row">
    <div class="wage-rate-label">時薪（元/小時）</div>
    <input class="wage-rate-input" type="number" id="hourlyRate" value="176" min="0" oninput="recalcWage()">
  </div>
  <div class="wage-list">
    <div class="wage-list-header">班次明細</div>
    <div id="wageBreakdown"></div>
  </div>
  <div class="wage-total-row">
    <div class="wage-total-label">月薪合計</div>
    <div class="wage-total-value" id="wageTotalBottom">$0</div>
  </div>
</div>

<div class="page" id="page-other">
  <div class="list-section" style="margin-top:10px">
    <div class="list-header">匯出</div>
    <div class="list-item" onclick="exportCSV()">
      <div class="list-item-icon">📊</div>
      <div class="list-item-label"><div class="list-item-name">匯出 CSV</div><div class="list-item-sub">可匯入 Excel / Google 試算表</div></div>
      <div class="list-item-arrow">›</div>
    </div>
    <div class="list-item" onclick="exportText()">
      <div class="list-item-icon">📋</div>
      <div class="list-item-label"><div class="list-item-name">複製純文字</div><div class="list-item-sub">貼到 LINE 或通訊軟體</div></div>
      <div class="list-item-arrow">›</div>
    </div>
  </div>
  <div class="list-section">
    <div class="list-header">個人設定</div>
    <div class="list-item" onclick="openNameModal()">
      <div class="list-item-icon">👤</div>
      <div class="list-item-label"><div class="list-item-name">我的姓名</div><div class="list-item-sub" id="settingName">（未設定）</div></div>
      <div class="list-item-arrow">›</div>
    </div>
    <div class="list-item" onclick="openStaffIdModal()">
      <div class="list-item-icon">🪪</div>
      <div class="list-item-label"><div class="list-item-name">員工編號</div><div class="list-item-sub" id="settingId">（未設定）</div></div>
      <div class="list-item-arrow">›</div>
    </div>
    <div class="list-item" onclick="clearAllData()">
      <div class="list-item-icon">🗑️</div>
      <div class="list-item-label"><div class="list-item-name" style="color:#e05050">清除所有班表</div><div class="list-item-sub">重置所有紀錄</div></div>
      <div class="list-item-arrow">›</div>
    </div>
  </div>
  <div style="text-align:center;padding:24px;font-size:12px;color:var(--text3)">班務通 ShiftHQ v1.0 · 台灣精銳</div>
</div>

<!-- NAVBAR -->

<nav class="navbar">
  <div class="nav-item" id="nav-today" onclick="showPage('today',this)">
    <div class="nav-icon">✅</div><div class="nav-label">今日</div>
  </div>
  <div class="nav-item active" id="nav-cal" onclick="showPage('cal',this)">
    <div class="nav-icon">📅</div><div class="nav-label">輪班</div>
  </div>
  <div class="nav-fab" onclick="openAddShift(null)">
    <div class="nav-fab-btn">＋</div>
  </div>
  <div class="nav-item" id="nav-wage" onclick="showPage('wage',this)">
    <div class="nav-icon">💴</div><div class="nav-label">薪水</div>
  </div>
  <div class="nav-item" id="nav-other" onclick="showPage('other',this)">
    <div class="nav-icon">⋯</div><div class="nav-label">其它</div>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- MODAL: 班次 -->

<div class="modal-backdrop" id="shiftModal">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增班次</div>
      <button class="modal-close" onclick="closeModal('shiftModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-label">快速選擇</div>
      <div class="quick-types" id="quickTypes"></div>
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="shiftDate">
      </div>
      <div class="form-group">
        <label class="form-label">班次名稱</label>
        <input class="form-input" type="text" id="shiftName" placeholder="例：日B班、夜班...">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">開始</label>
          <input class="form-input" type="time" id="shiftStart" value="08:00">
        </div>
        <div class="form-group">
          <label class="form-label">結束</label>
          <input class="form-input" type="time" id="shiftEnd" value="20:00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">顏色</label>
        <div class="color-picker" id="colorPicker">
          <div class="color-opt selected" data-color="blue"   style="background:var(--tag-blue)"   onclick="selectColor(this)">✓</div>
          <div class="color-opt"          data-color="pink"   style="background:var(--tag-pink)"   onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="orange" style="background:var(--tag-orange)" onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="green"  style="background:var(--tag-green)"  onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="purple" style="background:var(--tag-purple)" onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="gray"   style="background:var(--tag-gray)"   onclick="selectColor(this)"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">備註（選填）</label>
        <input class="form-input" type="text" id="shiftNote" placeholder="地點、說明...">
      </div>
      <button class="btn btn-primary" onclick="saveShift()">儲存</button>
      <button class="btn btn-danger" id="deleteShiftBtn" onclick="deleteShift()" style="display:none">刪除此班次</button>
      <button class="btn btn-ghost" onclick="closeModal('shiftModal')">取消</button>
    </div>
  </div>
</div>

<!-- MODAL: 姓名 -->

<div class="modal-backdrop" id="nameModal">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title">我的姓名</div>
      <button class="modal-close" onclick="closeModal('nameModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">姓名</label><input class="form-input" type="text" id="nameInput" placeholder="請輸入姓名"></div>
      <button class="btn btn-primary" onclick="saveName()">儲存</button>
    </div>
  </div>
</div>

<!-- MODAL: 員工編號 -->

<div class="modal-backdrop" id="staffIdModal">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title">員工編號</div>
      <button class="modal-close" onclick="closeModal('staffIdModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">編號（D- 本地 / N- 外籍）</label><input class="form-input" type="text" id="staffIdInput" placeholder="例：D001"></div>
      <button class="btn btn-primary" onclick="saveStaffId()">儲存</button>
    </div>
  </div>
</div>

<script>
let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedColor = 'blue';
let editingShiftId = null;
let editingDate = null;
let shifts   = JSON.parse(localStorage.getItem('shifts') || '{}');
let userName = localStorage.getItem('userName') || '';
let staffId  = localStorage.getItem('staffId')  || '';
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOWS   = ['日','一','二','三','四','五','六'];
const TAG_DOT = { blue:'#2a6be8', pink:'#d04040', orange:'#c07010', green:'#1a9050', purple:'#6030b0', gray:'#7080a0' };
const QUICK_TYPES = [
  {name:'日B班',start:'08:00',end:'20:00',color:'blue'},
  {name:'夜班', start:'20:00',end:'08:00',color:'purple'},
  {name:'特休', start:'00:00',end:'00:00',color:'orange'},
  {name:'例假', start:'00:00',end:'00:00',color:'pink'},
  {name:'休假', start:'00:00',end:'00:00',color:'gray'},
];

function showPage(pageId, navEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-'+pageId).classList.add('active');
  if (navEl) navEl.classList.add('active');
  document.getElementById('calTopbar').style.display = pageId==='cal' ? '' : 'none';
  if (pageId==='wage')  recalcWage();
  if (pageId==='today') renderToday();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth>11){currentMonth=0;currentYear++;}
  if (currentMonth<0) {currentMonth=11;currentYear--;}
  renderCalendar();
}

function renderCalendar() {
  const y=currentYear, m=currentMonth;
  document.getElementById('topbarMonthNum').textContent = m+1;
  document.getElementById('topbarYear').textContent = y;
  document.getElementById('topbarYM').textContent = MONTHS[m];
  document.getElementById('monthNavLabel').textContent = `${y}年${MONTHS[m]}`;
  const firstDow    = new Date(y,m,1).getDay();
  const daysInMonth = new Date(y,m+1,0).getDate();
  const prevDays    = new Date(y,m,0).getDate();
  const today = new Date();
  const pad = n => String(n).padStart(2,'0');
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (let i=0;i<42;i++) {
    const dow = i%7;
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (dow===0) cell.classList.add('sunday');
    if (dow===6) cell.classList.add('saturday');

    let cellDate, d;
    if (i < firstDow) {
      d = prevDays - firstDow + i + 1;
      const pm = m-1<0?11:m-1, py = m-1<0?y-1:y;
      cellDate = `${py}-${pad(pm+1)}-${pad(d)}`;
      cell.classList.add('other-month');
    } else if (i-firstDow < daysInMonth) {
      d = i-firstDow+1;
      cellDate = `${y}-${pad(m+1)}-${pad(d)}`;
    } else {
      d = i-firstDow-daysInMonth+1;
      const nm = m+1>11?0:m+1, ny = m+1>11?y+1:y;
      cellDate = `${ny}-${pad(nm+1)}-${pad(d)}`;
      cell.classList.add('other-month');
    }

    const [cy,cm2,cd] = cellDate.split('-').map(Number);
    if (cy===today.getFullYear()&&cm2===today.getMonth()+1&&cd===today.getDate()) cell.classList.add('today');

    const numEl = document.createElement('div');
    numEl.className = 'cal-day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    (shifts[cellDate]||[]).slice(0,2).forEach(s => {
      const tag = document.createElement('div');
      tag.className = `shift-tag tag-${s.color||'blue'}`;
      tag.textContent = s.name||'班';
      cell.appendChild(tag);
    });

    cell.onclick = () => openAddShift(cellDate);
    grid.appendChild(cell);
  }
  renderStatsBar();
}

function renderStatsBar() {
  const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let days=0, hours=0;
  const rate = parseInt(document.getElementById('hourlyRate')?.value||176);
  Object.keys(shifts).filter(k=>k.startsWith(prefix)).forEach(k=>{
    shifts[k].forEach(s=>{
      if (s.color!=='gray'&&s.color!=='pink'){ days++; hours+=calcHours(s.start,s.end); }
    });
  });
  const wage = Math.round(hours*rate);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-val">${days}</div><div class="stat-lbl">出勤天</div></div>
    <div class="stat-item"><div class="stat-val">${Math.round(hours)}</div><div class="stat-lbl">工時</div></div>
    <div class="stat-item"><div class="stat-val">$${wage.toLocaleString()}</div><div class="stat-lbl">預估薪資</div></div>`;
}

function renderToday() {
  const t=new Date(), pad=n=>String(n).padStart(2,'0');
  const todayKey=`${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
  const s0 = (shifts[todayKey]||[])[0];
  const dow = DOWS[t.getDay()];
  const label=`${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日（週${dow}）`;
  document.getElementById('todayCard').innerHTML = s0
    ? `<div class="today-date-label">${label}</div>
       <div class="today-shift-name">${s0.name}</div>
       <div class="today-shift-time">${s0.start} – ${s0.end}　${calcHours(s0.start,s0.end).toFixed(1)} 小時</div>
       ${s0.note?`<div class="today-shift-time" style="margin-top:4px;color:var(--text3)">${s0.note}</div>`:''}`
    : `<div class="today-date-label">${label}</div><div style="font-size:16px;color:var(--text3);text-align:center;padding:20px 0">今日無班次</div>`;

  const wkStart = new Date(t); wkStart.setDate(t.getDate()-t.getDay());
  const weekList = document.getElementById('weekList');
  weekList.innerHTML='';
  for(let i=0;i<7;i++){
    const d2=new Date(wkStart); d2.setDate(wkStart.getDate()+i);
    const key=`${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}`;
    const ws=(shifts[key]||[])[0];
    const isToday=key===todayKey;
    const row=document.createElement('div');
    row.className='wage-row';
    const tagHtml=ws
      ?`<span class="shift-tag tag-${ws.color||'blue'}" style="width:auto;padding:2px 14px">${ws.name}</span>`
      :`<span style="color:var(--text3);font-size:13px">—</span>`;
    row.innerHTML=`
      <div style="width:36px;text-align:center">
        <div style="font-size:11px;color:var(--text3)">${DOWS[d2.getDay()]}</div>
        <div style="font-size:16px;font-weight:${isToday?700:400};color:${isToday?'var(--today-bg)':'var(--text)'}">${d2.getDate()}</div>
      </div>
      <div style="flex:1">${tagHtml}</div>`;
    weekList.appendChild(row);
  }
}

function buildQuickTypes() {
  const c=document.getElementById('quickTypes'); c.innerHTML='';
  QUICK_TYPES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className=`quick-type-btn tag-${t.color}`;
    btn.textContent=t.name;
    btn.onclick=()=>{
      document.getElementById('shiftName').value=t.name;
      document.getElementById('shiftStart').value=t.start;
      document.getElementById('shiftEnd').value=t.end;
      selectColorByValue(t.color);
    };
    c.appendChild(btn);
  });
}

function openAddShift(dateKey) {
  editingShiftId=null; editingDate=dateKey;
  const d=dateKey?parseInt(dateKey.split('-')[2]):'';
  document.getElementById('modalTitle').textContent=dateKey?`新增班次・${d}日`:'新增班次';
  document.getElementById('shiftDate').value=dateKey||getTodayStr();
  document.getElementById('shiftName').value='';
  document.getElementById('shiftStart').value='08:00';
  document.getElementById('shiftEnd').value='20:00';
  document.getElementById('shiftNote').value='';
  document.getElementById('deleteShiftBtn').style.display='none';
  selectColorByValue('blue'); buildQuickTypes();
  document.getElementById('shiftModal').classList.add('open');
}

function editShift(dateKey,idx) {
  const s=shifts[dateKey][idx];
  editingShiftId=idx; editingDate=dateKey;
  document.getElementById('modalTitle').textContent='編輯班次';
  document.getElementById('shiftDate').value=dateKey;
  document.getElementById('shiftName').value=s.name||'';
  document.getElementById('shiftStart').value=s.start||'08:00';
  document.getElementById('shiftEnd').value=s.end||'20:00';
  document.getElementById('shiftNote').value=s.note||'';
  document.getElementById('deleteShiftBtn').style.display='block';
  selectColorByValue(s.color||'blue'); buildQuickTypes();
  document.getElementById('shiftModal').classList.add('open');
}

function saveShift() {
  const date=document.getElementById('shiftDate').value;
  if(!date){showToast('請選擇日期');return;}
  const obj={name:document.getElementById('shiftName').value.trim()||'班次',start:document.getElementById('shiftStart').value,end:document.getElementById('shiftEnd').value,color:selectedColor,note:document.getElementById('shiftNote').value.trim()};
  if(!shifts[date]) shifts[date]=[];
  if(editingShiftId!==null&&editingDate===date) {
    shifts[date][editingShiftId]=obj;
  } else {
    if(editingShiftId!==null){shifts[editingDate].splice(editingShiftId,1);if(!shifts[editingDate].length)delete shifts[editingDate];}
    shifts[date].push(obj);
  }
  saveToStorage(); closeModal('shiftModal'); renderCalendar(); showToast('✓ 班次已儲存');
}

function deleteShift() {
  if(editingShiftId===null||!confirm('確定刪除？'))return;
  shifts[editingDate].splice(editingShiftId,1);
  if(!shifts[editingDate].length) delete shifts[editingDate];
  saveToStorage(); closeModal('shiftModal'); renderCalendar(); showToast('班次已刪除');
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(o=>{o.classList.remove('selected');o.textContent='';});
  el.classList.add('selected'); el.textContent='✓'; selectedColor=el.dataset.color;
}
function selectColorByValue(val) {
  document.querySelectorAll('.color-opt').forEach(o=>{
    o.classList.remove('selected');o.textContent='';
    if(o.dataset.color===val){o.classList.add('selected');o.textContent='✓';}
  });
  selectedColor=val;
}

function calcHours(start,end) {
  if(!start||!end||(start==='00:00'&&end==='00:00'))return 0;
  const [sh,sm]=start.split(':').map(Number), [eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm);
  if(mins<=0)mins+=1440;
  return mins/60;
}

function recalcWage() {
  const rate=parseInt(document.getElementById('hourlyRate').value||176);
  localStorage.setItem('hourlyRate',rate);
  const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let total=0, rows='';
  Object.keys(shifts).filter(k=>k.startsWith(prefix)).sort().forEach(k=>{
    shifts[k].forEach(s=>{
      const h=calcHours(s.start,s.end), pay=Math.round(h*rate);
      total+=pay;
      if(h>0){
        const d=parseInt(k.split('-')[2]);
        rows+=`<div class="wage-row">
          <div class="wage-row-dot" style="background:${TAG_DOT[s.color]||'#2a6be8'}"></div>
          <div class="wage-row-info"><div class="wage-row-date">${d}日（${DOWS[new Date(k).getDay()]}）</div><div class="wage-row-name">${s.name}</div></div>
          <div class="wage-row-right"><div class="wage-row-hours">${h.toFixed(1)}h × ${rate}</div><div class="wage-row-pay">$${pay.toLocaleString()}</div></div>
        </div>`;
      }
    });
  });
  document.getElementById('wageTotal').textContent=total.toLocaleString();
  document.getElementById('wageTotalBottom').textContent='$'+total.toLocaleString();
  document.getElementById('wagePeriodLabel').textContent=`${currentYear}年${MONTHS[currentMonth]} 預估薪資`;
  document.getElementById('wageBreakdown').innerHTML=rows||`<div style="padding:20px;text-align:center;color:var(--text3);font-size:14px">本月尚無班次</div>`;
  renderStatsBar();
}

function exportCSV() {
  const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let csv='日期,星期,班次,開始,結束,工時,備註\n';
  Object.keys(shifts).filter(k=>k.startsWith(prefix)).sort().forEach(k=>{
    shifts[k].forEach(s=>{csv+=`${k},${DOWS[new Date(k).getDay()]},${s.name||''},${s.start||''},${s.end||''},${calcHours(s.start,s.end).toFixed(1)},${s.note||''}\n`;});
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`班表_${currentYear}${String(currentMonth+1).padStart(2,'0')}.csv`; a.click();
  showToast('✓ CSV 已下載');
}

function exportText() {
  const prefix=`${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let text=`【${currentYear}年${MONTHS[currentMonth]}班表】\n`;
  Object.keys(shifts).filter(k=>k.startsWith(prefix)).sort().forEach(k=>{
    shifts[k].forEach(s=>{const d=parseInt(k.split('-')[2]);text+=`${d}日(${DOWS[new Date(k).getDay()]}) ${s.name} ${s.start}~${s.end}${s.note?' ・'+s.note:''}\n`;});
  });
  navigator.clipboard?.writeText(text).then(()=>showToast('✓ 已複製到剪貼簿'));
}

function openNameModal(){document.getElementById('nameInput').value=userName;document.getElementById('nameModal').classList.add('open');}
function saveName(){userName=document.getElementById('nameInput').value.trim();localStorage.setItem('userName',userName);document.getElementById('settingName').textContent=userName||'（未設定）';closeModal('nameModal');showToast('✓ 已儲存');}
function openStaffIdModal(){document.getElementById('staffIdInput').value=staffId;document.getElementById('staffIdModal').classList.add('open');}
function saveStaffId(){staffId=document.getElementById('staffIdInput').value.trim();localStorage.setItem('staffId',staffId);document.getElementById('settingId').textContent=staffId||'（未設定）';closeModal('staffIdModal');showToast('✓ 已儲存');}
function clearAllData(){if(confirm('確定清除所有班表資料？')){shifts={};saveToStorage();renderCalendar();showToast('已清除');}}
function saveToStorage(){localStorage.setItem('shifts',JSON.stringify(shifts));}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function getTodayStr(){const t=new Date();return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;}
let toastTimer;
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2200);}
document.querySelectorAll('.modal-backdrop').forEach(b=>b.addEventListener('click',e=>{if(e.target===b)b.classList.remove('open');}));
