<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>黑曜石排班系統 V2</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #e8e2d0; margin: 0; overflow-x: hidden; }
        .grid-cell { min-height: 75px; border-right: 1px solid #c2b99a; border-bottom: 1px solid #c2b99a; transition: all 0.2s; }
        .val-text { font-weight: 900; font-size: 13px; text-align: center; }
        .color-off { color: #c0392b; }
        .color-special { color: #d4af37; }
        .color-day-shift { color: #2563eb; }
        .color-night-shift { color: #4b5563; }
        .scroll-container { padding-bottom: 220px; overflow-y: auto; }
        .bottom-panel { position: fixed; bottom: 0; width: 100%; max-width: 512px; background: rgba(255,255,255,0.98); padding: 10px; border-top: 2px solid #2e5a44; z-index: 50; }
        .login-bg { min-height: 100vh; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 40px 32px; width: 320px; backdrop-filter: blur(10px); }
        .role-btn { width: 100%; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: 900; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; margin-bottom: 12px; }
        .role-btn:active { transform: scale(0.97); }
        .select-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: flex-end; z-index: 100; }
        .select-sheet { background: white; width: 100%; max-width: 512px; margin: 0 auto; border-radius: 20px 20px 0 0; padding: 20px; max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ── Firebase：k9-obsidian-sync（班表儲存）
        const k9Config = {
            apiKey: "AIzaSyA9D4es0iAsx9UeimM34VTaXEFuy04j8ic",
            authDomain: "k9-obsidian-sync.firebaseapp.com",
            databaseURL: "https://k9-obsidian-sync-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "k9-obsidian-sync",
            storageBucket: "k9-obsidian-sync.firebasestorage.app",
            messagingSenderId: "857635467556",
            appId: "1:857635467556:web:5ab099a5e4d72c34ae83b1"
        };

        // ── Firebase：factor-security-d1965（員工名單）
        const factorConfig = {
            apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48",
            authDomain: "factor-security-d1965.firebaseapp.com",
            databaseURL: "https://factor-security-d1965-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "factor-security-d1965",
            storageBucket: "factor-security-d1965.firebasestorage.app",
            messagingSenderId: "864846943143",
            appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
        };

        const k9App = firebase.initializeApp(k9Config, "k9");
        const factorApp = firebase.initializeApp(factorConfig, "factor");
        const k9db = firebase.database(k9App);
        const factordb = firebase.database(factorApp);

        const SHIFTS = ["日B", "夜B", "夜E", "休假", "例假", "特休", "國定", "清空"];
        const shiftHoursMap = { "日B": 12, "夜B": 12, "夜E": 12, "國定": 12 };

        function getNoteStyle(note) {
            if (!note) return "";
            if (note.includes("休假") || note.includes("例假")) return "color-off";
            if (note.includes("特休")) return "color-special";
            if (note.includes("日")) return "color-day-shift";
            if (note.includes("夜")) return "color-night-shift";
            return "text-gray-700";
        }

        // ══════════════════════════════
        //  登入畫面
        // ══════════════════════════════
        function LoginScreen({ onLogin }) {
            return (
                <div className="login-bg">
                    <div className="login-card">
                        <div className="text-center mb-8">
                            <div className="text-4xl mb-2">🗓️</div>
                            <div className="text-white font-black text-2xl">黑曜石排班系統</div>
                            <div className="text-gray-400 text-sm mt-1">V2.0</div>
                        </div>
                        <button
                            className="role-btn text-white"
                            style={{ background: '#2e5a44', borderColor: '#4a8a68' }}
                            onClick={() => onLogin('admin')}
                        >
                            👮 管理員
                        </button>
                        <button
                            className="role-btn text-white"
                            style={{ background: '#1a3a5c', borderColor: '#2563eb' }}
                            onClick={() => onLogin('staff')}
                        >
                            👤 員工查詢
                        </button>
                    </div>
                </div>
            );
        }

        // ══════════════════════════════
        //  選員工 Sheet
        // ══════════════════════════════
        function SelectStaffSheet({ employees, onSelect, onClose, title }) {
            return (
                <div className="select-overlay" onClick={onClose}>
                    <div className="select-sheet" style={{ maxWidth: 512 }} onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <div className="font-black text-lg text-gray-800">{title}</div>
                            <button onClick={onClose} className="text-gray-400 text-2xl leading-none">✕</button>
                        </div>
                        {employees.length === 0 && (
                            <div className="text-center text-gray-400 py-8">載入員工名單中...</div>
                        )}
                        {employees.map(emp => (
                            <button
                                key={emp.id}
                                onClick={() => onSelect(emp)}
                                className="w-full text-left px-4 py-3 rounded-xl mb-2 font-bold text-gray-800 active:bg-green-100"
                                style={{ background: '#f5f0e8', border: '1px solid #c2b99a' }}
                            >
                                <span className="text-gray-400 text-xs mr-2">{emp.id}</span>
                                {emp.name}
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        // ══════════════════════════════
        //  班表畫面（管理員 & 員工共用）
        // ══════════════════════════════
        function ScheduleScreen({ role, currentUser, employees, onBack }) {
            const [data, setData] = useState({});
            const [shiftText, setShiftText] = useState("日B");
            const [curYear, setCurYear] = useState(new Date().getFullYear());
            const [curMonth, setCurMonth] = useState(new Date().getMonth());
            const [selectedStaff, setSelectedStaff] = useState(
                role === 'staff' ? currentUser : null
            );
            const [showStaffPicker, setShowStaffPicker] = useState(role === 'admin' && !selectedStaff);

            // 切月份（跨年處理）
            const prevMonth = () => {
                if (curMonth === 0) { setCurYear(y => y - 1); setCurMonth(11); }
                else setCurMonth(m => m - 1);
            };
            const nextMonth = () => {
                if (curMonth === 11) { setCurYear(y => y + 1); setCurMonth(0); }
                else setCurMonth(m => m + 1);
            };

            // 讀取班表
            useEffect(() => {
                if (!selectedStaff) return;
                const path = `schedules/${selectedStaff.id}`;
                const ref = k9db.ref(path);
                ref.on('value', snap => setData(snap.val() || {}));
                return () => ref.off();
            }, [selectedStaff]);

            const handleCellClick = (day) => {
                if (role !== 'admin') return;
                if (!selectedStaff) return;
                const cellId = `${curYear}_${curMonth + 1}_${day}`;
                const newVal = shiftText === '清空' ? null : shiftText;
                k9db.ref(`schedules/${selectedStaff.id}/${cellId}`).set(newVal);
            };

            const currentPrefix = `${curYear}_${curMonth + 1}_`;
            const monthKeys = Object.keys(data).filter(k => k.startsWith(currentPrefix));
            const workDays = monthKeys.filter(k => data[k] && (data[k].includes("日") || data[k].includes("夜"))).length;
            const offDays = monthKeys.filter(k => data[k] && (data[k].includes("休") || data[k].includes("例") || data[k].includes("特"))).length;
            const totalHours = monthKeys.reduce((acc, k) => acc + (shiftHoursMap[data[k]] || 0), 0);

            const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
            const firstDay = new Date(curYear, curMonth, 1).getDay();

            return (
                <div className="max-w-[512px] mx-auto min-h-screen bg-[#e8e2d0] shadow-2xl scroll-container">
                    {/* Header */}
                    <div className="bg-black text-white p-3 sticky top-0 z-40">
                        <div className="flex justify-between items-center mb-2">
                            <button onClick={onBack} className="text-gray-400 text-sm font-bold px-1">← 返回</button>
                            <div className="text-xs font-bold text-center">
                                {role === 'admin' ? '👮 管理員' : '👤 員工查詢'}
                            </div>
                            {role === 'admin' && (
                                <button
                                    onClick={() => setShowStaffPicker(true)}
                                    className="text-xs font-bold px-2 py-1 rounded"
                                    style={{ background: '#2e5a44' }}
                                >
                                    換員工
                                </button>
                            )}
                            {role === 'staff' && <div style={{ width: 48 }}></div>}
                        </div>
                        {selectedStaff && (
                            <div className="text-center mb-1">
                                <span className="text-yellow-300 font-black text-base">{selectedStaff.name}</span>
                                <span className="text-gray-400 text-xs ml-2">{selectedStaff.id}</span>
                            </div>
                        )}
                        <div className="flex justify-between items-center">
                            <button onClick={prevMonth} className="font-black text-xl px-2">❮</button>
                            <div className="font-black text-lg">{curYear}年 {curMonth + 1}月</div>
                            <button onClick={nextMonth} className="font-black text-xl px-2">❯</button>
                        </div>
                    </div>

                    {/* 未選員工提示 */}
                    {!selectedStaff && (
                        <div className="flex flex-col items-center justify-center py-24 text-gray-500">
                            <div className="text-5xl mb-4">👇</div>
                            <div className="font-bold text-lg">請先選擇員工</div>
                            <button
                                onClick={() => setShowStaffPicker(true)}
                                className="mt-6 px-8 py-3 rounded-xl font-black text-white text-base"
                                style={{ background: '#2e5a44' }}
                            >
                                選擇員工
                            </button>
                        </div>
                    )}

                    {/* 月曆 */}
                    {selectedStaff && (
                        <div className="grid grid-cols-7 border-t border-[#c2b99a]">
                            {["日","一","二","三","四","五","六"].map(w => (
                                <div key={w} className="text-center py-2 bg-[#f0e9d2] font-bold text-xs text-gray-600">{w}</div>
                            ))}
                            {Array.from({ length: firstDay }).map((_, i) => <div key={i} className="grid-cell"></div>)}
                            {Array.from({ length: daysInMonth }).map((_, i) => {
                                const day = i + 1;
                                const note = data[`${curYear}_${curMonth + 1}_${day}`] || "";
                                return (
                                    <div
                                        key={day}
                                        onClick={() => handleCellClick(day)}
                                        className={`grid-cell p-1 flex flex-col ${role === 'admin' ? 'cursor-pointer active:bg-amber-100' : ''}`}
                                    >
                                        <div className="text-xs text-gray-400 font-bold">{day}</div>
                                        <div className={`mt-auto val-text ${getNoteStyle(note)}`}>{note}</div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {/* 底部面板 */}
                    {selectedStaff && (
                        <div className="bottom-panel">
                            <div className="grid grid-cols-3 gap-1 mb-2 px-1 text-[11px] font-black text-gray-700 bg-white p-2 rounded border border-gray-200">
                                <div className="text-center text-blue-600"><div>上班</div><div>{workDays} 天</div></div>
                                <div className="text-center text-orange-600 border-x border-gray-200"><div>工時</div><div>{totalHours} 時</div></div>
                                <div className="text-center text-red-600"><div>休息</div><div>{offDays} 天</div></div>
                            </div>
                            {role === 'admin' && (
                                <>
                                    <div className="flex justify-between items-center px-1 mb-1">
                                        <div className="font-bold text-[10px] text-gray-500">目前選定：<span className={getNoteStyle(shiftText)}>{shiftText || '（清空）'}</span></div>
                                    </div>
                                    <div className="grid grid-cols-4 gap-1.5">
                                        {SHIFTS.map(s => (
                                            <button
                                                key={s}
                                                onClick={() => setShiftText(s)}
                                                className="py-1.5 rounded-lg text-[11px] font-black shadow-sm"
                                                style={{
                                                    background: shiftText === s ? '#2e5a44' : 'white',
                                                    color: shiftText === s ? 'white' : '#374151',
                                                    border: `1px solid ${shiftText === s ? '#2e5a44' : '#d1d5db'}`
                                                }}
                                            >
                                                {s}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            )}
                            {role === 'staff' && (
                                <div className="text-center text-xs text-gray-400 py-1">僅供查看，如需更改請聯絡管理員</div>
                            )}
                        </div>
                    )}

                    {/* 選員工 Sheet */}
                    {showStaffPicker && (
                        <SelectStaffSheet
                            employees={employees}
                            title={role === 'admin' ? '選擇要排班的員工' : '選擇你的名字'}
                            onSelect={emp => { setSelectedStaff(emp); setShowStaffPicker(false); }}
                            onClose={() => setShowStaffPicker(false)}
                        />
                    )}
                </div>
            );
        }

        // ══════════════════════════════
        //  主程式
        // ══════════════════════════════
        function App() {
            const [screen, setScreen] = useState('login');   // login | schedule
            const [role, setRole] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [employees, setEmployees] = useState([]);
            const [showStaffPicker, setShowStaffPicker] = useState(false);

            // 載入員工名單
            useEffect(() => {
                const ref = factordb.ref('employee_list');
                ref.once('value', snap => {
                    const raw = snap.val() || {};
                    const list = Object.values(raw)
                        .filter(e => e && e.name)
                        .map(e => ({ id: e.id || '', name: e.name }))
                        .sort((a, b) => a.name.localeCompare(b.name, 'zh-TW'));
                    setEmployees(list);
                });
            }, []);

            const handleLogin = (selectedRole) => {
                setRole(selectedRole);
                if (selectedRole === 'admin') {
                    setScreen('schedule');
                } else {
                    // 員工先選名字
                    setShowStaffPicker(true);
                }
            };

            const handleStaffSelect = (emp) => {
                setCurrentUser(emp);
                setShowStaffPicker(false);
                setScreen('schedule');
            };

            return (
                <>
                    {screen === 'login' && (
                        <>
                            <LoginScreen onLogin={handleLogin} />
                            {showStaffPicker && (
                                <SelectStaffSheet
                                    employees={employees}
                                    title="請選擇你的名字"
                                    onSelect={handleStaffSelect}
                                    onClose={() => setShowStaffPicker(false)}
                                />
                            )}
                        </>
                    )}
                    {screen === 'schedule' && (
                        <ScheduleScreen
                            role={role}
                            currentUser={currentUser}
                            employees={employees}
                            onBack={() => { setScreen('login'); setRole(null); setCurrentUser(null); }}
                        />
                    )}
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
