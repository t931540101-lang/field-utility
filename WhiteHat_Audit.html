<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小黑哥資安檢查清單</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 15px; margin: 0; line-height: 1.6; }
        h2 { color: #00ff41; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .card { background: #252525; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #00ff41; }
        input[type="checkbox"] { transform: scale(1.3); margin-right: 10px; }
        label { font-size: 14px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>🛡️ 帳號安全健檢</h2>
    <div class="card">
        <input type="checkbox" id="c1"> <label for="c1">語音信箱已關閉 (或密碼已更改)</label>
    </div>
    <div class="card">
        <input type="checkbox" id="c2"> <label for="c2">LINE 已綁定 Email 與第三方帳號</label>
    </div>
    <div class="card">
        <input type="checkbox" id="c3"> <label for="c3">已檢查「登入中的裝置」無異常</label>
    </div>
    <div class="card">
        <input type="checkbox" id="c4"> <label for="c4">關閉 LINE「允許自其他裝置登入」(若無電腦需求)</label>
    </div>
    <button onclick="saveStatus()">儲存本次稽核狀態</button>

    <script>
        function saveStatus() {
            const checks = Array.from(document.querySelectorAll('input[type="checkbox"]')).map(i => i.checked);
            localStorage.setItem('security_audit', JSON.stringify(checks));
            alert('白帽任務：檢查清單已儲存至 LocalStorage！');
        }
        window.onload = () => {
            const saved = JSON.parse(localStorage.getItem('security_audit'));
            if (saved) {
                document.querySelectorAll('input[type="checkbox"]').forEach((i, idx) => i.checked = saved[idx]);
            }
        };
    </script>
</body>
</html>
