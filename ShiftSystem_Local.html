<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台灣精銳警衛排班系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #e8e2d0; margin: 0; overflow-x: hidden; }
        .grid-cell { min-height: 75px; border-right: 1px solid #c2b99a; border-bottom: 1px solid #c2b99a; transition: all 0.2s; }
        .val-text { font-weight: 900; font-size: 13px; text-align: center; }
        .color-off { color: #c0392b; }
        .color-special { color: #d4af37; }
        .color-day-shift { color: #2563eb; }
        .color-night-shift { color: #4b5563; }
        .bottom-panel { position: fixed; bottom: 0; width: 100%; max-width: 512px; background: rgba(255,255,255,0.98); padding: 12px; border-top: 2px solid #2e5a44; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [data, setData] = useState(() => JSON.parse(localStorage.getItem('localSchedule') || "{}"));
            const [shiftText, setShiftText] = useState("日B");
            const [userName, setUserName] = useState(localStorage.getItem('guardName') || "姓名");
            const [userID, setUserID] = useState(localStorage.getItem('guardID') || "工號");
            const [curYear] = useState(new Date().getFullYear());
            const [curMonth, setCurMonth] = useState(new Date().getMonth());

            useEffect(() => { 
                localStorage.setItem('localSchedule', JSON.stringify(data)); 
                localStorage.setItem('guardName', userName);
                localStorage.setItem('guardID', userID);
            }, [data, userName, userID]);

            const handleCellClick = (day) => {
                const cellId = `${curYear}_${curMonth + 1}_${day}`;
                setData(prev => ({ ...prev, [cellId]: shiftText }));
            };

            const getNoteStyle = (note) => {
                if (note.includes("休假") || note.includes("例假")) return "color-off";
                if (note.includes("特休")) return "color-special";
                if (note.includes("日")) return "color-day-shift";
                if (note.includes("夜")) return "color-night-shift";
                return "text-gray-700";
            };

            const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
            const firstDay = new Date(curYear, curMonth, 1).getDay();

            return (
                <div className="max-w-[512px] mx-auto pb-40 min-h-screen bg-[#e8e2d0] shadow-2xl">
                    {/* 頂部整合控制台 */}
                    <div className="bg-black text-white p-3 sticky top-0 z-40">
                        <div className="flex justify-between items-center mb-2 text-xs font-bold px-1">
                            <span onClick={() => setUserName(prompt("請輸入姓名", userName) || userName)} className="cursor-pointer border-b border-gray-600">{userName}</span>
                            <span onClick={() => setUserID(prompt("請輸入工號", userID) || userID)} className="cursor-pointer border-b border-gray-600">{userID}</span>
                        </div>
                        <div className="flex justify-between items-center">
                            <button onClick={() => setCurMonth(m => m - 1)} className="font-black text-xl px-2">❮</button>
                            <div className="font-black text-lg">{curYear}年 {curMonth + 1}月</div>
                            <button onClick={() => setCurMonth(m => m + 1)} className="font-black text-xl px-2">❯</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-7 border-t border-[#c2b99a]">
                        {["日","一","二","三","四","五","六"].map(w => (
                            <div key={w} className="text-center py-2 bg-[#f0e9d2] font-bold text-xs text-gray-600">{w}</div>
                        ))}
                        {Array.from({ length: firstDay }).map((_, i) => <div key={i} className="grid-cell"></div>)}
                        {Array.from({ length: daysInMonth }).map((_, i) => {
                            const day = i + 1;
                            const note = data[`${curYear}_${curMonth + 1}_${day}`] || "";
                            return (
                                <div key={day} onClick={() => handleCellClick(day)} className="grid-cell p-1 flex flex-col cursor-pointer active:bg-amber-100">
                                    <div className="text-xs text-gray-400 font-bold">{day}</div>
                                    <div className={`mt-auto val-text ${getNoteStyle(note)}`}>{note}</div>
                                </div>
                            );
                        })}
                    </div>
                    
                    <div className="bottom-panel">
                        <div className="font-bold text-xs mb-2 text-gray-500">目前選定：<span className={getNoteStyle(shiftText)}>{shiftText}</span></div>
                        <div className="grid grid-cols-4 gap-2">
                            {["日B", "夜B", "夜E", "休假", "例假", "特休", "國定", "清空"].map(s => (
                                <button key={s} onClick={()=>s==='清空'?setShiftText(''):setShiftText(s)} 
                                    className="bg-white border border-gray-300 py-2 rounded-lg text-xs font-black text-gray-700 active:bg-[#2e5a44] active:text-white shadow-sm">
                                    {s}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
