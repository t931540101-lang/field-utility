<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黑曜石訪客登記中樞 v1.0</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #aaaaaa;
            --accent: #00adb5;
            --success: #28a745;
            --danger: #dc3545;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { width: 100%; max-width: 360px; }
        .header { margin: 10px 0; text-align: center; }
        .header h1 { font-size: 1.2rem; color: var(--accent); letter-spacing: 1px; }
        
        /* 登記表單 */
        .form-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #333;
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-sub); margin-bottom: 4px; }
        .form-input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
        }
        .form-input:focus { border-color: var(--accent); }
        .btn {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            color: white;
            background: var(--accent);
            transition: background 0.2s;
        }
        .btn:active { background: #008c92; }

        /* 統計區 */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        /* 訪客名單 */
        .list-title { font-size: 0.95rem; color: var(--text-sub); margin-bottom: 8px; }
        .visitor-list { list-style: none; max-height: 350px; overflow-y: auto; }
        .visitor-item {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 4px solid #555;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .visitor-item.inside { border-left-color: var(--success); }
        
        .info strong { color: white; font-size: 0.95rem; }
        .info p { color: var(--text-sub); font-size: 0.75rem; margin-top: 3px; }
        
        .action-zone { text-align: right; }
        .btn-checkout {
            background: rgba(40, 167, 69, 0.2);
            color: #4cd137;
            border: 1px solid #28a745;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
        }
        .time-out-text { font-size: 0.75rem; color: var(--text-sub); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>OBSIDIAN 訪客登記中樞</h1>
    </div>

    <div class="form-card">
        <div class="form-group">
            <label>訪客姓名</label>
            <input type="text" id="vName" class="form-input" placeholder="例：張經理" autocomplete="off">
        </div>
        <div class="form-group">
            <label>拜訪部門 / 對象</label>
            <input type="text" id="vTarget" class="form-input" placeholder="例：製造部 小黑哥" autocomplete="off">
        </div>
        <button class="btn" onclick="checkInVisitor()">🚀 登記進入 (Check-In)</button>
    </div>

    <div class="stats-bar">
        <span>廠內現有訪客：<strong id="insideCount" style="color:var(--success)">0</strong> 人</span>
        <span style="cursor:pointer;" onclick="clearAllData()">🗑️ 清空歷史</span>
    </div>

    <div class="list-title">今日進出水線</div>
    <ul id="visitorList" class="visitor-list"></ul>
</div>

<script>
    // 記憶體資料庫
    let visitors = [];

    // 初始化：從手機 LocalStorage 載入歷史檔案
    document.addEventListener('DOMContentLoaded', () => {
        const localData = localStorage.getItem('obsidian_visitors');
        if (localData) {
            visitors = JSON.parse(localData);
        }
        renderList();
    });

    // 動作：訪客進入登記
    function checkInVisitor() {
        const nameInput = document.getElementById('vName');
        const targetInput = document.getElementById('vTarget');

        if (!nameInput.value.trim() || !targetInput.value.trim()) {
            alert('欄位填一下啦，小黑哥！');
            return;
        }

        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        const newVisitor = {
            id: Date.now(),
            name: nameInput.value.trim(),
            target: targetInput.value.trim(),
            timeIn: timeStr,
            timeOut: null
        };

        visitors.push(newVisitor);
        saveToLocal();
        renderList();

        // 清空輸入框
        nameInput.value = '';
        targetInput.value = '';
    }

    // 動作：廠商辦完事離開 (Check-Out)
    function checkOutVisitor(id) {
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        const visitor = visitors.find(v => v.id === id);
        if (visitor) {
            visitor.timeOut = timeStr;
            saveToLocal();
            renderList();
        }
    }

    // 儲存至手機 LocalStorage
    function saveToLocal() {
        localStorage.setItem('obsidian_visitors', JSON.stringify(visitors));
    }

    // 重新洗畫面
    function renderList() {
        const listEl = document.getElementById('visitorList');
        const insideCountEl = document.getElementById('insideCount');
        
        let insideCount = 0;
        
        // 最新登記的排在最上面
        const displayData = [...visitors].reverse();

        if (displayData.length === 0) {
            listEl.innerHTML = '<li style="text-align:center; color:#555; padding:20px; font-size:0.85rem;">目前無訪客登記紀錄</li>';
            insideCountEl.innerText = 0;
            return;
        }

        listEl.innerHTML = displayData.map(v => {
            const isInside = v.timeOut === null;
            if (isInside) insideCount++;

            return `
                <li class="visitor-item ${isInside ? 'inside' : ''}">
                    <div class="info">
                        <strong>${v.name}</strong>
                        <p>🎯 拜訪: ${v.target}</p>
                        <p>⏱️ 進入: ${v.timeIn}</p>
                    </div>
                    <div class="action-zone">
                        ${isInside ? 
                            `<button class="btn-checkout" onclick="checkOutVisitor(${v.id})">離開 🚪</button>` : 
                            `<span class="time-out-text">🚪 離開:<br>${v.timeOut}</span>`
                        }
                    </div>
                </li>
            `;
        }).join('');

        insideCountEl.innerText = insideCount;
    }

    // 清空重來
    function clearAllData() {
        if (confirm('確定要清空手機內的所有訪客紀錄嗎？')) {
            visitors = [];
            saveToLocal();
            renderList();
        }
    }
</script>

</body>
</html>
