<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班務通 ShiftHQ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8; --white: #ffffff; --border: #e8eaee; --text: #1a1c22;
    --text2: #6b7080; --text3: #b0b5c0; --sunday: #e05050; --saturday: #4a7eda;
    --today-bg: #2a6be8; --accent: #e8a020;
    --tag-blue: #cce0f8; --tag-blue-text: #2a6be8;
    --tag-pink: #fce4e4; --tag-pink-text: #d04040;
    --tag-orange: #fde8c0; --tag-orange-text: #c07010;
    --tag-green: #d4f0e0; --tag-green-text: #1a9050;
    --tag-purple: #e8d8f8; --tag-purple-text: #6030b0;
    --tag-gray: #e8eaee; --tag-gray-text: #7080a0;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; max-width:430px; margin:0 auto; overflow-x:hidden; }

  /* TOP BAR & NAV */
  .topbar { background:var(--white); display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); }
  .topbar-month { font-size:36px; font-weight:300; }
  .month-nav { background:var(--white); display:flex; align-items:center; justify-content:space-between; padding:6px 12px; border-bottom:1px solid var(--border); }
  .dow-row { display:grid; grid-template-columns:repeat(7,1fr); background:var(--white); border-bottom:1px solid var(--border); padding:6px 0; }
  .dow-cell { text-align:center; font-size:12px; font-weight:500; color:var(--text2); }

  /* CALENDAR GRID */
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); background:var(--border); gap:1px; }
  .cal-cell { background:var(--white); min-height:80px; padding:4px 2px; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; }
  .cal-cell.today .cal-day-num { background:var(--today-bg); color:#fff; font-weight:700; }
  .cal-day-num { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .shift-tag { width:95%; border-radius:4px; padding:2px 0; text-align:center; font-size:10px; font-weight:600; margin-bottom:1px; }

  /* WAGE & PAGES */
  .page { display:none; padding-bottom:100px; }
  .page.active { display:block; }
  .stats-bar { background:var(--white); display:flex; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
  .stat-item { flex:1; padding:12px 0; text-align:center; border-right:1px solid var(--border); }
  
  /* MODAL */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; display:none; align-items:flex-end; }
  .modal-backdrop.open { display:flex; }
  .modal { background:var(--white); border-radius:20px 20px 0 0; width:100%; max-height:90vh; overflow-y:auto; padding:20px; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

  /* UI COMPONENTS */
  .navbar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:var(--white); border-top:1px solid var(--border); display:flex; padding:8px 0; z-index:100; }
  .nav-item { flex:1; text-align:center; cursor:pointer; }
  .nav-fab-btn { width:48px; height:48px; background:var(--text); border-radius:50%; color:#fff; display:flex; align-items:center; justify-content:center; margin-top:-20px; box-shadow:0 4px 10px rgba(0,0,0,0.2); }
  .btn { width:100%; padding:12px; border-radius:8px; border:none; font-weight:600; margin-top:10px; cursor:pointer; }
  .btn-primary { background:var(--today-bg); color:#white; }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff; padding:8px 16px; border-radius:20px; opacity:0; pointer-events:none; transition:0.3s; z-index:1000; }
</style>
</head>
<body>

<div id="calTopbar">
  <div class="topbar">
    <div onclick="exportText()" style="cursor:pointer">📋</div>
    <div class="topbar-month" id="topbarMonthNum">3</div>
    <div style="text-align:right">
      <div id="topbarYear" style="font-size:12px">2026</div>
      <div id="topbarYM" style="font-size:12px">3月</div>
    </div>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div id="monthNavLabel">2026年3月</div>
    <button onclick="changeMonth(1)">›</button>
  </div>
  <div class="dow-row">
    <div class="dow-cell" style="color:var(--sunday)">日</div><div class="dow-cell">一</div>
    <div class="dow-cell">二</div><div class="dow-cell">三</div>
    <div class="dow-cell">四</div><div class="dow-cell">五</div>
    <div class="dow-cell" style="color:var(--saturday)">六</div>
  </div>
</div>

<div class="page active" id="page-cal">
  <div class="cal-grid" id="calGrid"></div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="page" id="page-today">
  <div style="padding:20px"><div id="todayCard" class="stat-item" style="background:#fff; border-radius:15px; padding:20px;"></div></div>
</div>

<div class="page" id="page-wage">
  <div style="padding:20px; background:#fff; text-align:center;">
    <div id="wagePeriodLabel" style="font-size:14px; color:#666;">預估薪資</div>
    <div style="font-size:36px; font-weight:700;" id="wageTotal">0</div>
    <div style="margin-top:10px;">時薪: <input type="number" id="hourlyRate" value="180" oninput="recalcWage()" style="width:60px; padding:4px;"></div>
  </div>
  <div id="wageBreakdown" style="margin-top:10px;"></div>
</div>

<div class="page" id="page-other">
  <div style="padding:20px;">
    <button class="btn" onclick="exportCSV()">📊 匯出 CSV</button>
    <button class="btn" onclick="clearAllData()" style="color:red">🗑️ 清除所有資料</button>
  </div>
</div>

<nav class="navbar">
  <div class="nav-item" onclick="showPage('today',this)">🏠<div style="font-size:10px">今日</div></div>
  <div class="nav-item active" onclick="showPage('cal',this)">📅<div style="font-size:10px">月曆</div></div>
  <div class="nav-item" onclick="openAddShift(null)"><div class="nav-fab-btn">＋</div></div>
  <div class="nav-item" onclick="showPage('wage',this)">💰<div style="font-size:10px">薪水</div></div>
  <div class="nav-item" onclick="showPage('other',this)">⚙️<div style="font-size:10px">設定</div></div>
</nav>

<div class="toast" id="toast"></div>

<div class="modal-backdrop" id="shiftModal">
  <div class="modal">
    <h3 id="modalTitle">新增班次</h3><br>
    <input type="date" id="shiftDate" class="btn" style="border:1px solid #ddd"><br>
    <input type="text" id="shiftName" placeholder="班次名稱" class="btn" style="border:1px solid #ddd"><br>
    <div style="display:flex; gap:10px;">
      <input type="time" id="shiftStart" class="btn" style="border:1px solid #ddd">
      <input type="time" id="shiftEnd" class="btn" style="border:1px solid #ddd">
    </div>
    <button class="btn btn-primary" onclick="saveShift()">儲存班次</button>
    <button id="deleteShiftBtn" class="btn" style="color:red; display:none;" onclick="deleteShift()">刪除班次</button>
    <button class="btn" onclick="closeModal('shiftModal')">關閉</button>
  </div>
</div>

<script>
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let shifts = JSON.parse(localStorage.getItem('shifts') || '{}');
let editingDate = null, editingIndex = null;

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('calTopbar').style.display = id === 'cal' ? 'block' : 'none';
  if(id === 'wage') recalcWage();
  if(id === 'today') renderToday();
}

function renderCalendar() {
  const y = currentYear, m = currentMonth;
  document.getElementById('topbarMonthNum').textContent = m + 1;
  document.getElementById('monthNavLabel').textContent = `${y}年${m + 1}月`;
  
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  for (let i = 0; i < 42; i++) {
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    const dayNum = i - firstDay + 1;
    const dateKey = `${y}-${String(m + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;

    if (dayNum > 0 && dayNum <= daysInMonth) {
      const numEl = document.createElement('div');
      numEl.className = 'cal-day-num';
      numEl.textContent = dayNum;
      cell.appendChild(numEl);

      // 渲染班次標籤
      (shifts[dateKey] || []).forEach((s, idx) => {
        const tag = document.createElement('div');
        tag.className = `shift-tag tag-${s.color || 'blue'}`;
        tag.style.background = 'var(--tag-blue)';
        tag.textContent = s.name;
        tag.onclick = (e) => { e.stopPropagation(); editShift(dateKey, idx); };
        cell.appendChild(tag);
      });

      cell.onclick = () => openAddShift(dateKey);
      if (new Date().toDateString() === new Date(y, m, dayNum).toDateString()) cell.classList.add('today');
    } else {
      cell.style.background = '#f9f9f9';
    }
    grid.appendChild(cell);
  }
  renderStats();
}

function openAddShift(date) {
  editingDate = date; editingIndex = null;
  document.getElementById('modalTitle').textContent = "新增班次";
  document.getElementById('shiftDate').value = date || "";
  document.getElementById('deleteShiftBtn').style.display = "none";
  document.getElementById('shiftModal').classList.add('open');
}

function editShift(date, idx) {
  editingDate = date; editingIndex = idx;
  const s = shifts[date][idx];
  document.getElementById('modalTitle').textContent = "編輯班次";
  document.getElementById('shiftDate').value = date;
  document.getElementById('shiftName').value = s.name;
  document.getElementById('shiftStart').value = s.start;
  document.getElementById('shiftEnd').value = s.end;
  document.getElementById('deleteShiftBtn').style.display = "block";
  document.getElementById('shiftModal').classList.add('open');
}

function saveShift() {
  const date = document.getElementById('shiftDate').value;
  const name = document.getElementById('shiftName').value;
  if(!date || !name) return alert("請填寫日期與名稱");

  const newShift = {
    name: name,
    start: document.getElementById('shiftStart').value,
    end: document.getElementById('shiftEnd').value,
    color: 'blue'
  };

  if(!shifts[date]) shifts[date] = [];
  if(editingIndex !== null) shifts[date][editingIndex] = newShift;
  else shifts[date].push(newShift);

  localStorage.setItem('shifts', JSON.stringify(shifts));
  closeModal('shiftModal');
  renderCalendar();
}

function deleteShift() {
  shifts[editingDate].splice(editingIndex, 1);
  localStorage.setItem('shifts', JSON.stringify(shifts));
  closeModal('shiftModal');
  renderCalendar();
}

function calcHours(start, end) {
  if(!start || !end) return 0;
  let s = start.split(':'), e = end.split(':');
  let mins = (parseInt(e[0])*60 + parseInt(e[1])) - (parseInt(s[0])*60 + parseInt(s[1]));
  if(mins < 0) mins += 1440;
  let hrs = mins / 60;
  return hrs > 8 ? hrs - 1 : hrs; // 超過8小時扣1小時休息
}

function recalcWage() {
  let total = 0;
  const rate = document.getElementById('hourlyRate').value;
  for(let date in shifts) {
    if(date.startsWith(`${currentYear}-${String(currentMonth+1).padStart(2,'0')}`)) {
      shifts[date].forEach(s => total += calcHours(s.start, s.end) * rate);
    }
  }
  document.getElementById('wageTotal').textContent = `NT$ ${Math.round(total).toLocaleString()}`;
}

function changeMonth(dir) {
  currentMonth += dir;
  if(currentMonth > 11) { currentMonth = 0; currentYear++; }
  if(currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function renderStats() { /* 可在此增加月統計邏輯 */ }
function renderToday() {
  const today = new Date().toISOString().split('T')[0];
  const s = shifts[today] ? shifts[today][0] : null;
  document.getElementById('todayCard').innerHTML = s ? `<h3>今日班次</h3><p>${s.name}</p><p>${s.start} - ${s.end}</p>` : "今日無班次";
}

renderCalendar();
</script>
</body>
</html>
