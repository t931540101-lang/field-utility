<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>排班助手 - 專業仿製版</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --border-color: #e0e0e0; /* 稍微加深邊框，更有格子感 */
            --sunday-color: #ff8a80;
            --saturday-color: #82b1ff;
            --primary-teal: #4db6ac;
            --text-main: #333;
            --text-sub: #999;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; margin: 0; display: flex; flex-direction: column; background: var(--bg-color); font-family: -apple-system, sans-serif; overflow: hidden; }

        /* 頂部月份標題 */
        header { padding: 10px 0; text-align: center; border-bottom: 1px solid var(--border-color); flex-shrink: 0; position: relative; }
        .month-num { font-size: 34px; font-weight: bold; color: var(--text-main); }
        .year-text { font-size: 12px; color: var(--text-sub); font-weight: 600; line-height: 1; }

        /* 星期列 */
        .weekdays { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            text-align: center; 
            padding: 8px 0; 
            border-bottom: 1px solid var(--border-color); 
            font-size: 12px; 
            background: #fafafa;
        }
        .weekdays div:first-child { color: var(--sunday-color); }
        .weekdays div:last-child { color: var(--saturday-color); }

        /* 日曆網格：仿參考圖的細邊框 */
        .calendar-grid { 
            flex: 1; 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            grid-auto-rows: 1fr; 
            width: 100%; 
        }

        .day-cell { 
            border-right: 0.5px solid var(--border-color); 
            border-bottom: 0.5px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 5px; 
            position: relative; 
            min-width: 0;
        }
        
        /* 選取效果 */
        .day-cell.multiselect { background-color: #f0fdfa; }
        .day-cell.selected { background-color: #fff9c4; outline: 2px solid #ffeb3b; outline-offset: -2px; z-index: 2; }

        .date-num { font-size: 18px; color: #444; margin-bottom: 2px; }

        /* 班別標籤：參考圖是小橢圓形 */
        .shift-label { 
            font-size: 10px; 
            width: 85%; 
            padding: 3px 0; 
            border-radius: 12px; 
            text-align: center; 
            font-weight: bold; 
            margin-top: 2px;
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .shift-rest { background-color: #ffcdd2; color: #c62828; } /* 休假：粉紅 */
        .shift-b { background-color: #bbdefb; color: #1565c0; }    /* 日B班：淡藍 */

        /* 底部導覽列：高度稍微降低，並優化圖示 */
        .bottom-nav { 
            height: 75px; 
            display: flex; 
            justify-content: space-around; 
            align-items: flex-end; 
            border-top: 1px solid var(--border-color); 
            padding-bottom: 10px; 
            background: #fff; 
            flex-shrink: 0;
        }
        .nav-item { text-align: center; font-size: 10px; color: #555; cursor: pointer; flex: 1; padding-bottom: 5px; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; display: block; }

        /* 中間新增按鈕：縮小並調整位置 */
        .add-btn-main { 
            width: 48px; 
            height: 48px; 
            background: #4a4a4a; 
            color: white; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 26px; 
            margin-bottom: 15px; /* 讓它稍微浮起 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            transition: 0.3s; 
            z-index: 10;
        }
        .add-btn-main.active { background: #009688; transform: rotate(45deg); }

        /* 彈窗樣式 */
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 90; }
        #shiftSheet { position: fixed; bottom: -100%; left: 0; width: 100%; background: #fff; transition: bottom 0.3s ease-out; z-index: 100; border-radius: 20px 20px 0 0; }
        #shiftSheet.active { bottom: 0; }
        .sheet-header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; font-weight: bold; }
        .shift-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        .opt-btn { background: #f5f5f5; border-radius: 12px; padding: 15px; text-align: center; border: none; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="month-num">4</div>
    <div class="year-text">4月 2026</div>
</header>

<div class="weekdays">
    <div>週日</div><div>週一</div><div>週二</div><div>週三</div><div>週四</div><div>週五</div><div>週六</div>
</div>

<div class="calendar-grid" id="calendarGrid"></div>

<nav class="bottom-nav">
    <div class="nav-item"><span class="nav-icon">📅</span>今日</div>
    <div class="nav-item"><span class="nav-icon">🎨</span>輪班</div>
    <div class="add-btn-main" id="batchBtn">+</div>
    <div class="nav-item" id="salaryBtn"><span class="nav-icon">💰</span>薪水</div>
    <div class="nav-item" id="settingBtn"><span class="nav-icon">⚙️</span>其它</div>
</nav>

<div id="overlay"></div>
<div id="shiftSheet">
    <div class="sheet-header" id="sheetTitle">設定班別</div>
    <div class="shift-options">
        <div class="opt-btn" onclick="applyShift('休假', 'shift-rest')"><b>休假</b><br><small>例假</small></div>
        <div class="opt-btn" onclick="applyShift('日B班', 'shift-b')"><b>日B班</b><br><small>07:00-19:00</small></div>
        <div class="opt-btn" onclick="applyShift('', '')"><b>清除內容</b></div>
        <div class="opt-btn" style="background:#eee" onclick="closeSheet()">取消</div>
    </div>
</div>

<script>
    const grid = document.getElementById('calendarGrid');
    const sheet = document.getElementById('shiftSheet');
    const overlay = document.getElementById('overlay');
    const batchBtn = document.getElementById('batchBtn');
    
    let isBatchMode = false;
    let selectedDates = []; 
    let singleSelectedDate = null; 
    let schedule = JSON.parse(localStorage.getItem('schedule_2026_04')) || {};

    function initCalendar() {
        grid.innerHTML = '';
        const firstDay = 3; 
        for (let i = 0; i < 35; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            const date = i - firstDay + 1;
            
            if (date > 0 && date <= 30) {
                cell.innerHTML = `<div class="date-num">${date}</div>`;
                if (schedule[date]) {
                    const lb = document.createElement('div');
                    lb.className = `shift-label ${schedule[date].type}`;
                    lb.innerText = schedule[date].name;
                    cell.appendChild(lb);
                }
                if (i % 7 === 0) cell.querySelector('.date-num').style.color = 'var(--sunday-color)';
                if (i % 7 === 6) cell.querySelector('.date-num').style.color = 'var(--saturday-color)';
                if (isBatchMode && selectedDates.includes(date)) cell.classList.add('multiselect');
                cell.onclick = () => handleCellClick(date, cell);
            }
            grid.appendChild(cell);
        }
    }

    function handleCellClick(date, cell) {
        if (isBatchMode) {
            if (selectedDates.includes(date)) {
                selectedDates = selectedDates.filter(d => d !== date);
                cell.classList.remove('multiselect');
            } else {
                selectedDates.push(date);
                cell.classList.add('multiselect');
            }
        } else {
            singleSelectedDate = date;
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
            cell.classList.add('selected');
            openSheet(`設定 ${date} 日班別`);
        }
    }

    function openSheet(title) {
        document.getElementById('sheetTitle').innerText = title;
        sheet.classList.add('active');
        overlay.style.display = 'block';
    }

    function closeSheet() {
        sheet.classList.remove('active');
        overlay.style.display = 'none';
        if (!isBatchMode) document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
    }

    function applyShift(name, type) {
        if (isBatchMode) {
            selectedDates.forEach(d => {
                if (name === "") delete schedule[d];
                else schedule[d] = { name, type };
            });
            isBatchMode = false;
            selectedDates = [];
            batchBtn.classList.remove('active');
        } else {
            if (name === "") delete schedule[singleSelectedDate];
            else schedule[singleSelectedDate] = { name, type };
        }
        localStorage.setItem('schedule_2026_04', JSON.stringify(schedule));
        initCalendar();
        closeSheet();
    }

    batchBtn.onclick = () => {
        if (!isBatchMode) {
            isBatchMode = true;
            selectedDates = [];
            batchBtn.classList.add('active');
        } else {
            if (selectedDates.length > 0) openSheet(`批次設定 ${selectedDates.length} 天`);
            else {
                isBatchMode = false;
                batchBtn.classList.remove('active');
                initCalendar();
            }
        }
    };

    overlay.onclick = closeSheet;
    initCalendar();
</script>
</body>
</html>
