<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小黑哥排班表 Pro - 完整版</title>
    <style>
        :root { --border: #f0f0f0; --sun: #d9534f; --sat: #428bca; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { text-align: center; padding: 15px 0; font-weight: bold; font-size: 18px; color: #1a1a1a; }
        .week-bar { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 11px; color: #888; padding: 5px 0; border-top: 1px solid var(--border); }
        .week-bar div:first-child { color: var(--sun); }
        .week-bar div:last-child { color: var(--sat); }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); flex-grow: 1; border-top: 1px solid var(--border); }
        .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px 2px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        .date { font-size: 14px; font-weight: 400; color: #444; margin-bottom: 4px; }
        
        /* 班別標籤樣式 - 簡潔、圓潤 */
        .tag { font-size: 9px; padding: 2px 4px; border-radius: 4px; width: 85%; text-align: center; margin-top: 2px; }
        .tag-day { background: #fff3e0; color: #e65100; border: 0.5px solid #ffe0b2; }
        .tag-night { background: #e8eaf6; color: #3f51b5; border: 0.5px solid #c5cae9; }

        .nav { height: 50px; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid var(--border); background: #fff; font-size: 11px; color: #666; }
        .fab { width: 40px; height: 40px; background: #4a4a4a; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-top: -20px; box-shadow: 0 2px 5px rgba(0,0,0,0.15); }
    </style>
</head>
<body>

<div class="header">2026年 6月</div>
<div class="week-bar">
    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
</div>
<div class="grid" id="calendar"></div>

<nav class="nav">
    <div>今日</div><div>輪班</div>
    <div class="fab">+</div>
    <div>薪水</div><div>其它</div>
</nav>

<script>
    const year = 2026, month = 5; 
    const grid = document.getElementById('calendar');
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // 班別定義：顏色配置
    const shiftTypes = {
        "日B": { bg: "#e3f2fd", color: "#1976d2" }, // 藍色系
        "夜B": { bg: "#f3e5f5", color: "#7b1fa2" }, // 紫色系
        "夜E": { bg: "#ede7f6", color: "#512da8" }, // 深紫系
        "休假": { bg: "#f5f5f5", color: "#616161" }, // 灰色
        "例假": { bg: "#e8f5e9", color: "#2e7d32" }, // 綠色
        "特休": { bg: "#fff3e0", color: "#e65100" }, // 橘色
        "國定假日": { bg: "#ffebee", color: "#c62828" }, // 紅色
        "換班": { bg: "#fff9c4", color: "#fbc02d" }  // 黃色
    };

    // 填充空白
    for(let i = 0; i < firstDay; i++) grid.appendChild(document.createElement('div'));
    
    // 渲染日期與班別 (這裡我簡單寫一個判斷邏輯，你可以之後改成讀取你的存檔)
    for(let i = 1; i <= daysInMonth; i++) {
        let cell = document.createElement('div');
        cell.className = 'cell';
        
        // 測試邏輯：隨機分配班別 (之後我們會換成真正的存檔讀取)
        const types = Object.keys(shiftTypes);
        const randomType = types[i % types.length];
        const style = shiftTypes[randomType];
        
        cell.innerHTML = `
            <div class="date">${i}</div>
            <div class="tag" style="background:${style.bg}; color:${style.color}; border:0.5px solid ${style.bg}">${randomType}</div>
        `;
        grid.appendChild(cell);
    }
</script>
</body>
</html>
