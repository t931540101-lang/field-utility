<script>
// ══════════════════════════════
//  Firebase 設定
// ══════════════════════════════
const firebaseConfig = {
    apiKey: "AIzaSyB2_tKKsVT4kdW7PPkJgI9O7S1YdCWor48",
    databaseURL: "https://factor-security-d1965-default-rtdb.firebaseio.com",
    projectId: "factor-security-d1965",
    appId: "1:864846943143:web:4cfa18cd20d2f712225c82"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db   = firebase.database();
const auth = firebase.auth();

// ══════════════════════════════
//  全域變數
// ══════════════════════════════
// ✅ 修復一：年份月份自動抓取，不再寫死
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth();
let isEditing = false;
let staffList = []; // ✅ 修復三：人員從 Firebase 讀取，不寫死
let scheduleData = {};
const weekNames = ["日","一","二","三","四","五","六"];

// ══════════════════════════════
//  ✅ 修復二：登入改用帳號密碼，不用 prompt
// ══════════════════════════════
const ADMIN_ACCOUNTS = {
    "admin":   "taiwan2024",
    "manager": "elite2024"
};

function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value.trim();
    const err  = document.getElementById('loginErr');

    if (!user || !pass) { err.textContent = '請填寫帳號與密碼'; return; }
    if (!ADMIN_ACCOUNTS[user] || ADMIN_ACCOUNTS[user] !== pass) {
        err.textContent = '帳號或密碼錯誤';
        return;
    }

    document.getElementById('tbUser').textContent = user + ' · 管理員';
    document.getElementById('page-login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    err.textContent = '';

    // ✅ 修復四：登入後做匿名 Auth，保護 Firebase
    auth.signInAnonymously().then(() => {
        initApp();
    }).catch(() => {
        // 沒有網路也讓他進去，只是資料讀不到
        initApp();
    });
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('page-login').style.display !== 'none') doLogin();
});

function doLogout() {
    auth.signOut();
    document.getElementById('app').style.display = 'none';
    document.getElementById('page-login').style.display = 'flex';
    document.getElementById('loginPass').value = '';
}

// ══════════════════════════════
//  初始化
// ══════════════════════════════
function initApp() {
    // 先從 Firebase 讀人員資料
    db.ref('staff').on('value', snap => {
        const data = snap.val() || {};
        staffList = Object.entries(data).map(([key, val]) => ({ key, ...val }));

        // 如果 Firebase 沒有人員資料，自動寫入預設名單
        if (staffList.length === 0) {
            const defaultStaff = [
                { group: "總務", name: "盧家慶" },
                { group: "總務", name: "何鴻隆" },
                { group: "總務", name: "蔡易倫" },
                { group: "總務", name: "邱鴻鈞" },
                { group: "總務", name: "柳旭洲" },
                { group: "總務", name: "魏榮志" }
            ];
            defaultStaff.forEach(s => db.ref('staff').push(s));
            return; // 等 Firebase 寫完再重新觸發
        }

        renderTable();
        renderStaffList();
    });
}

// ══════════════════════════════
//  班表渲染
// ══════════════════════════════
function renderTable() {
    const wrap = document.getElementById('tableWrap');
    if (!staffList.length) {
        wrap.innerHTML = '<div class="loading-bar">尚無人員資料，請先在「人員管理」新增</div>';
        return;
    }

    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
    const todayDate   = new Date();
    const isThisMonth = todayDate.getFullYear() === curYear && todayDate.getMonth() === curMonth;
    const todayD      = todayDate.getDate();

    document.getElementById('monthLabel').textContent = `${curYear}年 ${curMonth + 1}月`;

    let thead = `<thead><tr>
        <th class="col-group">組別</th>
        <th class="col-name">姓名</th>`;

    for (let d = 1; d <= daysInMonth; d++) {
        const dow = new Date(curYear, curMonth, d).getDay();
        const cls = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
        const todayCls = (isThisMonth && d === todayD) ? 'today-head' : '';
        thead += `<th class="${cls} ${todayCls}">${d}<br><span style="font-weight:400;font-size:10px">${weekNames[dow]}</span></th>`;
    }
    thead += `<th class="sum-col">日</th><th class="sum-col">夜</th><th class="sum-col">休</th><th class="sum-col">特</th><th class="sum-col">假</th></tr></thead>`;

    let tbody = '<tbody>';
    staffList.forEach(p => {
        tbody += `<tr>
            <td class="col-group">${esc(p.group||'')}</td>
            <td class="col-name">${esc(p.name)}</td>`;
        for (let d = 1; d <= daysInMonth; d++) {
            const id = `${curYear}_${curMonth+1}_${p.name}_${d}`;
            const val = scheduleData[id] || '';
            const valCls = val ? 'val-' + val.substring(0,1) : '';
            const todayCls = (isThisMonth && d === todayD) ? 'today-col' : '';
            tbody += `<td class="${todayCls}">
                <input class="shift-input ${valCls}" id="${id}"
                    value="${esc(val)}"
                    onchange="saveShift('${esc(p.name)}', ${d}, this.value)"
                    onfocus="this.select()">
            </td>`;
        }
        tbody += `<td id="sd_${esc(p.name)}" class="sum-col sc-day">0</td>
                  <td id="sn_${esc(p.name)}" class="sum-col sc-night">0</td>
                  <td id="so_${esc(p.name)}" class="sum-col sc-off">0</td>
                  <td id="st_${esc(p.name)}" class="sum-col sc-spec">0</td>
                  <td id="sl_${esc(p.name)}" class="sum-col sc-leave">0</td>
        </tr>`;
    });
    tbody += '</tbody>';

    wrap.innerHTML = `<table>${thead}${tbody}</table>`;
    listenSchedule(daysInMonth);
}

function listenSchedule(days) {
    db.ref('guardSchedules').off();
    db.ref('guardSchedules').on('value', snap => {
        scheduleData = snap.val() || {};
        let tDay=0, tNight=0, tOff=0, tSpec=0, tLeave=0;

        staffList.forEach(p => {
            let dc=0, nc=0, oc=0, tc=0, lc=0;
            for (let d = 1; d <= days; d++) {
                const id  = `${curYear}_${curMonth+1}_${p.name}_${d}`;
                const val = scheduleData[id] || '';
                const el  = document.getElementById(id);
                if (el) {
                    el.value = val;
                    el.className = 'shift-input' + (val ? ' val-' + val.substring(0,1) : '');
                }
                if      (val.includes('日')) dc++;
                else if (val.includes('夜')) nc++;
                else if (val.includes('特')) tc++;
                else if (val.includes('假') || val.includes('病') || val.includes('事')) lc++;
                else if (val.includes('休') || val.includes('例') || val.includes('換')) oc++;
            }
            const safeId = esc(p.name);
            setEl(`sd_${safeId}`, dc);
            setEl(`sn_${safeId}`, nc);
            setEl(`so_${safeId}`, oc);
            setEl(`st_${safeId}`, tc);
            setEl(`sl_${safeId}`, lc);
            tDay+=dc; tNight+=nc; tOff+=oc; tSpec+=tc; tLeave+=lc;
        });

        setEl('totalDay',   tDay);
        setEl('totalNight', tNight);
        setEl('totalOff',   tOff);
        setEl('totalSpec',  tSpec);
        setEl('totalLeave', tLeave);
    });
}

function saveShift(name, day, val) {
    const id = `${curYear}_${curMonth+1}_${name}_${day}`;
    db.ref('guardSchedules/' + id).set(val)
        .catch(() => showToast('❌ 儲存失敗，請確認網路'));
}

// ══════════════════════════════
//  人員管理
// ══════════════════════════════
function renderStaffList() {
    const container = document.getElementById('staffList');
    if (!staffList.length) {
        container.innerHTML = '<div style="color:var(--sub);text-align:center;padding:20px">尚無人員資料</div>';
        return;
    }
    container.innerHTML = staffList.map((p, i) => `
        <div class="staff-item">
            <div class="si-info">
                <div class="si-num">${i+1}</div>
                <div>
                    <div class="si-name">${esc(p.name)}</div>
                    <div class="si-group">${esc(p.group||'未分組')}</div>
                </div>
            </div>
            <button class="si-del" onclick="deleteStaff('${p.key}','${esc(p.name)}')">✕</button>
        </div>
    `).join('');
}

function addStaff() {
    const name  = document.getElementById('newName').value.trim();
    const group = document.getElementById('newGroup').value.trim();
    if (!name) return showToast('請輸入姓名');
    db.ref('staff').push({ name, group: group || '未分組' })
        .then(() => {
            document.getElementById('newName').value  = '';
            document.getElementById('newGroup').value = '';
            showToast('✅ 人員已新增');
        });
}

function deleteStaff(key, name) {
    if (!confirm(`確定要刪除「${name}」嗎？\n此操作不會刪除已排的班表資料。`)) return;
    db.ref('staff/' + key).remove()
        .then(() => showToast(`「${name}」已刪除`));
}

function openStaffModal()  { document.getElementById('staffModal').classList.add('open'); }
function closeStaffModal() { document.getElementById('staffModal').classList.remove('open'); }

// ══════════════════════════════
//  鎖定 / 解鎖
// ══════════════════════════════
function toggleLock() {
    isEditing = !isEditing;
    document.body.classList.toggle('can-edit', isEditing);
    const btn = document.getElementById('lockBtn');
    btn.textContent = isEditing ? '🔓 編輯中' : '🔒 唯讀模式';
    btn.classList.toggle('unlocked', isEditing);
    showToast(isEditing ? '🔓 已切換為編輯模式' : '🔒 已切換為唯讀模式');
}

// ══════════════════════════════
//  匯出 CSV
// ══════════════════════════════
function exportCSV() {
    const table = document.querySelector('table');
    if (!table) return showToast('尚無資料可匯出');
    let csv = '\ufeff';
    for (let row of table.rows) {
        let cells = [];
        for (let cell of row.cells) {
            const input = cell.querySelector('input');
            cells.push('"' + (input ? input.value : cell.innerText).replace(/"/g, '""') + '"');
        }
        csv += cells.join(',') + '\r\n';
    }
    const filename = `台灣精銳_班表_${curYear}_${String(curMonth+1).padStart(2,'0')}.csv`;
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.setAttribute('download', filename);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast('✅ 報表已匯出');
}

// ══════════════════════════════
//  月份切換
// ══════════════════════════════
function changeMonth(dir) {
    curMonth += dir;
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    if (curMonth > 11) { curMonth = 0;  curYear++; }
    renderTable();
}

// ══════════════════════════════
//  工具函式
// ══════════════════════════════
function esc(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setEl(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
}
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
