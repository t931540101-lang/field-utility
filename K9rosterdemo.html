<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K9 警衛輪班排班表 · DEMO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --navy:     #1a2744;
            --navy-mid: #253560;
            --navy-dim: #1e2d50;
            --gold:     #c9a84c;
            --gold-lt:  #e8c96a;
            --bg:       #eae6da;
            --surface:  #ffffff;
            --border:   #bbb8ad;
            --text:     #22253a;
            --muted:    #8a8fa8;

            /* D系列 日B班 */
            --d-bg: #d6ede0; --d-fg: #1e5c38; --d-bd: #8ecaaa;
            /* E系列 夜E班 */
            --e-bg: #ede0f5; --e-fg: #5b1a8a; --e-bd: #c49de0;
            /* C系列 夜B班 */
            --c-bg: #d8eaf8; --c-fg: #1045a0; --c-bd: #7ab4e8;
            /* 假日欄 */
            --wknd-date: #c62828;
            --wknd-bg:   #fff5f5;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* ══════════════════════════
           HEADER
        ══════════════════════════ */
        .header {
            background: var(--navy);
            position: sticky; top: 0; z-index: 80;
            box-shadow: 0 3px 16px rgba(10,18,40,0.45);
        }
        .header-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 18px; gap: 10px; flex-wrap: wrap;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .brand { display: flex; align-items: center; gap: 11px; }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--gold), var(--gold-lt));
            border-radius: 9px; display: flex; align-items: center; justify-content: center;
            font-size: 19px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex-shrink: 0;
        }
        .brand-text h1 { font-size: 14px; font-weight: 900; color: #fff; letter-spacing: 1px; }
        .brand-text p  { font-size: 10px; color: rgba(255,255,255,0.42); margin-top: 1px; }

        .month-nav { display: flex; align-items: center; gap: 10px; }
        .nav-btn {
            width: 30px; height: 30px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.18);
            border-radius: 7px; color: #fff; font-size: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.15s;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.2); }
        .month-display {
            font-size: 15px; font-weight: 900; color: #fff;
            min-width: 160px; text-align: center; letter-spacing: 1px;
        }

        .header-actions {
            display: flex; gap: 7px; align-items: center; flex-wrap: wrap;
            padding: 8px 18px 10px;
        }
        .act-btn {
            padding: 7px 14px; border: none; border-radius: 7px;
            font-size: 11px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 5px;
            font-family: inherit; white-space: nowrap; transition: 0.15s;
        }
        .act-btn:active { transform: scale(0.97); }
        .btn-em   { background: #27a85a; color: #fff; }
        .btn-ea   { background: #2179c0; color: #fff; }
        .btn-lock { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); border: 1px solid rgba(255,255,255,0.2); }
        .btn-lock.on { background: #27a85a; border-color: #27a85a; color: #fff; }
        .demo-badge {
            margin-left: auto;
            background: rgba(201,168,76,0.18); border: 1px solid rgba(201,168,76,0.45);
            color: var(--gold); font-size: 10px; font-weight: 700;
            padding: 4px 10px; border-radius: 20px; white-space: nowrap;
        }

        /* ══════════════════════════
           TABLE
        ══════════════════════════ */
        .table-wrap { padding: 14px 14px 0; }
        .table-label {
            font-size: 12px; font-weight: 900; color: var(--navy-mid);
            letter-spacing: 2px; padding-bottom: 10px;
            display: flex; align-items: center; gap: 8px;
        }
        .table-label::after {
            content: ''; flex: 1; height: 2px;
            background: linear-gradient(to right, var(--navy-mid), transparent); border-radius: 2px;
        }

        .scroll-box {
            overflow-x: auto; border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: 0 6px 24px rgba(26,39,68,0.13);
            background: var(--surface);
        }

        table { border-collapse: collapse; width: max-content; min-width: 100%; }
        th, td {
            border: 1px solid var(--border);
            text-align: center; vertical-align: middle; white-space: nowrap;
        }

        /* ── 固定左側欄 ── */
        .sticky-col {
            position: sticky; background: #fff; z-index: 10;
        }
        .col-group { left: 0;    width: 52px;  min-width: 52px;  border-right: 1px solid var(--border) !important; }
        .col-shift { left: 52px; width: 78px;  min-width: 78px;  border-right: 1px solid var(--border) !important; }
        .col-id    { left: 130px; width: 72px; min-width: 72px;  border-right: 1px solid var(--border) !important; }
        .col-name  { left: 202px; width: 72px; min-width: 72px;  border-right: 2px solid var(--navy) !important; }

        /* ── 標頭 ── */
        thead tr:first-child th { background: var(--navy); height: 36px; }
        thead tr:last-child  th { background: #f3f0e8;     height: 28px; }

        /* 固定欄標頭文字 */
        thead th.sticky-col {
            color: rgba(255,255,255,0.7);
            font-size: 12px; font-weight: 700;
        }
        thead tr:last-child th.sticky-col {
            background: #e8e4d8 !important; color: var(--muted);
        }

        /* 日期欄標頭 */
        .th-date {
            background: var(--navy) !important;
            color: rgba(255,255,255,0.85) !important;
            font-size: 13px; font-weight: 700;
            min-width: 38px; padding: 0 4px;
        }
        .th-date.wknd { color: #ffb3b3 !important; }

        /* 星期欄標頭 */
        .th-week {
            background: #f3f0e8 !important;
            color: var(--muted); font-size: 11px; font-weight: 700;
            min-width: 38px;
        }
        .th-week.wknd { color: var(--wknd-date) !important; background: var(--wknd-bg) !important; }

        /* ── 資料列 ── */
        tbody tr:nth-child(even) td { background: #f9f8f4; }
        tbody tr:hover td { background: #f0ece0 !important; }
        tbody tr:hover td.sticky-col { background: #ece8dc !important; }

        td { height: 34px; padding: 0; font-size: 13px; }

        /* 固定欄資料格 */
        td.sticky-col { font-size: 12px; color: var(--text); }
        td.col-name   { font-weight: 900; font-size: 13px; }
        td.col-shift  { font-size: 11px; color: var(--muted); }

        /* 排班格 */
        .td-shift {
            min-width: 38px; font-size: 13px; font-weight: 900;
            transition: background 0.1s;
        }
        /* 假日欄底色 */
        .td-shift.wknd-col { background: var(--wknd-bg) !important; }
        /* 有值時優先覆蓋 */
        .v-D { background: var(--d-bg) !important; color: var(--d-fg) !important; }
        .v-E { background: var(--e-bg) !important; color: var(--e-fg) !important; }
        .v-C { background: var(--c-bg) !important; color: var(--c-fg) !important; }

        /* 編輯模式 input */
        .td-shift input {
            width: 100%; height: 34px; border: none;
            text-align: center; font-size: 13px; font-weight: 900;
            background: transparent; color: inherit;
            pointer-events: none; outline: none; font-family: inherit; cursor: default;
        }
        .can-edit .td-shift input { pointer-events: auto; cursor: text; }
        .can-edit .td-shift input:focus { background: rgba(255,235,59,0.2); outline: 2px solid var(--gold); }

        /* ══════════════════════════
           底部班別說明
        ══════════════════════════ */
        .footer {
            margin: 14px;
            background: var(--surface);
            border-radius: 10px; border: 1px solid var(--border);
            padding: 14px 18px;
            box-shadow: 0 2px 10px rgba(26,39,68,0.07);
            display: flex; flex-wrap: wrap; gap: 24px;
        }
        .footer-col { min-width: 200px; }
        .footer-title {
            font-size: 10px; font-weight: 700; color: var(--muted);
            letter-spacing: 2px; margin-bottom: 8px;
            padding-bottom: 6px; border-bottom: 1px solid var(--border);
        }
        .footer-row {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 0; font-size: 12px;
        }
        .footer-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .footer-row .code { font-weight: 900; min-width: 28px; }
        .footer-row .desc { color: var(--muted); font-size: 11px; }

        .fd  { background: var(--d-bg); }  .fd .footer-dot { background: var(--d-fg); } .fd .code { color: var(--d-fg); }
        .fe  { background: var(--e-bg); }  .fe .footer-dot { background: var(--e-fg); } .fe .code { color: var(--e-fg); }
        .fc  { background: var(--c-bg); }  .fc .footer-dot { background: var(--c-fg); } .fc .code { color: var(--c-fg); }

        .footer-row { border-radius: 6px; padding: 5px 8px; }
    </style>
</head>
<body>

<!-- ████ HEADER ████ -->
<div class="header">
    <div class="header-top">
        <div class="brand">
            <div class="brand-icon">🐕</div>
            <div class="brand-text">
                <h1>K9 警衛輪班排班表</h1>
                <p>總務組 · 標準格式</p>
            </div>
        </div>
        <div class="month-nav">
            <button class="nav-btn" onclick="changeMonth(-1)">❮</button>
            <div class="month-display" id="monthDisplay"></div>
            <button class="nav-btn" onclick="changeMonth(1)">❯</button>
        </div>
    </div>
    <div class="header-actions">
        <button class="act-btn btn-em">📄 匯出當月 Excel</button>
        <button class="act-btn btn-ea">📊 匯出全年 Excel</button>
        <button class="act-btn btn-lock" id="btnLock" onclick="toggleLock()">🔒 唯讀模式</button>
        <div class="demo-badge">🔧 DEMO · 假資料</div>
    </div>
</div>

<!-- ████ TABLE ████ -->
<div class="table-wrap">
    <div class="table-label" id="tableLabel"></div>
    <div class="scroll-box">
        <table>
            <thead>
                <tr id="dateRow"></tr>
                <tr id="weekRow"></tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<!-- ████ 班別說明 ████ -->
<div class="footer">
    <div class="footer-col">
        <div class="footer-title">班別與時間</div>
        <div class="footer-row fd"><div class="footer-dot"></div><div class="code">日B班</div><div class="desc">07:00 ~ 19:00（12h）</div></div>
        <div class="footer-row fe"><div class="footer-dot"></div><div class="code">夜E班</div><div class="desc">19:00 ~ 07:00（12h）</div></div>
        <div class="footer-row fc"><div class="footer-dot"></div><div class="code">夜B班</div><div class="desc">17:00 ~ 05:00（12h）</div></div>
    </div>
    <div class="footer-col">
        <div class="footer-title">代號說明（日B班）</div>
        <div class="footer-row fd"><div class="footer-dot"></div><div class="code">D</div><div class="desc">工作日</div></div>
        <div class="footer-row fd"><div class="footer-dot"></div><div class="code">D1</div><div class="desc">例假日</div></div>
        <div class="footer-row fd"><div class="footer-dot"></div><div class="code">D2</div><div class="desc">休息日</div></div>
        <div class="footer-row fd"><div class="footer-dot"></div><div class="code">D3</div><div class="desc">國定假日</div></div>
    </div>
    <div class="footer-col">
        <div class="footer-title">代號說明（夜E班）</div>
        <div class="footer-row fe"><div class="footer-dot"></div><div class="code">E</div><div class="desc">工作日</div></div>
        <div class="footer-row fe"><div class="footer-dot"></div><div class="code">E1</div><div class="desc">例假日</div></div>
        <div class="footer-row fe"><div class="footer-dot"></div><div class="code">E2</div><div class="desc">休息日</div></div>
        <div class="footer-row fe"><div class="footer-dot"></div><div class="code">E3</div><div class="desc">國定假日</div></div>
    </div>
    <div class="footer-col">
        <div class="footer-title">代號說明（夜B班）</div>
        <div class="footer-row fc"><div class="footer-dot"></div><div class="code">C</div><div class="desc">工作日</div></div>
        <div class="footer-row fc"><div class="footer-dot"></div><div class="code">C1</div><div class="desc">例假日</div></div>
        <div class="footer-row fc"><div class="footer-dot"></div><div class="code">C2</div><div class="desc">休息日</div></div>
        <div class="footer-row fc"><div class="footer-dot"></div><div class="code">C3</div><div class="desc">國定假日</div></div>
    </div>
</div>

<script>
// ══════════════════════════════
//  假資料人員（對應照片）
// ══════════════════════════════
const STAFF = [
    { group:'總務', shift:'日B班', id:'D01762', name:'盧家慶' },
    { group:'總務', shift:'日B班', id:'D03807', name:'何鴻隆' },
    { group:'總務', shift:'日B班', id:'D01879', name:'柳旭洲' },
    { group:'總務', shift:'夜E班', id:'D03806', name:'蔡經國' },
    { group:'總務', shift:'夜E班', id:'D04132', name:'邱鴻鈞' },
    { group:'總務', shift:'夜B班', id:'D03733', name:'張春安' },
];

// 班別對應假資料 pool（按班別分配合理代號）
const POOL = {
    '日B班': ['D','D','D','D','D1','D2','D3','','',''],
    '夜E班': ['E','E','E','E','E1','E2','E3','','',''],
    '夜B班': ['C','C','C','C','C1','C2','C3','','',''],
};

let fakeCache = {};
function getFake(year, month) {
    const ck = `${year}_${month}`;
    if (fakeCache[ck]) return fakeCache[ck];
    const data = {};
    const days = new Date(year, month + 1, 0).getDate();
    STAFF.forEach((p, pi) => {
        const pool = POOL[p.shift] || ['D','',''];
        for (let d = 1; d <= days; d++) {
            const v = pool[(pi * 7 + d * 3 + year) % pool.length];
            if (v) data[`${year}_${month+1}_${p.name}_${d}`] = v;
        }
    });
    fakeCache[ck] = data;
    return data;
}

// ══════════════════════════════
//  狀態
// ══════════════════════════════
let curYear = 2026, curMonth = 4, isEditing = false;
const WEEK  = ['日','一','二','三','四','五','六'];

function shiftClass(v) {
    if (!v) return '';
    const u = v.trim().toUpperCase();
    if (u.startsWith('D')) return 'v-D';
    if (u.startsWith('E')) return 'v-E';
    if (u.startsWith('C')) return 'v-C';
    return '';
}

// ══════════════════════════════
//  建立表格
// ══════════════════════════════
function buildTable() {
    const mm = String(curMonth + 1).padStart(2, '0');
    document.getElementById('monthDisplay').innerText = `${curYear} / ${mm}  警衛輪班表`;
    document.getElementById('tableLabel').innerText   = `${curYear}年 ${mm}月 警衛輪班排班表`;

    const data  = getFake(curYear, curMonth);
    const days  = new Date(curYear, curMonth + 1, 0).getDate();
    const dateRow = document.getElementById('dateRow');
    const weekRow = document.getElementById('weekRow');
    const tbody   = document.getElementById('tbody');
    dateRow.innerHTML = weekRow.innerHTML = tbody.innerHTML = '';

    // ── 固定欄標頭 ──
    [
        ['col-group','組別'], ['col-shift','班別'],
        ['col-id','員工代號'], ['col-name','姓名']
    ].forEach(([cls, label]) => {
        const d1 = document.createElement('th');
        d1.className = `sticky-col ${cls}`;
        d1.innerText = label;
        dateRow.appendChild(d1);

        const d2 = document.createElement('th');
        d2.className = `sticky-col ${cls}`;
        d2.innerText = '-';
        weekRow.appendChild(d2);
    });

    // ── 日期 / 星期標頭 ──
    for (let d = 1; d <= days; d++) {
        const dow  = new Date(curYear, curMonth, d).getDay();
        const isWk = (dow === 0 || dow === 6);

        const th1 = document.createElement('th');
        th1.className = 'th-date' + (isWk ? ' wknd' : '');
        th1.innerText = d;
        dateRow.appendChild(th1);

        const th2 = document.createElement('th');
        th2.className = 'th-week' + (isWk ? ' wknd' : '');
        th2.innerText = WEEK[dow];
        weekRow.appendChild(th2);
    }

    // ── 人員列 ──
    STAFF.forEach(p => {
        const tr = document.createElement('tr');

        // 固定欄
        [
            ['col-group', p.group],
            ['col-shift', p.shift],
            ['col-id',    p.id   ],
            ['col-name',  p.name ],
        ].forEach(([cls, val]) => {
            const td = document.createElement('td');
            td.className = `sticky-col ${cls}`;
            td.innerText = val;
            tr.appendChild(td);
        });

        // 每天排班格
        for (let d = 1; d <= days; d++) {
            const dow  = new Date(curYear, curMonth, d).getDay();
            const isWk = (dow === 0 || dow === 6);
            const key  = `${curYear}_${curMonth+1}_${p.name}_${d}`;
            const val  = data[key] || '';

            const td  = document.createElement('td');
            const cls = shiftClass(val);
            td.className = 'td-shift' + (isWk && !cls ? ' wknd-col' : '') + (cls ? ' ' + cls : '');

            const inp = document.createElement('input');
            inp.value = val;
            inp.setAttribute('readonly', true);
            td.appendChild(inp);
            tr.appendChild(td);
        }
        tbody.appendChild(tr);
    });
}

// ══════════════════════════════
//  換月 / 鎖定
// ══════════════════════════════
function changeMonth(dir) {
    curMonth += dir;
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    if (curMonth > 11) { curMonth = 0;  curYear++; }
    buildTable();
}

function toggleLock() {
    isEditing = !isEditing;
    const btn = document.getElementById('btnLock');
    btn.innerText = isEditing ? '🔓 編輯中' : '🔒 唯讀模式';
    btn.classList.toggle('on', isEditing);
    // 編輯模式：解除 input readonly
    document.querySelectorAll('.td-shift input').forEach(inp => {
        inp.readOnly = !isEditing;
        inp.style.pointerEvents = isEditing ? 'auto' : 'none';
        inp.style.cursor = isEditing ? 'text' : 'default';
    });
}

buildTable();
</script>
</body>
</html>
