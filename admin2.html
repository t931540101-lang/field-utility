<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>黑曜石 - 排班管理後台</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; margin: 10px 0; font-family: monospace; }
        .btn { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <h2>排班資料管理</h2>
    <p>在此直接編輯或匯出排班 JSON 資料：</p>
    <textarea id="dataEditor"></textarea>
    <br>
    <button class="btn" onclick="saveData()">儲存更新</button>
    <button class="btn" onclick="loadData()">讀取現有資料</button>
</div>

<script>
    // 假設我們管理 2026年 6月
    const storageKey = 'shifts_2026_5';

    function loadData() {
        const data = localStorage.getItem(storageKey) || '{}';
        document.getElementById('dataEditor').value = JSON.stringify(JSON.parse(data), null, 4);
    }

    function saveData() {
        const val = document.getElementById('dataEditor').value;
        localStorage.setItem(storageKey, val);
        alert('資料已同步更新至排班表！');
    }
</script>
</body>
</html>
