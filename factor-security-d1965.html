<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>班務通 ShiftHQ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body {
  height:100%;
  background:#f5f6f8;
  color:#1a1c22;
  font-family:'Noto Sans TC',-apple-system,sans-serif;
  max-width:430px;
  margin:0 auto;
  overflow-x:hidden;
}

/* TOP BAR */
.topbar {
background:#fff;
display:flex; align-items:center; justify-content:space-between;
padding:12px 16px 10px;
position:sticky; top:0; z-index:100;
border-bottom:1px solid #e8eaee;
}
.topbar-share { width:36px; height:36px; display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer; color:#6b7080; }
.topbar-month { font-size:40px; font-weight:300; color:#1a1c22; line-height:1; }
.topbar-right { text-align:right; }
.topbar-year, .topbar-ym { font-size:13px; color:#6b7080; line-height:1.4; }

.month-nav {
background:#fff;
display:flex; align-items:center; justify-content:space-between;
padding:6px 12px;
border-bottom:1px solid #e8eaee;
}
.month-nav-label { font-size:15px; font-weight:500; color:#1a1c22; }
.month-nav-btn {
background:none; border:none;
font-size:22px; color:#4a7eda;
cursor:pointer; padding:4px 12px;
border-radius:8px; line-height:1;
}
.month-nav-btn:active { background:#e8eaee; }

/* DOW ROW */
.dow-row {
display:grid; grid-template-columns:repeat(7,1fr);
background:#fff;
border-bottom:1px solid #e8eaee;
padding:6px 0 4px;
}
.dow-cell { text-align:center; font-size:12px; font-weight:500; color:#6b7080; }
.dow-cell.sun { color:#e05050; }
.dow-cell.sat { color:#4a7eda; }

/* CALENDAR GRID */
.cal-grid {
display:grid;
grid-template-columns:repeat(7,1fr);
background:#e8eaee;
gap:1px;
}
.cal-cell {
background:#fff;
min-height:74px;
padding:6px 3px 5px;
display:flex; flex-direction:column; align-items:center;
gap:4px;
cursor:pointer;
transition:background .1s;
}
.cal-cell:active { background:#f0f2f8; }
.cal-cell.other-month { background:#fafbfc; }
.cal-cell.selected {
outline: 2px dashed #2a9d8f;
outline-offset: -2px;
background: #f0fafa;
position: relative;
z-index: 1;
}

.day-num {
width:28px; height:28px;
border-radius:50%;
display:flex; align-items:center; justify-content:center;
font-size:15px; font-weight:400;
color:#1a1c22;
flex-shrink:0;
line-height:1;
}
.cal-cell.other-month .day-num { color:#c0c5d0; }
.cal-cell.sun-col .day-num    { color:#e05050; }
.cal-cell.sat-col .day-num    { color:#4a7eda; }
.cal-cell.is-today .day-num   { background:#2a6be8; color:#fff; font-weight:700; }
.cal-cell.other-month.sun-col .day-num { color:#e8a0a0; }
.cal-cell.other-month.sat-col .day-num { color:#a0b8e8; }

/* SHIFT TAG — 顏色直接 inline，不用 CSS 變數 */
.shift-tag {
width:100%;
border-radius:20px;
padding:2px 0;
text-align:center;
font-size:10px;
font-weight:500;
line-height:1.7;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}
/* fallback classes，保底用 */
.tag-blue   { background:#cce0f8 !important; color:#2a6be8 !important; }
.tag-pink   { background:#fce4e4 !important; color:#d04040 !important; }
.tag-orange { background:#fde8c0 !important; color:#c07010 !important; }
.tag-green  { background:#d4f0e0 !important; color:#1a9050 !important; }
.tag-purple { background:#e8d8f8 !important; color:#6030b0 !important; }
.tag-gray   { background:#e8eaee !important; color:#7080a0 !important; }

/* STATS BAR */
.stats-bar {
background:#fff;
display:flex;
border-top:1px solid #e8eaee;
border-bottom:1px solid #e8eaee;
}
.stat-item { flex:1; padding:12px 0; text-align:center; border-right:1px solid #e8eaee; }
.stat-item:last-child { border-right:none; }
.stat-val  { font-size:18px; font-weight:700; color:#1a1c22; }
.stat-lbl  { font-size:11px; color:#b0b5c0; margin-top:2px; }

/* NAVBAR */
.navbar {
position:fixed; bottom:0; left:50%; transform:translateX(-50%);
width:100%; max-width:430px;
background:#fff; border-top:1px solid #e8eaee;
display:flex;
padding:6px 0 max(6px,env(safe-area-inset-bottom));
z-index:100;
}
.nav-item {
flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
cursor:pointer; padding:4px 0;
}
.nav-icon  { font-size:22px; line-height:1.3; }
.nav-label { font-size:10px; color:#b0b5c0; }
.nav-item.active .nav-label { color:#2a6be8; }

.nav-fab { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; }
.nav-fab-btn {
width:50px; height:50px;
background:#1a1c22;
border-radius:50%;
display:flex; align-items:center; justify-content:center;
font-size:28px; color:#fff;
margin-top:-12px;
box-shadow:0 4px 16px rgba(0,0,0,.25);
transition:transform .15s;
}
.nav-fab-btn:active { transform:scale(.88); }

/* PAGES */
.page { display:none; padding-bottom:80px; }
.page.active { display:block; }

/* WAGE PAGE */
.wage-header { background:#fff; padding:24px 20px 20px; border-bottom:1px solid #e8eaee; text-align:center; }
.wage-month-label { font-size:13px; color:#6b7080; margin-bottom:6px; }
.wage-big { font-size:44px; font-weight:300; color:#1a1c22; }
.wage-unit { font-size:16px; color:#6b7080; }
.wage-rate-row {
background:#fff; padding:16px 20px;
display:flex; align-items:center; justify-content:space-between;
border-bottom:1px solid #e8eaee; margin-top:10px;
}
.wage-rate-label { font-size:14px; color:#6b7080; }
.wage-rate-input {
background:#f5f6f8; border:1px solid #e8eaee; border-radius:8px;
padding:6px 12px; font-size:16px; font-family:inherit;
width:100px; text-align:right; color:#1a1c22; outline:none;
}
.wage-list { background:#fff; margin-top:10px; }
.wage-list-header { padding:10px 20px 6px; font-size:12px; color:#b0b5c0; font-weight:500; border-bottom:1px solid #e8eaee; letter-spacing:.5px; }
.wage-row { display:flex; align-items:center; padding:14px 20px; border-bottom:1px solid #e8eaee; gap:12px; }
.wage-row:last-child { border-bottom:none; }
.wage-dot  { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.wage-info { flex:1; }
.wage-date { font-size:12px; color:#6b7080; }
.wage-name { font-size:15px; font-weight:500; }
.wage-right { text-align:right; }
.wage-hours { font-size:12px; color:#b0b5c0; }
.wage-pay   { font-size:15px; font-weight:600; color:#2a6be8; }
.wage-total-row { background:#f5f6f8; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; margin-top:2px; }
.wage-total-label { font-size:14px; color:#6b7080; }
.wage-total-val   { font-size:22px; font-weight:700; color:#2a6be8; }

/* TODAY PAGE */
.today-card {
background:#fff; margin:14px 16px 0;
border-radius:16px; padding:20px;
box-shadow:0 2px 14px rgba(0,0,0,.07);
}
.today-date-lbl { font-size:13px; color:#6b7080; margin-bottom:8px; }
.today-shift-name { font-size:30px; font-weight:600; margin-bottom:4px; }
.today-shift-time { font-size:15px; color:#6b7080; }
.week-list { background:#fff; margin-top:14px; }
.week-header { padding:10px 20px 6px; font-size:12px; color:#b0b5c0; font-weight:500; border-bottom:1px solid #e8eaee; }

/* OTHER PAGE */
.list-section { background:#fff; margin:10px 0 0; }
.list-header  { padding:12px 20px 8px; font-size:12px; color:#b0b5c0; font-weight:500; border-bottom:1px solid #e8eaee; }
.list-item    { display:flex; align-items:center; gap:14px; padding:14px 20px; border-bottom:1px solid #e8eaee; cursor:pointer; }
.list-item:last-child { border-bottom:none; }
.list-item:active { background:#f5f6f8; }
.list-icon    { font-size:22px; }
.list-label   { flex:1; }
.list-name    { font-size:15px; font-weight:500; }
.list-sub     { font-size:12px; color:#b0b5c0; margin-top:2px; }
.list-arrow   { color:#b0b5c0; font-size:16px; }

/* MODAL */
.modal-backdrop {
position:fixed; inset:0;
background:rgba(0,0,0,.45);
z-index:200;
display:none; align-items:flex-end;
}
.modal-backdrop.open { display:flex; }
.modal {
background:#fff;
border-radius:20px 20px 0 0;
width:100%; max-height:92dvh;
overflow-y:auto;
padding:0 0 max(20px,env(safe-area-inset-bottom));
animation:slideUp .22s ease;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle-row { display:flex; justify-content:center; padding:12px 0 4px; }
.modal-handle { width:36px; height:4px; background:#e8eaee; border-radius:2px; }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:8px 20px 14px; border-bottom:1px solid #e8eaee; }
.modal-title  { font-size:17px; font-weight:600; }
.modal-close  { font-size:24px; color:#b0b5c0; cursor:pointer; background:none; border:none; line-height:1; }
.modal-body   { padding:16px 20px; }

.form-group { margin-bottom:14px; }
.form-label { font-size:12px; color:#6b7080; margin-bottom:6px; display:block; font-weight:500; }
.form-input {
width:100%;
background:#f5f6f8; border:1.5px solid #e8eaee; border-radius:10px;
color:#1a1c22; padding:12px 14px; font-size:16px; font-family:inherit;
outline:none; transition:border-color .2s; -webkit-appearance:none;
}
.form-input:focus { border-color:#2a6be8; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

/* QUICK TYPE BUTTONS — inline style 寫死顏色 */
.quick-types { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.q-btn {
border-radius:20px; padding:6px 14px;
font-size:13px; font-weight:500;
cursor:pointer; border:none; font-family:inherit;
transition:opacity .15s;
}
.q-btn:active { opacity:.7; }

/* COLOR PICKER */
.color-picker { display:flex; gap:10px; flex-wrap:wrap; padding:4px 0; }
.color-opt {
width:38px; height:38px; border-radius:50%;
cursor:pointer; border:3px solid transparent;
display:flex; align-items:center; justify-content:center;
font-size:16px; transition:all .15s;
}
.color-opt.selected { border-color:#1a1c22; }

.btn {
width:100%; padding:14px; border-radius:12px;
font-size:16px; font-family:inherit; font-weight:600;
border:none; cursor:pointer; transition:all .15s; margin-top:8px;
}
.btn:active { transform:scale(.97); }
.btn-primary { background:#2a6be8; color:#fff; }
.btn-danger  { background:#fff; color:#e05050; border:1.5px solid #f0d0d0; }
.btn-ghost   { background:#f5f6f8; color:#6b7080; }

/* TOAST */
.toast {
position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
background:rgba(26,28,34,.88); color:#fff;
border-radius:20px; padding:10px 22px;
font-size:14px; font-weight:500;
z-index:500; white-space:nowrap;
opacity:0; transition:opacity .3s; pointer-events:none;
}
.toast.show { opacity:1; }
</style>

</head>
<body>

<!-- CAL TOP (只在月曆頁顯示) -->

<div id="calTopbar">
  <div class="topbar">
    <div class="topbar-share" onclick="goToday()">↺</div>
    <div class="topbar-month" id="topbarNum">3</div>
    <div class="topbar-right">
      <div class="topbar-year" id="topbarYear">2026</div>
      <div class="topbar-ym"   id="topbarYM">3月</div>
    </div>
  </div>
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-nav-label" id="monthNavLabel">2026年3月</div>
    <button class="month-nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="dow-row">
    <div class="dow-cell sun">週日</div>
    <div class="dow-cell">週一</div>
    <div class="dow-cell">週二</div>
    <div class="dow-cell">週三</div>
    <div class="dow-cell">週四</div>
    <div class="dow-cell">週五</div>
    <div class="dow-cell sat">週六</div>
  </div>
</div>

<!-- PAGES -->

<div class="page active" id="page-cal">
  <div class="cal-grid" id="calGrid"></div>
  <div class="stats-bar" id="statsBar"></div>
</div>

<div class="page" id="page-today">
  <div class="today-card" id="todayCard"></div>
  <div class="week-list">
    <div class="week-header">本週班次</div>
    <div id="weekList"></div>
  </div>
</div>

<div class="page" id="page-wage">
  <div class="wage-header">
    <div class="wage-month-label" id="wagePeriodLabel">預估薪資</div>
    <div><span class="wage-big" id="wageTotal">0</span><span class="wage-unit"> 元</span></div>
  </div>
  <div class="wage-rate-row">
    <div class="wage-rate-label">時薪（元/小時）</div>
    <input class="wage-rate-input" type="number" id="hourlyRate" value="176" min="0" oninput="recalcWage()">
  </div>
  <div class="wage-list">
    <div class="wage-list-header">班次明細</div>
    <div id="wageBreakdown"></div>
  </div>
  <div class="wage-total-row">
    <div class="wage-total-label">月薪合計</div>
    <div class="wage-total-val" id="wageTotalBot">$0</div>
  </div>
</div>

<div class="page" id="page-other">
  <div class="list-section" style="margin-top:10px">
    <div class="list-header">匯出</div>
    <div class="list-item" onclick="exportCSV()">
      <div class="list-icon">📊</div>
      <div class="list-label"><div class="list-name">匯出 CSV</div><div class="list-sub">可匯入 Excel / Google 試算表</div></div>
      <div class="list-arrow">›</div>
    </div>
    <div class="list-item" onclick="exportText()">
      <div class="list-icon">📋</div>
      <div class="list-label"><div class="list-name">複製純文字</div><div class="list-sub">貼到 LINE 或通訊軟體</div></div>
      <div class="list-arrow">›</div>
    </div>
  </div>
  <div class="list-section">
    <div class="list-header">個人設定</div>
    <div class="list-item" onclick="openModal('nameModal')">
      <div class="list-icon">👤</div>
      <div class="list-label"><div class="list-name">我的姓名</div><div class="list-sub" id="settingName">（未設定）</div></div>
      <div class="list-arrow">›</div>
    </div>
    <div class="list-item" onclick="openModal('staffIdModal')">
      <div class="list-icon">🪪</div>
      <div class="list-label"><div class="list-name">員工編號</div><div class="list-sub" id="settingId">（未設定）</div></div>
      <div class="list-arrow">›</div>
    </div>
    <div class="list-item" onclick="clearAllData()">
      <div class="list-icon">🗑️</div>
      <div class="list-label"><div class="list-name" style="color:#e05050">清除所有班表</div><div class="list-sub">重置所有紀錄</div></div>
      <div class="list-arrow">›</div>
    </div>
  </div>
  <div style="text-align:center;padding:28px;font-size:12px;color:#b0b5c0">班務通 ShiftHQ v1.0 · 台灣精銳</div>
</div>

<!-- NAVBAR -->

<nav class="navbar">
  <div class="nav-item" id="nav-today" onclick="showPage('today',this)">
    <div class="nav-icon">✅</div><div class="nav-label">今日</div>
  </div>
  <div class="nav-item active" id="nav-cal" onclick="showPage('cal',this)">
    <div class="nav-icon">📅</div><div class="nav-label">輪班</div>
  </div>
  <div class="nav-fab" onclick="openAddShift(null)">
    <div class="nav-fab-btn">＋</div>
  </div>
  <div class="nav-item" id="nav-wage" onclick="showPage('wage',this)">
    <div class="nav-icon">💴</div><div class="nav-label">薪水</div>
  </div>
  <div class="nav-item" id="nav-other" onclick="showPage('other',this)">
    <div class="nav-icon">⋯</div><div class="nav-label">其它</div>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- SHIFTAR 風格：底部班次選單 -->

<div id="shiftPicker" style="
  display:none; position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:430px; z-index:200;
">
  <!-- 提示列 -->
  <div style="background:#2a9d8f; color:#fff; text-align:center; padding:10px 16px; font-size:14px; font-weight:500;">
    點擊你想要輸入資訊的輪班
  </div>
  <!-- 卡片橫排 -->
  <div id="pickerCards" style="
    background:#f5f6f8;
    display:flex; flex-wrap:wrap;
    padding:12px 10px 10px;
    gap:10px;
    max-height:260px; overflow-y:auto;
  "></div>
  <!-- 底部按鈕 -->
  <div style="background:#f5f6f8; display:flex; justify-content:center; gap:40px; padding:10px 0 max(14px,env(safe-area-inset-bottom)); border-top:1px solid #e8eaee;">
    <div onclick="closePicker()" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer">
      <div style="width:40px;height:40px;border-radius:50%;background:#e05050;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">✕</div>
      <div style="font-size:11px;color:#6b7080">關閉</div>
    </div>
    <div onclick="openSettingsFromPicker()" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer">
      <div style="width:40px;height:40px;border-radius:50%;background:#2a9d8f;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff">⚙</div>
      <div style="font-size:11px;color:#6b7080">設定</div>
    </div>
  </div>
</div>
<!-- 半透明背景 -->
<div id="pickerBackdrop" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:199;" onclick="closePicker()"></div>

<!-- MODAL: 手動輸入班次（從選單進入） -->

<div class="modal-backdrop" id="shiftModal">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增班次</div>
      <button class="modal-close" onclick="closeModal('shiftModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">日期</label>
        <input class="form-input" type="date" id="shiftDate">
      </div>
      <div class="form-group">
        <label class="form-label">班次名稱</label>
        <input class="form-input" type="text" id="shiftName" placeholder="例：日B班 夜班 特休">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">開始</label>
          <input class="form-input" type="time" id="shiftStart" value="08:00">
        </div>
        <div class="form-group">
          <label class="form-label">結束</label>
          <input class="form-input" type="time" id="shiftEnd" value="20:00">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">顏色標記</label>
        <div class="color-picker" id="colorPicker">
          <div class="color-opt selected" data-color="blue"   style="background:#cce0f8" onclick="selectColor(this)">✓</div>
          <div class="color-opt"          data-color="pink"   style="background:#fce4e4" onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="orange" style="background:#fde8c0" onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="green"  style="background:#d4f0e0" onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="purple" style="background:#e8d8f8" onclick="selectColor(this)"></div>
          <div class="color-opt"          data-color="gray"   style="background:#e8eaee" onclick="selectColor(this)"></div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">備註（選填）</label>
        <input class="form-input" type="text" id="shiftNote" placeholder="地點、說明...">
      </div>
      <button class="btn btn-primary" onclick="saveShift()">儲存</button>
      <button class="btn btn-danger"  id="deleteShiftBtn" onclick="deleteShift()" style="display:none">刪除此班次</button>
      <button class="btn btn-ghost"   onclick="closeModal('shiftModal')">取消</button>
    </div>
  </div>
</div>

<!-- MODAL: 姓名 -->

<div class="modal-backdrop" id="nameModal">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title">我的姓名</div>
      <button class="modal-close" onclick="closeModal('nameModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">姓名</label><input class="form-input" type="text" id="nameInput" placeholder="請輸入姓名"></div>
      <button class="btn btn-primary" onclick="saveName()">儲存</button>
    </div>
  </div>
</div>

<!-- MODAL: 員工編號 -->

<div class="modal-backdrop" id="staffIdModal">
  <div class="modal">
    <div class="modal-handle-row"><div class="modal-handle"></div></div>
    <div class="modal-header">
      <div class="modal-title">員工編號</div>
      <button class="modal-close" onclick="closeModal('staffIdModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">編號（D- 本地 / N- 外籍）</label><input class="form-input" type="text" id="staffIdInput" placeholder="例：D001"></div>
      <button class="btn btn-primary" onclick="saveStaffId()">儲存</button>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════
// 顏色對照表（全部用 hex，不用 CSS 變數）
// ══════════════════════════════════
const COLOR_MAP = {
  blue:   { bg:'#cce0f8', text:'#2a6be8' },
  pink:   { bg:'#fce4e4', text:'#d04040' },
  orange: { bg:'#fde8c0', text:'#c07010' },
  green:  { bg:'#d4f0e0', text:'#1a9050' },
  purple: { bg:'#e8d8f8', text:'#6030b0' },
  gray:   { bg:'#e8eaee', text:'#7080a0' },
};

const QUICK_TYPES = [
  { name:'日B班', start:'08:00', end:'20:00', color:'blue'   },
  { name:'夜班',  start:'20:00', end:'08:00', color:'purple' },
  { name:'特休',  start:'00:00', end:'00:00', color:'orange' },
  { name:'例假',  start:'00:00', end:'00:00', color:'pink'   },
  { name:'休假',  start:'00:00', end:'00:00', color:'gray'   },
];

const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOWS   = ['日','一','二','三','四','五','六'];

let currentYear  = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedColor = 'blue';
let editingShiftId = null;
let editingDate    = null;

let shifts   = JSON.parse(localStorage.getItem('shifts') || '{}');
let userName = localStorage.getItem('userName') || '';
let staffId  = localStorage.getItem('staffId')  || '';

// ══════════════════════════════════
// NAV
// ══════════════════════════════════
function showPage(pageId, navEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  if (navEl) navEl.classList.add('active');
  document.getElementById('calTopbar').style.display = (pageId === 'cal') ? '' : 'none';
  if (pageId === 'wage')  recalcWage();
  if (pageId === 'today') renderToday();
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ══════════════════════════════════
// CALENDAR
// ══════════════════════════════════
function goToday() {
  currentYear  = new Date().getFullYear();
  currentMonth = new Date().getMonth();
  renderCalendar();
}

function changeMonth(dir) {
  currentMonth += dir;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth <  0) { currentMonth = 11; currentYear--; }
  renderCalendar();
}

function renderCalendar() {
  const y = currentYear, m = currentMonth;
  document.getElementById('topbarNum').textContent   = m + 1;
  document.getElementById('topbarYear').textContent  = y;
  document.getElementById('topbarYM').textContent    = MONTHS[m];
  document.getElementById('monthNavLabel').textContent = `${y}年${MONTHS[m]}`;

  const firstDow    = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const prevDays    = new Date(y, m, 0).getDate();
  const today       = new Date();
  const pad = n => String(n).padStart(2, '0');

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  for (let i = 0; i < 42; i++) {
    const dow = i % 7;
    const cell = document.createElement('div');
    cell.className = 'cal-cell';
    if (dow === 0) cell.classList.add('sun-col');
    if (dow === 6) cell.classList.add('sat-col');

    let d, cellDate, otherMonth = false;

    if (i < firstDow) {
      d = prevDays - firstDow + i + 1;
      const pm = m - 1 < 0 ? 11 : m - 1;
      const py = m - 1 < 0 ? y - 1 : y;
      cellDate = `${py}-${pad(pm+1)}-${pad(d)}`;
      otherMonth = true;
    } else if (i - firstDow < daysInMonth) {
      d = i - firstDow + 1;
      cellDate = `${y}-${pad(m+1)}-${pad(d)}`;
    } else {
      d = i - firstDow - daysInMonth + 1;
      const nm = m + 1 > 11 ? 0 : m + 1;
      const ny = m + 1 > 11 ? y + 1 : y;
      cellDate = `${ny}-${pad(nm+1)}-${pad(d)}`;
      otherMonth = true;
    }

    if (otherMonth) cell.classList.add('other-month');

    const [cy, cm2, cd] = cellDate.split('-').map(Number);
    const isToday = cy === today.getFullYear() && cm2 === today.getMonth()+1 && cd === today.getDate();
    if (isToday) cell.classList.add('is-today');

    // 日期數字
    const numEl = document.createElement('div');
    numEl.className = 'day-num';
    numEl.textContent = d;
    cell.appendChild(numEl);

    // 班次標籤 — 用 inline style 直接寫死顏色
    const dayShifts = shifts[cellDate] || [];
    dayShifts.slice(0, 2).forEach(s => {
      const tag = document.createElement('div');
      tag.className = 'shift-tag';
      const c = COLOR_MAP[s.color] || COLOR_MAP.blue;
      tag.style.backgroundColor = c.bg;
      tag.style.color = c.text;
      tag.textContent = s.name || '班';
      cell.appendChild(tag);
    });

    cell.addEventListener('click', () => openAddShift(cellDate));
    grid.appendChild(cell);
  }

  renderStatsBar();
}

function renderStatsBar() {
  const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let days = 0, hours = 0;
  const rate = parseInt(document.getElementById('hourlyRate')?.value || 176);
  Object.keys(shifts).filter(k => k.startsWith(prefix)).forEach(k => {
    shifts[k].forEach(s => {
      if (s.color !== 'gray' && s.color !== 'pink') {
        days++;
        hours += calcHours(s.start, s.end);
      }
    });
  });
  const wage = Math.round(hours * rate);
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item"><div class="stat-val">${days}</div><div class="stat-lbl">出勤天</div></div>
    <div class="stat-item"><div class="stat-val">${Math.round(hours)}</div><div class="stat-lbl">工時</div></div>
    <div class="stat-item"><div class="stat-val">$${wage.toLocaleString()}</div><div class="stat-lbl">預估薪資</div></div>
  `;
}

// ══════════════════════════════════
// TODAY
// ══════════════════════════════════
function renderToday() {
  const t = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayKey = `${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
  const dow = DOWS[t.getDay()];
  const label = `${t.getFullYear()}年${t.getMonth()+1}月${t.getDate()}日（週${dow}）`;
  const s0 = (shifts[todayKey] || [])[0];

  document.getElementById('todayCard').innerHTML = s0
    ? `<div class="today-date-lbl">${label}</div>
       <div class="today-shift-name" style="color:${(COLOR_MAP[s0.color]||COLOR_MAP.blue).text}">${s0.name}</div>
       <div class="today-shift-time">${s0.start} – ${s0.end}　${calcHours(s0.start,s0.end).toFixed(1)} 小時</div>
       ${s0.note?`<div class="today-shift-time" style="margin-top:4px">${s0.note}</div>`:''}`
    : `<div class="today-date-lbl">${label}</div><div style="font-size:16px;color:#b0b5c0;text-align:center;padding:20px 0">今日無班次</div>`;

  // 本週
  const wkStart = new Date(t);
  wkStart.setDate(t.getDate() - t.getDay());
  const wl = document.getElementById('weekList');
  wl.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d2 = new Date(wkStart);
    d2.setDate(wkStart.getDate() + i);
    const key = `${d2.getFullYear()}-${pad(d2.getMonth()+1)}-${pad(d2.getDate())}`;
    const ws = (shifts[key] || [])[0];
    const isToday = key === todayKey;
    const c = ws ? (COLOR_MAP[ws.color] || COLOR_MAP.blue) : null;
    const tagHtml = ws
      ? `<span class="shift-tag" style="width:auto;padding:3px 16px;background:${c.bg};color:${c.text}">${ws.name}</span>`
      : `<span style="color:#b0b5c0;font-size:13px">—</span>`;

    const row = document.createElement('div');
    row.className = 'wage-row';
    row.innerHTML = `
      <div style="width:36px;text-align:center">
        <div style="font-size:11px;color:#b0b5c0">${DOWS[d2.getDay()]}</div>
        <div style="font-size:17px;font-weight:${isToday?700:400};color:${isToday?'#2a6be8':'#1a1c22'}">${d2.getDate()}</div>
      </div>
      <div style="flex:1;display:flex;align-items:center">${tagHtml}</div>
    `;
    wl.appendChild(row);
  }
}

// ══════════════════════════════════
// SHIFT MODAL
// ══════════════════════════════════
// SHIFTAR 底部班次選單
// ══════════════════════════════════
let selectedDateKey = null;

function openAddShift(dateKey) {
  // 清除上一個虛線框
  document.querySelectorAll('.cal-cell.selected').forEach(c => c.classList.remove('selected'));

  // 如果有 dateKey，找對應格子加虛線框
  if (dateKey) {
    selectedDateKey = dateKey;
    document.querySelectorAll('.cal-cell').forEach(cell => {
      // 用 click listener 的 closure 比對日期 — 改用 data attribute
    });
    // 標記選中格子
    const cells = document.querySelectorAll('#calGrid .cal-cell');
    const y = currentYear, m = currentMonth;
    const firstDow    = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const prevDays    = new Date(y, m, 0).getDate();
    const pad = n => String(n).padStart(2,'0');
    cells.forEach((cell, i) => {
      let d, cDate, otherMonth = false;
      if (i < firstDow) {
        d = prevDays - firstDow + i + 1;
        const pm = m-1<0?11:m-1, py = m-1<0?y-1:y;
        cDate = `${py}-${pad(pm+1)}-${pad(d)}`;
        otherMonth = true;
      } else if (i - firstDow < daysInMonth) {
        d = i - firstDow + 1;
        cDate = `${y}-${pad(m+1)}-${pad(d)}`;
      } else {
        d = i - firstDow - daysInMonth + 1;
        const nm = m+1>11?0:m+1, ny = m+1>11?y+1:y;
        cDate = `${ny}-${pad(nm+1)}-${pad(d)}`;
        otherMonth = true;
      }
      if (cDate === dateKey) cell.classList.add('selected');
    });
  }

  buildPickerCards(dateKey);
  document.getElementById('shiftPicker').style.display = 'block';
  document.getElementById('pickerBackdrop').style.display = 'block';
}

function buildPickerCards(dateKey) {
  const container = document.getElementById('pickerCards');
  container.innerHTML = '';

  // 卡片樣式
  const cardStyle = `
    width:calc(50% - 5px); background:#fff;
    border-radius:14px; border:1.5px solid #e8eaee;
    padding:12px 12px 10px; cursor:pointer;
    display:flex; flex-direction:column; gap:6px;
    transition:border-color .15s;
    box-sizing:border-box;
  `;

  // ① 空白之輪班
  const blankCard = document.createElement('div');
  blankCard.style.cssText = cardStyle;
  blankCard.innerHTML = `
    <div style="width:100%;height:32px;border-radius:8px;border:2px dashed #c0c5d0;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:11px;color:#b0b5c0">　</span>
    </div>
    <div style="font-size:13px;font-weight:500;color:#1a1c22;text-align:center">空白之輪班</div>
  `;
  blankCard.onclick = () => {
    closePicker();
    openManualInput(dateKey, { name:'', start:'08:00', end:'20:00', color:'gray' });
  };
  container.appendChild(blankCard);

  // ② 手動輸入
  const manualCard = document.createElement('div');
  manualCard.style.cssText = cardStyle;
  manualCard.innerHTML = `
    <div style="width:100%;height:32px;border-radius:8px;background:#f5f6f8;display:flex;align-items:center;justify-content:center;">
      <span style="font-size:18px">✏️</span>
    </div>
    <div style="font-size:13px;font-weight:500;color:#1a1c22;text-align:center">手動輸入</div>
  `;
  manualCard.onclick = () => {
    closePicker();
    openManualInput(dateKey, null);
  };
  container.appendChild(manualCard);

  // ③ 預設班次類型
  QUICK_TYPES.forEach(t => {
    const c = COLOR_MAP[t.color] || COLOR_MAP.blue;
    const card = document.createElement('div');
    card.style.cssText = cardStyle;
    const timeLabel = (t.start === '00:00' && t.end === '00:00') ? '' :
      `<div style="font-size:11px;color:#6b7080">${t.start} - ${t.end}</div>`;
    card.innerHTML = `
      <div style="width:100%;height:32px;border-radius:8px;background:${c.bg};display:flex;align-items:center;justify-content:center;">
        <span style="font-size:13px;font-weight:600;color:${c.text}">${t.name}</span>
      </div>
      ${timeLabel}
      <div style="font-size:11px;color:#b0b5c0">台灣精銳</div>
    `;
    card.onclick = () => {
      closePicker();
      quickSaveShift(dateKey, t);
    };
    container.appendChild(card);
  });
}

function quickSaveShift(dateKey, t) {
  if (!shifts[dateKey]) shifts[dateKey] = [];
  // 同日期同名的直接覆蓋第一筆
  const existing = shifts[dateKey].findIndex(s => s.name === t.name);
  const obj = { name: t.name, start: t.start, end: t.end, color: t.color, note: '' };
  if (existing >= 0) shifts[dateKey][existing] = obj;
  else shifts[dateKey].push(obj);
  saveStorage();
  renderCalendar();
  showToast(`✓ ${t.name} 已儲存`);
}

function closePicker() {
  document.getElementById('shiftPicker').style.display = 'none';
  document.getElementById('pickerBackdrop').style.display = 'none';
  document.querySelectorAll('.cal-cell.selected').forEach(c => c.classList.remove('selected'));
  selectedDateKey = null;
}

function openSettingsFromPicker() {
  closePicker();
  showPage('other', document.getElementById('nav-other'));
}

function openManualInput(dateKey, prefill) {
  editingShiftId = null;
  editingDate    = dateKey;
  const d = dateKey ? parseInt(dateKey.split('-')[2]) : '';
  document.getElementById('modalTitle').textContent  = dateKey ? `新增班次・${d}日` : '新增班次';
  document.getElementById('shiftDate').value  = dateKey || getTodayStr();
  document.getElementById('shiftName').value  = prefill?.name  || '';
  document.getElementById('shiftStart').value = prefill?.start || '08:00';
  document.getElementById('shiftEnd').value   = prefill?.end   || '20:00';
  document.getElementById('shiftNote').value  = '';
  document.getElementById('deleteShiftBtn').style.display = 'none';
  selectColorByKey(prefill?.color || 'blue');
  openModal('shiftModal');
}

function editShift(dateKey, idx) {
  const s = shifts[dateKey][idx];
  editingShiftId = idx;
  editingDate    = dateKey;
  document.getElementById('modalTitle').textContent  = '編輯班次';
  document.getElementById('shiftDate').value  = dateKey;
  document.getElementById('shiftName').value  = s.name  || '';
  document.getElementById('shiftStart').value = s.start || '08:00';
  document.getElementById('shiftEnd').value   = s.end   || '20:00';
  document.getElementById('shiftNote').value  = s.note  || '';
  document.getElementById('deleteShiftBtn').style.display = 'block';
  selectColorByKey(s.color || 'blue');
  openModal('shiftModal');
}

function saveShift() {
  const date = document.getElementById('shiftDate').value;
  if (!date) { showToast('請選擇日期'); return; }
  const obj = {
    name:  document.getElementById('shiftName').value.trim() || '班次',
    start: document.getElementById('shiftStart').value,
    end:   document.getElementById('shiftEnd').value,
    color: selectedColor,
    note:  document.getElementById('shiftNote').value.trim(),
  };
  if (!shifts[date]) shifts[date] = [];

  if (editingShiftId !== null && editingDate === date) {
    shifts[date][editingShiftId] = obj;
  } else {
    if (editingShiftId !== null) {
      shifts[editingDate].splice(editingShiftId, 1);
      if (!shifts[editingDate].length) delete shifts[editingDate];
    }
    shifts[date].push(obj);
  }
  saveStorage();
  closeModal('shiftModal');
  renderCalendar();
  showToast('✓ 班次已儲存');
}

function deleteShift() {
  if (editingShiftId === null || !confirm('確定刪除？')) return;
  shifts[editingDate].splice(editingShiftId, 1);
  if (!shifts[editingDate].length) delete shifts[editingDate];
  saveStorage();
  closeModal('shiftModal');
  renderCalendar();
  showToast('班次已刪除');
}

function selectColor(el) {
  document.querySelectorAll('.color-opt').forEach(o => { o.classList.remove('selected'); o.textContent = ''; });
  el.classList.add('selected');
  el.textContent = '✓';
  selectedColor = el.dataset.color;
}
function selectColorByKey(key) {
  document.querySelectorAll('.color-opt').forEach(o => {
    o.classList.remove('selected'); o.textContent = '';
    if (o.dataset.color === key) { o.classList.add('selected'); o.textContent = '✓'; }
  });
  selectedColor = key;
}

// ══════════════════════════════════
// WAGE
// ══════════════════════════════════
function calcHours(start, end) {
  if (!start || !end || (start === '00:00' && end === '00:00')) return 0;
  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 1440;
  return mins / 60;
}

function recalcWage() {
  const rate   = parseInt(document.getElementById('hourlyRate').value || 176);
  const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let total = 0, rows = '';

  Object.keys(shifts).filter(k => k.startsWith(prefix)).sort().forEach(k => {
    shifts[k].forEach(s => {
      const h   = calcHours(s.start, s.end);
      const pay = Math.round(h * rate);
      total += pay;
      if (h > 0) {
        const d = parseInt(k.split('-')[2]);
        const c = COLOR_MAP[s.color] || COLOR_MAP.blue;
        rows += `<div class="wage-row">
          <div class="wage-dot" style="background:${c.text}"></div>
          <div class="wage-info">
            <div class="wage-date">${d}日（${DOWS[new Date(k).getDay()]}）</div>
            <div class="wage-name">${s.name}</div>
          </div>
          <div class="wage-right">
            <div class="wage-hours">${h.toFixed(1)}h × ${rate}</div>
            <div class="wage-pay">$${pay.toLocaleString()}</div>
          </div>
        </div>`;
      }
    });
  });

  document.getElementById('wageTotal').textContent    = total.toLocaleString();
  document.getElementById('wageTotalBot').textContent  = '$' + total.toLocaleString();
  document.getElementById('wagePeriodLabel').textContent = `${currentYear}年${MONTHS[currentMonth]} 預估薪資`;
  document.getElementById('wageBreakdown').innerHTML   = rows || `<div style="padding:24px;text-align:center;color:#b0b5c0;font-size:14px">本月尚無班次</div>`;
  renderStatsBar();
}

// ══════════════════════════════════
// EXPORT
// ══════════════════════════════════
function exportCSV() {
  const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let csv = '日期,星期,班次,開始,結束,工時,備註\n';
  Object.keys(shifts).filter(k => k.startsWith(prefix)).sort().forEach(k => {
    shifts[k].forEach(s => {
      csv += `${k},${DOWS[new Date(k).getDay()]},${s.name||''},${s.start||''},${s.end||''},${calcHours(s.start,s.end).toFixed(1)},${s.note||''}\n`;
    });
  });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF' + csv], { type:'text/csv;charset=utf-8;' }));
  a.download = `班表_${currentYear}${String(currentMonth+1).padStart(2,'0')}.csv`;
  a.click();
  showToast('✓ CSV 已下載');
}

function exportText() {
  const prefix = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-`;
  let text = `【${currentYear}年${MONTHS[currentMonth]}班表】\n`;
  Object.keys(shifts).filter(k => k.startsWith(prefix)).sort().forEach(k => {
    shifts[k].forEach(s => {
      const d = parseInt(k.split('-')[2]);
      text += `${d}日(${DOWS[new Date(k).getDay()]}) ${s.name} ${s.start}~${s.end}${s.note?' ・'+s.note:''}\n`;
    });
  });
  navigator.clipboard?.writeText(text).then(() => showToast('✓ 已複製到剪貼簿'));
}

// ══════════════════════════════════
// SETTINGS
// ══════════════════════════════════
function saveName() {
  userName = document.getElementById('nameInput').value.trim();
  localStorage.setItem('userName', userName);
  document.getElementById('settingName').textContent = userName || '（未設定）';
  closeModal('nameModal');
  showToast('✓ 已儲存');
}
function saveStaffId() {
  staffId = document.getElementById('staffIdInput').value.trim();
  localStorage.setItem('staffId', staffId);
  document.getElementById('settingId').textContent = staffId || '（未設定）';
  closeModal('staffIdModal');
  showToast('✓ 已儲存');
}
function clearAllData() {
  if (!confirm('確定清除所有班表資料？')) return;
  shifts = {};
  saveStorage();
  renderCalendar();
  showToast('已清除');
}

// ══════════════════════════════════
// UTILS
// ══════════════════════════════════
function saveStorage() { localStorage.setItem('shifts', JSON.stringify(shifts)); }
function getTodayStr() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}
document.querySelectorAll('.modal-backdrop').forEach(b => {
  b.addEventListener('click', e => { if (e.target === b) b.classList.remove('open'); });
});
